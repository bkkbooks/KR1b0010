body:
  text: 尚書講義卷十九宋史浩撰成王將崩命召公畢公率諸侯相康王作顧命案此條講義永樂大典原闕顧命惟四月哉生魄王不懌甲子王乃洮頮水相被冕服憑玉几乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹豫審訓命汝昔君文王武王宣重光奠麗陳教則肄肄不違用克逹殷集大命在後之侗敬迓天威嗣守文武大訓無敢昏逾今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗𢎞濟于艱難柔逺能邇安勸小大庶邦思夫人自亂于威儀爾無以釗冒貢于非幾兹既受命還出綴衣于庭越翼日乙丑王崩太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外延入翼室恤宅宗丁卯命作册度越七日癸酉伯相命士須材狄設黼扆綴衣牖間南嚮敷重篾席黼純華玉仍几西序東嚮敷重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南嚮敷重筍席玄紛純漆仍几越玉五重陳寶赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序胤之舞衣大貝鼖鼓在西房兑之戈和之弓垂之竹矢在東房大輅在賔階面綴輅在阼階面先輅在左孰之前次輅在右孰之前二人雀辨執惠立于畢門之內四人綦辨執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階王麻冕黼裳由賔階隮卿士邦君麻冕蟻裳入即位太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賔階隮御王册命曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威乃受同瑁王三宿三祭三吒上宗曰饗太保受同降盥以異同秉璋以酢授宗人同拜王答拜太保受同祭嚌宅授宗人同拜王答拜太保降收諸侯出廟門俟道之在天下人之得之者率能合死生為一致齊彭殤為妄作其於世間事業聲名已不足為而况富貴貧賤夀夭又安能動其心乎其感而後應迫而後動不得已而後起蓋其適來適去出於無心初無繫纍是以人倫五者天下萬事無所處而不當也周公得是道於堯舜禹湯文武故兼三王而施四事實其緒餘土苴其惟精惟一之學則當世傳之成王後世傳之孔子蓋成王則見而知之孔子則聞而知之是或一道也觀成王疾病之際上言祖考之德下託元子之孤所以保基業貽似續者皆以為民其言無一毫之私氣定心平了然不亂非得道於周公安能如是乎是知曽參戰兢而易簀不如孔子消搖而曳杖當兹大變不怛化者前聖後聖其揆一也蓋其平生學力深固不於是時發見其將何時乎若夫仗衛之儀執事之人禮經具載所謂籩豆之事則有司存此不必解姑取其得道於堯舜禹湯文武周公者言之蓋大節也後儒敘傳道之統止謂周公傳之孔子而不及成王此為遺恨讀其文者未嘗不歎息於斯也康王既尸天子遂誥諸侯作康王之誥尸居也踐天子位也遂誥者因其來會而遂誥之也或者謂康王不當吉服以見諸侯諸侯戴文武成王之德久矣若在亮陰而使太保傳命安有不聽乎此非知時者之言也夫商民之頑成王周公勤勤於此凡幾嵗幾書而猶未服今康王茍惸然在哀疚中諸侯來弔者不覿其面而去安知商之士民不起三監武庚之念乎其勉康王出見諸侯所以冥消商人不軌之心也况以冕服乎冕服祭服也明不敢用朝服而用在廟之服也觀畢命之言曰邦之安危惟兹商士於此可以見當時綿蕝之禮所以絶危疑顧望之心皆出於從權也嗚呼豈非召公畢公之謀乎康王之誥王出在應門之內太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黃朱賔稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽首王義嗣德答拜太保暨芮伯咸進相揖皆再拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若克恤西土惟新陟王畢協賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壞我髙祖寡命王若曰庶邦侯甸男衛惟豫一人釗報誥昔君文武丕平富不務咎底至齊信用昭明于天下則亦有熊羆之士不二心之臣保乂王家用端命于上帝皇天用訓厥道付卑四方乃命建侯樹屏在我後之人今豫一二伯父尚胥暨顧綏爾先公之臣服于先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞羣公既皆聽命相揖趨出王釋冕反喪服王出立於畢門諸侯朝於應門之左右禮也古者天子不下堂而見諸侯康王出於應門之內天子之失禮也誠以方其居廬不敢御正衙以行朝覲之義此亦從權之義也乘者四馬也朱黃馬飾也而以布羃之縞素也賔稱者以客禮待諸侯也奉圭幣庭實也執壤奠土貢也皆稱拜稽首臣禮也夫朝覲會同諸侯一德以尊于天子也王義其能嗣乃祖乃父之德以來朝故答拜享其誠也答拜非君臣之禮也故曰賔稱夫君臣相戒當在間暇時康王方顔色之戚哭泣之哀羣臣遽進戒嗣王何哉蓋太保之意欲諸侯聞之知王亦如成王能受臣下之言而稱頌祖德張皇六師不壞髙祖之命言其制馭之道不異成王此所以警諸侯也大臣受遺命其拳拳之心惟恐不克負荷受命之初欲以先聲服諸侯也太保之意深矣王若曰者召公傳命之言也惟豫一人報誥告羣臣及皆來之諸侯也言文武致太平而無過咎以其保乂王家內則有不二心之羣臣其建侯樹屏外則有乃心王室之諸侯爾等誠能恤我而順其乃祖乃父所以事文武之道以無貽稚子之羞者望之切也康王當三年不言之時乃有是誥亦非禮也當危疑之際諸侯皆在而無一言所謂臣下罔攸稟令今而有言亦從權之義也內而羣臣外而諸侯故總謂之羣公既皆聞是誥命安敢不服乎羣公一見天日之表一聽丁寧之誥想見相見而揖揖而趨出之際昌言偶語必皆曰真吾君之子也孟子曰弔者大悅正此義也如是則太保之謀效矣康王命作册畢分居里成周郊作畢命分居里成周郊者康王命畢公之大意也洛亦王土而必曰周郊者為商民而言也分者表厥宅里殊厥井疆也成者申畫郊圻慎固封守也何為若是蓋以周之扞禦隄防不在夷狄而在商民也商民無變則保釐之功成矣畢命惟十有二年六月庚午朏越三日壬申王朝步自宗周至于豐以成周之衆命畢公保釐東郊王若曰嗚呼父師惟文王武王敷大德于天下用克受殷命惟周公左右先王綏定厥家毖殷頑民遷于洛邑密邇王室式化厥訓既歷三紀世變風移四方無虞豫一人以寧道有升降政由俗革不臧厥臧民罔攸勸惟公懋德克勤小物弼亮四世正色率下罔不祗師言嘉績多于先王豫小子垂拱仰成王曰嗚呼父師今豫祗命公以周公之事往哉旌别淑慝表厥宅里彰善疸惡樹之風聲弗率訓典殊厥井疆俾克畏慕申畫郊圻慎固封守以康四海政貴有恆辭尚體要不惟好異商俗靡靡利口惟賢餘風未殄公其念哉我聞曰世祿之家鮮克由禮以蕩陵德實悖天道敝化奢麗萬世同流兹殷庶士席寵惟舊怙侈滅義服美于人驕淫矜誇將由惡終雖收放心間之惟艱資富能訓惟以永年惟德惟義時乃大訓不由古訓于何其訓王曰嗚呼父師邦之安危惟兹殷士不剛不柔厥德允修惟周公克慎厥始惟君陳克和厥中惟公克成厥終三后協心同底于道道洽政治澤潤生民四夷左衽罔不咸賴豫小子永膺多福公其惟時成周建無窮之基亦有無窮之聞子孫訓其成式惟五嗚呼罔曰弗克惟既厥心罔曰民寡惟慎厥事欽若先王成烈以休于前政朏者月三日初生也越三日者六月六日也至于豐將以命畢公保釐東郊之册告于清廟也畢公弼亮四世非老臣乎父師之稱當矣册文上推文武之大德中言豫一人以寧下言道有升降政須因革所賴以知臣下之善惡者臧否也若不臧厥臧則惡者肆矣民安得而勸故以此命公也其褒公之辭則以謂豫小子今得以垂拱無為而蒙成者公之力也是故祗命公以周公之事旌别善惡表其居處無使混淆揚其善病其惡植此風聲所以臧厥臧而民知所勸也有弗率訓典殊厥井疆屏之逺方不使復亂羣也既不施刑民斯畏而愛之矣申畫郊圻慎固封守所以成周郊也政貴有常循周公之政也辭尚體要法周公之立言自然無崖異也商俗以利口惟賢此風安可長成王戒羣臣無以利口亂厥官正為此也公當念成王之意可也康王所聞於古人之言謂世祿之家鮮克由禮世祿之家子孫不率教而至於敗國喪家亡身者敝俗所化狃於奢麗萬世同流不肖之習雖或不同同歸于亂也商之庶士商民也不曰民而曰士者責其可責也惡終言其多行不義而自斃也雖收其放心其防間之道惟艱也資富能訓惟以永年此戒畢公以教斯民也謂資在富貴易於從化必無惡終之患矣成王之告君陳猶欲以辟是未免於用刑康王則一以惟德惟義為大訓蓋成王之時更三監武庚之叛民猶未寧康王之時世變風移刑措不用太平之極故惟以德義輔化而已商民何為哉學于古訓爾又曰惟兹商士實繫國之安危若不剛不柔以中和之化使之日遷善逺罪厥德修矣周公遷之以謹其始君陳理之以協其中則成其終者豈不有望於畢公乎蓋行百里者半九十不可以其已安已治而遂不克終也畢公之任亦重矣三后同道既協心於政治則膏澤必下於民雖夷蠻戎狄皆賴以安矣以此知商人之難化甚於四夷也畢公克成厥終豈惟康王垂拱仰成以享太平之福抑周家無窮之大業畢公無窮之令聞所以保其子孫黎民者莫不皆因商人平定而致之則所謂邦之安危豈不在商人乎康王又慮畢公以經綸天下之材不屑為之故又戒之曰勿以不能而退託勿以國小而懈弛欽若先王之成烈以匹休于前政兹所以望三后之協心也先王成王也前政周公君陳也康王以成王為軌範畢公以周公君陳為標凖成周之治宜優為矣然成康此舉皆為商民也而君陳之終篇乃曰惟豫一人膺受多福畢命之終篇亦曰豫小子永膺多福成康豈徼福哉有臣如君陳畢公增光先王之成烈紹述周公之前政使吾安於朝廷之上故謂之福也抑嘗讀易之大有上九之爻不言其象直曰自天祐之吉無不利孔子繫之曰天之所助者順人之所助者信履信思乎順又以尚賢也是以自天祐之吉無不利成康當信順之時太平之極驕侈不生而拳拳於三后是尚賢也則自天祐之永膺多福理之必至也萬世之下語守文之君以成康為稱首宜哉穆王命君牙為周大司徒作君牙周官大司徒之職在於敷五典擾兆民實法舜命契敬敷五教在寬之意皆所以明人倫也今命君牙作大司徒一篇之意専言其先德而其要則在洪敷五典式和民則穆王可謂知治之要矣君牙王若曰嗚呼君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常惟豫小子嗣守文武成康遺緒亦惟先正之臣克左右亂四方心之憂危若蹈虎尾涉于春氷今命爾豫翼作股肱心膂纘乃舊服無忝祖考𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寧嗚呼丕顯哉文王謨丕承哉武王烈啓佑我後人咸以正罔缺爾惟敬明乃訓用奉若于先王對揚文武之光命追配于前人王若曰君牙乃惟由先正舊典時式民之治亂在兹率乃祖考之攸行昭乃辟之有乂君牙之祖父世篤忠貞成績紀于太常太常天子玉輅所建之大旗也繪以日月而銘其臣之功所為旌表以勸臣下也惜其名不著二後世然觀君牙之賢可以逆知其乃祖乃父也穆王嗣守文武成康遺緒可謂重熙纍洽之世矣而猶眷顧君牙使之克肖其先以治四方可無愧于四后之德矣心之憂危惕惕若蹈虎尾兢兢如履春氷是以命君牙作輔而寄以股肱心膂之任也夫股肱用力于外心膂設謀于內一人之身無餘事矣纘此舊服惟覬其不忝祖考者在于宏敷五典式和民則而已夫五典五品也帝舜之世百姓不親五品不遜而使契作司徒教以人倫則父子有親君臣有義夫婦有别長幼有序朋友有信也然則穆王此舉無愧于舜君牙此職無愧于契矣而其收功在于式和民則夫天生蒸民有物有則民之秉彝好是懿德是民之物則與生俱生其所敷者亦因人心之固有而和之爾穆王可謂知治之本矣非穆王知治之本無以得君牙非君牙之賢無以率其下君臣若形影之相須也其言爾身克正罔敢弗正民心罔中惟爾之中惟皇上帝降衷于民中者人人本具得之為聖人亡之為衆人亡之非無也迷而不悟有待于上之人輔之翼之而自得之也夫以蚩蚩之衆而欲以一人之身率而歸中豈不艱哉能思其艱以圖其易則易將至矣民之所以寧者豈不在君牙乎夫以丕大顯明之文王丕大纘承之武王啓佑于我後人正而無缺吾固知思矣則世篤忠貞服勞王家之乃祖乃父豈不能垂裕于爾君牙乎爾惟敬明乃訓而奉順之則對揚追配不勞餘力矣爾當由先正祖考之舊典時式民之治亂所繫爾當率循其所行以昭明我之治于斯時也君牙雖欲退託其可得乎穆王命伯冏為周大僕正作冏命周官有大僕之官其所掌無大職事而穆王至於作命其所責任甚重人或以謂穆王别立一官或又曰兼周官太僕與五路之屬大馭戎僕齊僕道僕田僕俱總之故其責任不輕也穆王所以加一正字使正于羣僕侍御之臣也既責以發號施令又責以繩愆紏謬似非下大夫所掌之職其曰今豫命汝作大正則知其責任異於周官之大僕也冏命王若曰伯冏惟豫弗克于德嗣先人宅丕后怵惕惟厲中夜以興思免厥愆昔在文武聰明齊聖小大之臣咸懷忠良其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民祗若萬邦咸休惟豫一人無良實賴左右前後有位之士匡其不及繩愆糾繆格其非心俾克紹先烈今豫命汝作大正正于羣僕侍御之臣懋乃后德交修不逮慎簡乃僚無以巧言令色便辟側媚其惟吉士僕臣正厥后克正僕臣諛厥后自聖后德惟臣不德惟臣爾無昵于憸人充耳目之官迪上以非先王之典非人其吉惟貨其吉若時瘝厥官惟爾大弗克祗厥辟惟豫汝辜王曰嗚呼欽哉永弼乃后于彝憲穆王謙沖自謂以不德嗣位至於終夜不寢思勉厥愆可謂賢王矣其言文武盛德小大之臣咸懷忠良侍御僕從罔匪正人其所承弼其君者毋不敬也號令之下無不盡善下民祗順萬國咸休然後屬在位之士正救其不及觀穆王惕厲如此安有愆謬可以繩紏又安有非心之可格則克紹先烈無疑矣今豫命汝作大正所謂太僕正也周官止有太僕穆王加以正而名僕臣乃得不正乎則簡進乃僚伯冏雅當其任矣巧言令色便辟側媚不正之人一皆不用惟吉士是求且曰僕臣正則君克正僕臣諛則君自聖嗚呼穆王既自憂危惕厲寧有自聖之患其所云者為凡後嗣言也夫諛言之不可聽也久矣彼其讒諂面諛逢君之惡能使人君惡直醜正忠言不聞拒諫自用下情壅閼國欲治可得乎穆王委心以任伯冏故曰有德惟爾不德亦惟爾則伯冏安敢不盡心乎夫憸人小人也安可充耳目之官彼其妒賢嫉能誣害良善告訐似忠修怨似直人君聽之寧不惑乎而况言偽而辨浸潤膚受日陳于君前自聖之君安得不作聰明以亂舊章乎所謂迪上以非先王之典也若不求其忠良而惟以賄進則爾為曠官且為火不克祗其君吾亦坐爾以大不恭之罪矣伯冏儻遵是戒則永輔于彝憲彝憲常法也穆王保其常法垂裕子孫所望于侍御僕從者非為一身蓋以遺後嗣故曰永弼乃后然則穆王可謂慎微之主矣竊嘗謂人主神聖過人數等至于立法以遺子孫不當亦以神聖望之蓋其後世豈無庸常之君若概以神聖望之彼企之不及則將自放自肆無所依據矣成湯懋昭大德建中于民至其垂裕後昆則以義制事以禮制心而已天作之詩太王荒之文王康之至於子孫保之者岐有夷之行爾則穆王永弼乃后于彝憲之説可謂得先王之要法也
