body:
  text: 尚書講義卷十七宋史浩撰召公為保周公為師相成王為左右召公不説周公作君奭案此條講義永樂大典原闕君奭周公若曰君奭弗弔天降喪于殷殷既墜厥命我有周既受我不敢知曰厥基永孚于休若天棐忱我亦不敢知曰其終岀于不祥嗚呼君巳曰時我我亦不敢寧于上帝命弗永逺念天威越我民罔尤違惟人在我後嗣子孫大弗克恭上下遏佚前人光在家不知天命不易天難諶乃其墜命弗克經歷嗣前人恭明徳在今予小子旦非克有正迪惟前人光施于我沖子又曰天不可信我道惟寧王徳延天不庸釋于文王受命案此條講義原闕公曰君奭我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡在太戊時則有若伊陟臣扈格于上帝巫咸乂王家在祖乙時則有若巫賢在武丁時則有若甘盤率惟兹有陳保乂有殷故殷禮陟配天多歷年所天惟純佑命則商實百姓王人罔不秉徳明恤小臣屏侯甸矧咸奔走惟兹惟徳稱用乂厥辟故一人有事于四方若卜筮罔不是孚周公既引所以相成王者勉召公又言商之諸相所以事後王者以明非獨吾二人古之人皆然也惟伊尹相成湯以格天相太甲以格于上帝相成湯之時不可及已相太甲時則與伊陟臣扈同功言有差殊以君之賢聖分也巫咸乂王家乂治也陟上也與祖乙時巫賢武丁時甘盤亦率惟兹有所陳於王以保乂有商故商之賢聖之君皆能感格神祗上而配于天夫配天與格天格于上帝小異矣此亦以君之賢聖分也其所以使其多歷年所而天惟純佑百姓豐實則自成湯至于髙宗同也王人銜王命之人也皆秉徳明恤小臣左右近習之人也侯甸王之近畿之人也矧咸奔走執事之賤者也惟兹惟徳稱莫不以徳舉也既皆用乂其君故一人有事于四方若卜筮之信罔不是孚也夫周公必舉多歴年所而終于有孚以言已之相成王尚在幼冲年既未久徳亦未洽其流言之變小臣有所未孚也必待久而後孚若商之諸臣可也是欲勉召公同施其力以冀久逺勿以憂懼而遂已也然臣扈湯之臣至太戊時已百嵗餘矣則相後君不待於老臣乎語此則周召不得不任其責也髙宗所以中興得傅説也而周公獨引甘盤盖髙宗不學于甘盤則不知恭黙思道無以得傅説竊意甘盤者亦先朝之舊臣也是故引之公曰君奭天壽平格保乂有殷有殷嗣天滅威今汝永念則有固命厥亂明我新造邦公曰君奭在昔上帝割申勸寜王之徳其集大命于厥躬惟文王尚克修和我有夏亦惟有若虢叔有若閎夭有若散宜生有若泰顛有若南宫括又曰無能徃來兹迪彝教文王蔑徳降于國人亦惟純佑秉徳迪知天威乃惟時昭文王迪見冒聞於上帝惟時受有殷命哉天之所以續永命者在乎平格平者言其徳之一格者言其徳之至彼有商之君賢聖如此而天復壽其一徳至徳之臣以保乂如此紂既迷亂嗣天滅威天滅而威之也今汝憂深思逺念天有固我之命以治顯于我新造邦則召公聞此憂宜解矣在昔上帝割喪商邦而申勸文王之徳以集大命于其身文王尚克修泰和之治於諸夏亦惟有若虢叔閎夭散宜生泰顛南宫括之徒而已兹五人者文王䟽附先後奔走禦侮之友也使文王不能與此五人徃來順其彝倫之教文王亦無徳降于國人矣今社稷之未安流言之日至豈吾二人之徳不及五人者乎五人者亦惟純佑文王秉徳迪知天威故昭文王之徳以順於人以見於逺以冒於衆用以聞于上帝而遂受商之天命也周公前引有商舊臣之相兹又以文王之臣所以相武王者告召公於此茍能捐身殉國以圖社稷之安乎又何不説之有武王惟兹四人尚迪有禄後暨武王誕將天威咸劉厥敵惟兹四人昭武王惟冒丕單稱徳今在予小子旦若游大川予徃暨汝奭其濟小子同未在位誕無我責收罔勗不及耉造徳不降我則鳴鳥不聞矧曰其有能格周公之為此書歴敘有商之相若伊尹軰皆以先朝舊老克相後人文王五人至武王之世雖亡其一然四友益以相得同心輔治既昭文王之徳于前又昭武王之徳于後尚迪有禄者古以死為無祿有禄言其尚無恙也武王之勝商惟兹四人之力昭顯武王使覆冒天下丕大也單小也使大小咸稱其徳也今在我為相若游大川非若伊尹之可以獨任必藉汝奭同心乃濟今吾二人既受武王之託其相成王亦若四友之相武王可也與爾未在位時已皆相與若同此不替庶幾免責矣今當收效不勉其不及為耆徳老成而使徳不降於人以去則何所貴於相友古以鳴鳥喻求友伐木之詩是也鳴鳥不聞不得友以成安能格于至治哉公曰嗚呼君肆其監于兹我受命無疆惟休亦大惟艱告君乃猷裕我不以後人迷公曰前人敷乃心乃悉命汝作汝民極曰汝明勗偶王在亶乘兹大命惟文王徳丕承無疆之恤公曰君告汝朕允保奭其汝克敬以予監于殷喪大否肆念我天威予不允惟若兹誥予惟曰襄我二人汝有合哉周公既已陳平生相與之意以勉其留而寛其不説之心矣兹又言己之受命於武王者有無疆之休亦有無疆之艱表其成治之不易也故先告以君肆其監於兹又告以君乃猷裕我不以後人迷猷謀也當謀於寛裕以須其治之成勿以不説而遽去後王之迷悟在我烏可不任其責哉前人武王也後人成王也武王非獨命我亦敷其心腹以悉命汝是其委任與我同也作汝民極是望汝為民之極若曰民心罔中惟爾之中也於是復述武王命二人之言曰汝明勉偶王夫偶對也二人同心之意也周公為師召公為保相成王為左右言其相須豈可相捨哉亶信也在亶者在乎自信以乘兹大命也我文考之念後人有無疆之憂在汝二人丕承而已夫人臣託六尺之孤竭其力繼之以死可也豈可以社稷未安而徒懐憂乎周公又曰告汝朕允允信也言我之言出於信汝保奭當克敬也我視商之所以喪亂以無人若伊尹伊陟臣扈巫咸巫賢甘盤之徒為之偶也否不然也微子之言紂曰咈其耉長舊有位人既不用老成人所謂大否也天威不逺有臣如此無臣如彼可謂明效矣予言茍出於不信豈敢若此多誥實欲賛我二人使終其始汝試思之當有合於人心有合于人心則無商之大否矣言曰在時二人天休兹至惟時二人弗戡其汝克敬徳明我俊民在讓後人于丕時嗚呼篤棐時二人我式克至于今日休我咸成文王功于不怠丕冒海隅出日罔不率俾公曰君予不惠若兹多誥予惟用閔于天越民公曰嗚呼君惟乃知民徳亦罔不能厥初惟其終祗若兹徃敬用治言曰我之所言如是也周之治方興而未洽周之福方至而日増以我二人同心故也我二人何以勝之汝克敬徳而明俊民舉賢以為助在進成王於昌大之時也篤厚也棐輔也凡周室至于今日休美以我二人厚輔之也咸共也今勉召公共成文王之功其勤至於不怠可以丕冒海隅出日罔不率俾周都在鎬實中國之西海隅出日舉其甚逺者而言之也予不惠者我不欲若兹多誥言不欲喋喋言之誠以畏天命而憫人窮也周公之本心今披露於召公召公於此能忘情於武王而以憂畏去乎又歎曰君乃知民徳中庸之徳民鮮能久者以天生蒸民其命匪諶靡不有初鮮克有終也我二人既已同心於前不可以憂畏而不終於後祗順以行惟敬以用治不可不勉也此書之作周公不失為聖召公不失為賢其初不失同心其終不失相勉以濟治周南召南萬世知其為不可及也而解者曰召公疑周公又曰不説周公歸政而復留又曰不説成王之不知周公誤矣若曰召公疑周公則武王不應使之左右成王不知而使之是武王之不智也若曰不説其復留是召公欲専政周公力言之以自留周公之固位也若曰不説成王之不知則召公身為大臣不能開悟人主而徒為緘黙以不説豈所望於召公哉况卷阿公劉之戒召公非不敢言者何獨於周公而黙然乎是知解者之誤也蔡叔既没王命蔡仲踐諸侯位作蔡仲之命此孔子序史氏所紀周公請諸成王命蔡仲之意也序後一章亦史氏之記也其曰囚蔡叔郭鄰正義則曰周公囚之至死不赦以序考之蔡叔稱没則若無罪而死者至死不赦之説或可以疑也况方囚蔡叔而蔡仲已為卿士父囚而子在位其心將何以處之周公忠厚人也忍使其子貪位慕禄而不事父乎而所謂克庸祗徳者幾於溢美矣由是知周公之囚蔡叔非若後世禁錮終身意必有還復之期蔡仲斯為不忝矣周公弔二叔之不咸封文之昭武之穆豈有澤及逺族而捨我之親親不使自新乎序直言踐諸侯位以明周家忠厚不以父罪而廢其子與舜殛鯀興禹不約而同也蔡仲之命惟周公位冢宰正百工羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘降霍叔于庶人三年不齒蔡仲克庸祗徳周公以為卿士叔卒乃命諸王邦之蔡此史臣之記也周公位冢宰以正百工行宰相之事以表率百僚也後世乃有居天子位之説夫周公為冢宰也攝政非攝位其受命居洛也復書非還位羣叔流言非以其踐位也當危疑之際以將不利於孺子為説欲以此中周公周公去則武庚禄父可以為商復讎矣盖商之遺澤在人雖更辛紂之酷虐人心猶未離至成王之世受周之撫養不為不久而念商猶不忘向非周公奮不顧身力任此責則周未必不復為商此周公於流言之變并二叔以討之於既遷之後作多士以誥之也雖然使管叔不附武庚則周公處之必有道未必誅也觀其囚蔡叔以車七乘遷於郭鄰而已降霍叔為庶人止三年而已亦可見其治親之道矣按史記世家武王封功臣昆弟封叔鮮於管封叔度於蔡封叔處於霍而經𫝊所載惟言二叔此復有霍叔何哉盖霍叔雖監商不挾商民以叛此其得罪所以輕既言羣叔則流言之釁霍叔亦在章章矣使二叔不附商罪止同於霍叔三年之後復齒於諸侯之列與無過人同也由此觀之周公之討二叔豈得已乎為社稷計爾王若曰小子胡惟爾率徳改行克慎厥猷肆予命爾侯于東土徃即乃封敬哉爾尚蓋前人之愆惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後率乃祖文王之彝訓無若爾考之違王命率徳率乃祖文王之彝訓改行無若爾考之違王命也克慎厥猷所為無不慎也欲盖前人之愆莫若忠孝忠則不忘本朝孝則不忘前人爾乃邁迹自身一身邁徳勤行而不怠使子孫可以循迹而取法所謂垂憲乃後者蔡叔之罪在違王命違王命者附商而叛周與商遺民同謂周之取商為不然心實謀逆也其曰盖前人之愆者前人有愆對其子言豈曰暴之惟當囑其掩覆求立事君之大節以洗其昨非爾故曰盖也能如是豈不曰忠乎豈不曰孝乎竊嘗謂周公位冢宰凡所欲為無不如志而善則稱君過則稱已周公造次未嘗忘之且誅管蔡者成王也非成王之命周公安敢専罰而經之所載直言周公位冢宰而為之可謂過則稱已矣封蔡仲者周公也非周公知之成王何自而封而經之所載直言請命於王而封之蔡可謂善則稱君矣彼後世負不賞之功而招權以自用者固周公之罪人也皇天無親惟徳是輔民心無常惟惠之懐為善不同同歸于治為惡不同同歸于亂爾其戒哉慎厥初惟厥終終以不困不惟厥終終以困窮懋乃攸績睦乃四鄰以蕃王室以和兄弟康濟小民率自中無作聰明亂舊章詳乃視聴罔以側言改厥度則予一人汝嘉王曰嗚呼小子胡汝徃哉無荒棄朕命案此條講義永樂大典原闕成王東伐淮夷遂踐奄作成王政成王既踐奄將遷其君於蒲姑周公告召公作將蒲姑奄之為國淮夷一部落也淮浦之夷叛服不常舊矣成王政者言淮夷既平四方無虞王政乃成也將蒲姑者周公以成王遷奄之命謀及召公也此君奭所謂襄我二人汝有合哉是也成王歸自奄在宗周誥庶邦作多方成王自奄歸宗周宗周豐鎬之都也洛則謂之成周作書以誥多方多方者周之諸侯非如多士止告三監及淮夷奄也盖成王即政之後三監及奄已不足慮所誥者天下諸侯故書曰告爾四國多方因四國而告多方也當是時周公宅洛已能鎮服天下其叛亂之國既以滅亡國家駸駸無事自此布政設官而持盈守成以文太平故立政周官以次而舉也多方惟五月丁亥王來自奄至于宗周周公曰王若曰猷告爾四國多方惟爾殷侯尹民我惟大降爾命爾罔不知洪惟圖天之命弗永寅念于祀惟帝降格于夏有夏誕厥逸不肯慼言于民乃大淫昏不克終日勸于帝之迪乃爾攸聞厥圖帝之命不克開于民之麗乃大降罰崇亂有夏因甲于内亂不克靈承于旅罔丕惟進之恭洪舒于民亦惟有夏之民叨懫日欽劓割夏邑天惟時求民主乃大降顯休命于成湯刑殄有夏惟天不卑純乃惟以爾多方之義民不克永于多享惟夏之恭多士大不克明保享于民乃胥惟虐于民至于百為大不克開乃惟成湯克以爾多方簡代夏作民主慎厥麗乃勸厥民刑用勸以至于帝乙罔不明徳慎罰亦克用勸要囚殄戮多罪亦克用勸開釋無辜亦克用勸今至于爾辟弗克以爾多方享天之命嗚呼王若曰誥告爾多方非天庸釋有夏非天庸釋有殷乃惟爾辟以爾多方大淫圖天之命屑有辭乃惟有夏圖厥政不集于享天降時喪有邦間之乃惟爾商後王逸厥逸圖厥政不蠲烝天惟降時喪惟聖罔念作狂惟狂克念作聖天惟五年須暇之子孫誕作民主罔可念聽天惟求爾多方大動以威開厥顧天惟爾多方罔堪顧之惟我周王靈承于旅克堪用徳惟典神天天惟式教我用休簡卑殷命尹爾多方今我曷敢多誥我惟大降爾四國民命爾曷不忱裕之于爾多方爾曷不夾介乂我周王享天之命今爾尚宅爾宅畋爾田爾曷不惠王熈天之命爾乃迪屢不静爾心未愛爾乃不大宅天命爾乃屑播天命爾乃自作不典圖忱于正我惟時其教告之我惟時其戰要囚之至于再至于三乃有不用我降爾命我乃其大罰殛之非我有周秉徳不康寧乃惟爾自速辜王曰嗚呼猷告爾有方多士暨殷多士今爾奔走臣我監五祀越惟有胥伯小大多正爾罔不克臬自作不和爾惟和哉爾室不睦爾惟和哉爾邑克明爾惟克勤乃事爾尚不忌于凶徳亦則以穆穆在乃位克閲于乃邑謀介爾乃自時洛邑尚永力畋爾田天惟卑矜爾我有周惟其大介賚爾迪簡在王庭尚爾事有服在大僚王曰嗚呼多士爾不克勸忱我命爾亦則惟不克享凡民惟曰不享爾乃惟逸惟頗大逺王命則惟爾多方探天之威我則致天之罰離逖爾土王曰我不惟多誥我惟祗告爾命又曰時惟爾初不克敬于和則無我怨周公曰王若曰者周公以王命誥也因四國有變既定矣乃并諸侯而申告之故曰告爾四國多方也成王已於多士告商之叛民今其辭率推廣多士之書以并告諸侯也殷侯諸侯也皆商之舊臣尹民則長民者也大降爾命誅紂而與民惟新汝非不知之也洪大也洪惟者所思之大也盖言天命靡常在人圖之既畏天命安可不寅恭敬念于祀乎帝之降格監于有夏以夏之先后能畏天命者也而夏之嗣王大厥逸不肯慼言無憂民之言也乃大淫昏而無終日之頃勉行此道爾之所聞也此則多士所謂惟帝降格嚮於時夏弗克庸帝大淫泆有辭是也厥圖帝之命不克開於民之麗者開逹也麗附也麗于善則善麗于惡則惡也既不逹民之麗非所以圖天命也方且酷罰以長亂崇長也甲始也言亂之長始于内也既不能靈承於祭祀又不能大進靖恭之士以寛裕斯民乃敬用叨懫饕餮忿懫之人以殘賊夏邑桀之弗克庸徳慢神虐民其惡若此天惟眷求神主乃大降顯休命于成湯刑殄有夏此則多士所謂惟時天罔念聞厥惟廢元命降致罰乃命爾先祖成湯革夏是也皇天無親惟徳是輔夏王滅徳天不輔之以純徳文王之徳之純所以受天命也爾多方之義民不得在位以長享其爵禄而所恭之多士皆營私専利之人相與虐民而已安得克明此徳以享其民乎至于百為凡百所為大不克開開逹也逹者洞曉也夏之君臣弗率如此惟成湯能以爾多方之諸侯簡在帝心而代夏作民主也慎厥麗乃勸者使之麗於善而皆知勸也以徳行刑民斯知勸也以至於帝乙罔不明徳慎罰先明徳以慎罰則亦知所勸也雖要囚戮之亦甘心焉殺而不怨也開釋無辜者赦過宥罪亦無不知勸也此則多士所謂自成湯至于帝乙罔不明徳恤祀是也今至于爾辟指紂也弗克以爾多方享天之命是以我周亦如湯之得受命也嗚呼者嘆息之辭以誥爾多方也非天庸釋有夏非天庸釋有殷庸用也釋棄絶之也言非天用絶夏商之命夏商自絶之也乃惟爾君以爾多方大淫圖天之命以淫虐圖天命可乎而况屑有辭屑輕也輕出其言以責命于天也乃惟有夏圖厥政不集於享集成也天降時喪所謂時日曷喪也有邦間之上下之情不通也今爾商後王逸厥逸為流連之樂以圖國政也不蠲烝者不能㓗粢以恤祀也天惟降時喪亦如桀之亡也此則多士所謂在今後嗣王誕淫厥泆惟時上帝不保降若兹大喪是也惟聖罔念作狂惟狂克念作聖聖之與狂在于念不念之間人但不能自勉爾天亦憫紂實湯之子孫故須暇之若所謂寛暇之以冀其改過紂大作民主既不克念又不聽人之言天惟求爾多方大動以威出災異以警懼之以開其自新之路俾顧諟天之明命而爾多方無徳可以堪之惟我周王靈承于旅旅祭之大者天用親有徳饗有道也克堪用徳惟典神天此則多士所謂今惟我周王丕靈承帝事是也天惟式教我用休教者非諄諄然命之也使之主祭而百神享使之主事而事治也簡者簡在帝心卑者俾革商命以長爾多方也今我曷敢多誥以我誅三監淮夷及奄以大降爾四國民命不得已而有言也爾曷不忱裕之于爾多方爾曷不夾介乂我周王享天之命者欲諸侯以誠信寛裕之道行於國而夾輔介助我以享天之命也夫普天之下莫非王土率土之濵莫非王臣汝諸侯尚宅爾宅畋爾田言棲息飲啄皆在我域中夫何所逃而曷不順我明天之命乃屢導告之而亂靡有定此不静也皆由爾未有愛君之實不能大安天命又乃輕棄天命其為不静乃爾自作不典典常也言其心無常也不能圖忱于正忱信也皆其自取之也我惟時其教告之戒之也我惟時其戰要囚之戒之不從而罰之也至于再至于三而頑不率化乃有不用我降爾命如三監淮夷及奄是也我乃其大罰殛之誅之遷之踐之理所當然此則多士所謂予亦致天之罰于爾躬是也非我有周秉徳不康寧非我不愛爾皆爾自召也此則多士所謂非我一人奉徳不康寜時惟天命是也嗚呼者歎辭也告爾有方多士諸侯也暨殷多士四國也不告庶民而告士者責其可責者也士服則民服矣今爾奔走臣服我所監臨已五年矣而猶不悛是為之長者當任其責也胥伯諸侯之長小大多正小大之國皆有正有長爾罔不克臬者當無不以法自防也此則多士所謂亦惟爾多士攸服奔走我多遜是也自作不和此心不静也爾當和之脩其身也爾室不睦骨肉相怨也爾當和之齊其家也身脩矣家齊矣爾邑克明能克勤乃事則國治矣此成王周公之誥命不忘大學之道也雖有凶徳悖亂之人撓我之政則亦以和敬在位使之觀感而化忠厚之至也克閱于乃邑謀介者視一國之内求賢以自助也惟能如此故可安于洛邑鑿井耕田而永有養也豈惟如此天亦卑於爾眷爾之從化也此則多士所謂爾克敬天惟卑矜爾是也我有周惟其大介賚爾既助之又錫與之也又當取商之多士迪簡其賢者使之在王左右至於服在大僚言公卿皆爾為也此則多士所謂夏迪簡在王庭有服在百僚是也言爾若從化則尤厚於湯之用夏士是也嗚呼者又歎之也恐其告戒之不從則又曰爾不能勉信我命則亦惟不克享我之爵禄田宅此則多士所謂爾不克敬爾不啻不有爾土是也凡民惟曰不享者爾既不享我之命民不享爾之命上有好者下必有甚焉者矣爾既荒逸偏頗違逺我命則惟爾探天之威犯天之怒我當致天之罰言非我私心也離逖者誅之遷之踐之也此則多士所謂我乃明致天罰移爾遐逖是也王曰我不惟多誥者言我諄諄然不憚煩如此然其所誥不過使爾祗敬知天命所歸又曰者徃日告之今日又告之也言爾初不克敬于和以至於此今當知我之所告皆為爾計則何怨之有使四國暨多方之多士聞此警戒之語當銜恩戴徳革心以化周家之忠厚嘗謂自大誥康誥酒誥梓材召誥洛誥多士以至多方八篇之義皆因商民而作則商民之頑可知矣成湯革夏惟亳民以為不恤我衆至於諸侯則東征西怨南征北怨怨其後來也卒之攸徂之民室家相慶今商民之怨則異是也此成王周公所以告戒之切而歸結於則無我怨其意深矣雖然商民如是之頑成王周公終不忍誅之者以其服商之治已久猶有眷眷不忘其君之心是以不忍誅也兹其所以為忠厚歟竊意周之積累自后稷公劉太王王季文武非不厚也然譬如植木前人植之後人不能培㙲之則根雖固久已撥矣安得枝葉之茂乎周之社稷所以卜世卜年過歴長久者成王周公以忠厚培㙲之力也嗚呼盛哉嗚呼盛哉
