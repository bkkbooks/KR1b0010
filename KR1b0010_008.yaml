body:
  text: 尚書講義卷八宋史浩撰太甲既立不明伊尹放諸桐三年復歸于亳思庸伊尹作太甲三篇此書序也伊尹方立太甲勤勤作訓冀其為明君也不明則昏矣昏君何以主天下伊尹至是不得不使之居廬而自怨自艾也至於思庸庸者用也既思復用則欲聽伊尹之訓已也伊尹之志得矣故此書備載其所以處仁遷義之實則太甲謂之賢聖之君可也雖然以臣放君可乎惟伊尹知太甲必能改過故其廢放之際自信不疑然則伊尹豈可以尋常受遺大臣擬議哉向使太甲無可教之資放而不反伊尹之罪大矣此太甲三篇所以不得不作也太甲上惟嗣王不惠于阿衡伊尹作書此史官之辭也阿者保順衡者持平阿衡之號若吕望之稱太公也使伊尹自稱其號而以不惠歸之嗣王豈非怨詞乎是知史氏紀作書之由故有是言非伊尹之言也曰先王顧諟天之明命以承上下神祇社稷宗廟罔不祗肅天監厥德用集大命撫綏萬方惟尹躬克左右厥辟宅師肆嗣王丕承基緒惟尹躬先見于西邑夏自周有終相亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉祗爾厥辟辟不辟忝厥祖莊周稱伊尹曰強力而忍垢想見當時之人不知伊尹者紛紛之言必不少恕伊尹忍之以成事業此所以為自任也然伊尹之心知湯可以受天命既強之以伐桀得天下於順應成大功於頃刻使斯民復見堯舜之盛伊尹之所操持藴蓄已見效矣苟嗣王不克終厥德而敗乃翁事則伊尹前功俱廢矣成湯所以託孤之義何望哉是以強力堅忍以身當天下之謗而不辭卒之太甲處仁遷義而商家數百年之祀自是而延伊尹豈患失保寵之徒乎蓋以常人當伊尹之時有去而已伊尹之不去知力足以回嗣王之心吾而捨之為德不卒矣是以寧為頑鈍忍耻而必立太甲於無過之地也孟子尊之曰伊尹自任天下之重又曰無伊尹之志則篡也若孟子者可謂知伊尹矣先王顧諟天之明命顧眷也諟許也天之明命眷許成湯遂能承上下神祇社稷宗廟罔不祗肅一言以盡曰敬而已矣敬德之聚也是以天監厥德用集大命而使之撫綏萬方也辟君也克左右其君宅居也師衆也左右其君居集其衆既在尹躬矣嗣王丕承基緒亦在尹躬也伊尹可謂聖之任也先見於西邑夏者夏都在亳之西指其方而言之也言夏之君臣以忠信為周故能克終君不克終相亦罔終伊尹之期嗣王欲其君臣俱有道也嗣王戒哉祗爾為君君不君則辱成湯矣故曰忝厥祖王惟庸罔念聞伊尹乃言曰先王昧爽丕顯坐以待旦旁求俊彥啓迪後人無越厥命以自覆慎乃儉德惟懷永圖若虞機張往省括于度則釋欽厥止率乃祖攸行惟朕以懌萬世有辭惟庸思庸也太甲一聞忝厥祖之戒乃能思庸以聽伊尹之訓已不可不謂之賢君也然既聞矣當尊其所聞念之不能忘可也今乃曰罔念聞是太甲貌從而心猶未服也伊尹能逆知其意故又引先王之勤勞以感動之其曰昧爽丕顯旁求俊彥啓迪後人者蓋言昧爽向明也丕顯大明也成湯自昏至曉不遑安寢思求俊美之士所以開導嗣王也如此可墜厥命以自取顛覆乎慎乃儉德惟懷永圖是其先務也雖然伊尹此書方欲回太甲不明之心豈無他術而必以儉為永圖何哉蓋儉德之共也夫惟儉則玩好弗寶嗜欲弗親中之所存湛若止水萬務之來應而不亂兹實治心之要術也堯舜茅茨土階是德也大禹菲食卑宫是德也乃祖成湯不邇聲色不殖貨利亦是德也嗣王謹之豈不可以為長久之圖乎謹之猶射也括在弦機在手苟不虞乎方張之時而省乎將釋之際則於先王之凖度必差之毫釐繆以千里矣故曰欽厥止率乃祖攸行既能如其所止而欽焉是吾之心術正而知止其所也又能率先王儉德而行焉是射而中的也如是則豈惟尹心悅懌抑嗣王亦有萬世無窮之聞此惟朕以懌萬世有辭之意也王未克變伊尹曰兹乃不義習與性成豫弗狎于弗順營于桐宫密邇先王其訓無俾世迷王徂桐宫居憂克終允德孟子曰惟大人為能格君心之非太甲之未克變豈若後世愎諫遂非而果於不義者之所為乎心之所思尚有纎瑕微纍未能盡去云爾伊尹事君如良醫用藥必欲去疾之根柢而至於十全然後其心乃安故當未變之時求其不義而攻其性習將使嗣王擺去舊染脫然如洗心換骨捨愚而即賢由狂而作聖乃可謂之變也凡人之生性無不善上智下愚卒至背馳非性本然以習而相逺也堯舜之聖性也桀紂之惡習也習之既久安得不與性成人能及其未逺而變焉此所謂不逺復而善補過也伊尹知此既使嗣王弗近於弗順是逺罪也營于桐宫又使嗣王密邇先王之訓是遷善也遷善逺罪豈終迷而弗悟者哉故曰無俾世迷此伊尹以先覺覺後覺之效驗也至是嗣王始往桐宫廬成湯之墓以盡居憂之禮又能念成湯之勤勞而求克終以信其德嗚呼伊尹之格君心非有點鐵成金之力安能使嗣王克變如是哉太甲中惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳作書曰民非后罔克胥匡以生后非民罔以辟四方皇天眷佑有商俾嗣王克終厥德實萬世無疆之休王拜手稽首曰豫小子不明于德自底不類欲敗度縱敗禮以速戾于厥躬天作孽猶可違自作孽不可逭既往背師保之訓弗克于厥初尚賴匡救之德圖惟厥終伊尹以冕服迎王歸于故都冕服祭服為朝于廟也想見伊尹之心知太甲已能處仁遷義企及成湯矣故敢以朝于廟也方其奉王在廟拳拳然思湯所以託孤之義而已所以許湯之心幾乎不濟矣今而獲以聖賢之嗣來朝于庭如奉君之寶玉出使千萬里外無所玷闕復歸之君豈不歡喜慰釋乎而太甲當是時亦必自知茍非伊尹之勤勤雖求為中材庸主不可得而况得見今日乎君臣之間相感之厚相得之歡可不言而喻也昔五子之歌述皇祖之訓曰民可近不可下民惟邦本本固邦寧成湯之心豈外是哉今嗣王賢聖矣可不告以先王所以傳付後嗣之本意乎后君之繼承者辟君之法度者民非君不能相正以生后非民不能臨制四方皇天於商眷佑未衰故使嗣王克終其德豈非萬世無疆之美耶太甲於此既已覺悟當追省昨非以自首露言子不肖是不明于德之故以欲而敗度以縱而敗禮而召禍于其身也使天禍我猶可禳免禍自己召何可逃耶既往前日也背師保之訓不聽伊尹之言也厥初之不善今已自悔矣則正救其惡豈不有望於將來其曰圖惟厥終實成湯改過不吝之心也湯之典刑於是乎在成湯之靈顯顯在廟實式臨之嗚呼賢哉嗚呼聖哉伊尹拜手稽首曰修厥身允德協于下惟明后先王子惠困窮民服厥命罔有不悅並其有邦厥鄰乃曰徯我后后來無罰王懋乃德視乃厥祖無時豫怠奉先思孝接下思恭視逺惟明聽德惟聰朕承王之休無斁太甲既悔過責躬求正救以圖終伊尹得不舉修身協下之要以告之乎修其身使信德協和于下惟明君能之古我成湯以民為子惠及困窮夫困窮之人宜若可緩矣殊不知哀矜無告隂隲下民天道之常有王者作能惠困窮乃合天道堯之告舜曰天之厯數在爾躬允執其中四海困窮天祿永終舜亦以命禹成湯繼三聖之道子惠困窮在所先者則民服其命無有不悅有邦厥鄰咸起來蘇之徯固其所也太甲既率乃祖攸行懋乃后德動視成憲不敢豫而廢時亦不敢怠而忽事上而奉先思孝下而接下思恭思者心之官也思既得之至於耳目之官亦罔不致謹焉孰不為視不逺則不足為明視乃厥祖庸非逺乎孰不為聽不德則不足為聰聽伊尹之訓己庸非德乎嗣王至是變習成之性無不義者而尹亦承王之美為無窮矣太甲下伊尹申誥于王曰嗚呼惟天無親克敬惟親民罔常懷懷于有仁鬼神無常享享于克誠天位艱哉德惟治否德亂與治同道罔不興與亂同事罔不亡終始慎厥與惟明明后易曰重巽以申命申者重之義申誥者以其所言重告之也伊尹之於商可謂社稷之臣矣常人之心諫於其君而不用則有去而已不恤其君之如何也今伊尹幸太甲用其言而底於賢聖矣猶恐太甲折節於將恐將懼之際而解體於將安將樂之時故以已陳之言重復告戒譬如良醫治疾疾既去矣慮其保護之失時而疾疢之復至乃告之以休養調適之方期於長享安平爾此一篇之大旨也夫為君之道上膺天命下受民歸而中享祖宗之佑命之靡常也以敬故親民之難保也以仁故懷鬼神之無常享也以誠故格如是而得天位豈不艱哉彼其栗栗危懼若將隕於深淵誠以造次顛沛未嘗不興念於此三者循是三者德也故能為治否則亂矣古之賢聖之君雖世之相後地之相去千萬之逺至其為治若合符節以道同也其興必然彼桀紂之惡敗端覆轍不謀而同其亡亦然嗣王誠能鑒敗亡之軌轍而求賢聖之用心始乎是而終乎是豈不為慎厥與而為明明之君乎先王惟時懋敬厥德克配上帝今王嗣有令緒尚監兹哉若升高必自下若陟遐必自邇無輕民事惟難無安厥位惟危慎終于始始戒之以慎乃儉德中戒之以懋乃德末戒之以懋敬厥德其誠愈至其言愈詳愛君之意有加而無已也謹則知所擇懋則知所修敬則知所守德至於守則可以終不變也湯用是德克配彼天今王嗣有令緒可不監此以法乎若升高必自下若陟遐必自邇此千里之行起於足下也蓋人君修德不過别白善惡善惡在人始之相去若毫末終有胡粵之殊則吾始行一步可不謹乎是故知稼穡之難則於民事不敢輕知天位之難則於大寶不易處人君嗣位之初非不知此理亦非不知致謹也奈何世已治安矣民已富庶矣四方之貢賦極水陸之珍於口體內庭之器用誇玩好之異於耳目耳目之所接日新口體之所奉益備此心侈矣此志荒矣崇臺榭騁田獵朝歡娛夜宴樂日肆於淫荒之塗溺而不知流而忘反向之民事不可輕之心天位不易處之心已喪之矣雖有善諫不能入也然則人君豈可不以始行一步為標準乎茍慎終如始將與堯舜同條共貫猶吾成湯也捨是則皆始於堯舜而終於桀紂爾嗚呼後世堯舜之治何其寂寥而難得也坐朝之君引堯舜以望其臣進説之臣舉堯舜以譽其君咨嗟景慕似真不可及殊不知嗣位之初此心即堯舜也誠能充是心堅忍而力行使終始惟一堯舜何人哉有為者亦若是而已矣伊尹告嗣王以慎終于始可謂得致君之要術也有言逆于汝心必求諸道有言遜于汝志必求諸非道道本無形視不可見求之於事當於理者是也夫忠言逆耳非逆耳也逆豫心也阿諛順旨非順旨也遜豫志也誠能從其逆豫心者求之其背於理歟苟不背理雖吾心不悅其益我之言也何為而拒之又從其遜豫志者求之其合於理歟茍不合理雖吾志所悅其蠱我之言也何為而受之堯舜之命納言堲讒説不過於此矣伊尹告太甲終於堯舜之道豈非其本心乎今夫人臣食君之祿享君之爵非不知阿諛足以保富貴安榮也誠以所學者堯舜之道苟其君不堯舜吾不得為臯夔稷契死當與草木俱腐爾何名於世哉雖爵祿愈崇厚而吾心益愧耻是故拳拳然責其所難而勢必至於犯顔逆耳也人君於此可不求諸道乎彼不病狂安肯捨富貴而就貧賤捨安榮而就危辱耶蓋嘗論之天下之善言皆不悅於耳天下之善事皆不便於已人君不欲為堯舜則已如欲為之從其不悅於耳者聽之從其不便於已者行之則日加益而不自知堯舜之道不難及也伊尹以此授太甲可謂學道之祕訣也言雖拂意而合道忠言也當聽之言雖順意而非道甘言也當察之嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞君罔以辨言亂舊政臣罔以寵利居成功邦其永孚于休伊尹既言求道之要今復徑指人心之所同然者告太甲太甲至是即道愈深可以語此矣傳曰天下同歸而殊途一致而百慮夫弗慮胡獲慮雖百其致則一弗為胡成途雖殊其歸則同人但見其有思而獲有為而成不知本於無思無為寂然不動之時也至於獲也成也乃感而遂通天下之故爾伊尹又恐太甲不悟其言直曰一人元良萬邦以正夫元者始也良者其善心也以謂一人能寂然不動不失其始善之心則雖曰從事於天下之務有所不思思無不獲有所不為為無不成一言以蔽之曰當理而已夫惟當理則萬邦安得不正乎老子曰我無為而民自化我好靜而民自正夫無為而靜實寂然不動之時也茍當時自失其元良之心安能至是哉人君得是道故能虛心以監先王之法虛已以來天下之言所謂以辨言亂舊政者無有也人臣得是道故寵至而若驚功成而不宰所謂以寵利居成功者無有也蓋君恃辨言以亂政則臣下非引去以全身必緘默以保位矣臣恃寵利以矜功則人君非疑其弄權必惡其貪鄙矣君臣之間方且內懷疑懼如是而欲為堯舜之治是猶却行而求前也其可得乎捨是二者則邦其永信其休德矣嗚呼此伊尹所以致君於堯舜之極摯也
