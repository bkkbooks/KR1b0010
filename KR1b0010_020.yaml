body:
  text: 尚書講義卷二十宋史浩撰吕命穆王訓夏贖刑作吕刑舜典曰金作贖刑當時有苖之國作五虐之刑以毒斯民舜立此科以矯其弊是贖刑起於虞也今不曰虞而曰夏贖刑者蓋以自舜以前鴻荒之世民之質美當舜之時比屋可封刑措無用至禹之興有典有則貽厥子孫贖刑之立實始於禹史謂夏贖刑宜矣揚雄曰唐虞象刑惟明夏后肉辟三千此其證也自禹而下非無此刑要之皆祖夏之遺也穆王享國之久有恤民之心取贖刑之科斟酌損益作為一書以行於世史紀其作而曰訓者以其因舊典而訓釋之也吕刑惟吕命王享國百年耄荒度作刑以詰四方王曰若古有訓蚩尤惟始作亂延及于平民罔不寇賊鴟義姦宄奪攘矯䖍苖民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刵椓黥越兹麗刑并制罔差有辭民興胥漸泯泯棼棼罔中于信以覆詛盟虐威庶戮方告無辜于上上帝監民罔有馨香德刑發聞惟腥皇帝哀矜庶戮之不辜報虐以威遏絶苗民無世在下乃命重黎絶地天通罔有降格羣后之逮在下明明棐常鰥寡無蓋皇帝清問下民鰥寡有辭于苗德威惟畏德明惟明乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉穀三后成功惟殷于民士制百姓于刑之中以教祗德穆穆在上明明在下灼于四方罔不惟德之勤故乃明于刑之中率乂于民棐彝典獄非訖于威惟訖于富敬忌罔有擇言在身惟克天德自作元命配享在下王曰嗟四方司政典獄非爾惟作天牧今爾何監非時伯夷播刑之迪其今爾何懲惟時苗民匪察于獄之麗罔擇吉人觀于五刑之中惟時庶威奪貨斷制五刑以亂無辜上帝不蠲降咎于苗苗民無辭于罰乃絶厥世王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格命今爾罔不由慰日勤爾罔或戒不勤天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三德一人有慶兆民賴之其寧惟永案以上講義永樂大典原缺王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及兩造具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過五過之疵惟官惟反惟內惟貨惟來其罪惟均其審克之五刑之疑有赦五罰之疑有赦其審克之簡孚有衆惟貌有稽無簡不聽具嚴天威墨辟疑赦其罰百鍰閲實其罪劓辟疑赦其罰惟倍閲實其罪剕辟疑赦其罰倍差閲實其罪宫辟疑赦其罰六百鍰閲實其罪大辟疑赦其罰千鍰閲實其罪墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千上下比罪無僭亂辭勿用不行惟察惟法其審克之上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要罰懲非死人極于病非佞折獄惟良折獄罔非在中察辭于差非從惟從哀敬折獄明啓刑書胥占咸庶中正其刑其罰其審克之獄成而孚輸而孚其刑上備有并兩刑穆王既告牧伯又告同姓之諸侯今此所告凡有邦有土者以其小大之臣均當奉行此法故也祥刑者善用其刑也在今爾安百姓者兆民賴之也何擇非人用刑在於得人也何敬非刑行吾敬惟在用刑也何度非及凡所忖度惟在刑之所及及者如曰懼將及之及思其罪之所及也兩造具備師衆也與衆共聽之也五辭訟牒也其曰五辭者五方之辭也簡孚者核實也乃正于五刑五刑不簡有疑而不實也乃用五罰贖刑之議興矣五罰不服不應贖也乃正于五過過則聽其改是從赦原也此舜所以明五刑以弼五教而戒其臣曰在寬之意也穆王可謂知此道矣至於五過則是赦罪之科弊自此生故曰五過之疵不可不審克之也曰惟官者在官之勢可挾也惟反者反覆變詐也惟內者內親用事也惟貨者官吏受賄也惟來者素所往來之私也此五者若俗所謂情弊也故總謂之疵其罪惟均者以情弊而故出人之罪則以其罪罪之也五刑五罰皆以疑而赦原所謂罪疑惟輕也簡孚有衆者核實而合於衆心也惟貌有稽者周官小司冦以五聲聽獄訟求民情色聽氣聽之類是也無簡不聽具嚴天威者敬天之威不敢輕用刑殺也墨辟黥也劓辟刃鼻也剕辟刖足也宫辟奄也大辟殺也凡此五罪有疑則赦之因以贖論罰之各有等差又當視其初犯如何故曰閲實其罪也然夏之五刑三千周官司刑所掌墨劓刖宫殺則總二千五百是周之刑簡穆王增之三千矣將以省刑而復增之何哉蓋贖刑重則正刑輕矣非穆王增之也夏之法當然也或曰周有常刑穆王當不亂舊章何取乎夏乎蓋以時不同故也文武承商紂之虐比屋可誅制刑不得不重禹承堯舜之後穆王承成康之後其民好善而不輕犯法其刑不得不輕穆王可謂知時變矣是以周官司刑殺罪五百吕刑大辟止二百也蓋當穆王時民無犯非禮况犯法乎大辟之罪姑存此條爾所謂刑平國用中典其以此歟上下比罪無僭亂辭是其情犯無疑也當必行之然猶惟察惟法審聽其辭而概之以法也上刑重刑也而適輕下服宥過無大也下刑小罪也而適重上服刑故無小也刑罰不可執一而不變故曰有權而世輕世重不可齊一以倫要皆有典則也罰所以懲惡非惡而以罰懲適以病民是以哀矜勿喜之心惟循良者有之下此則得其情而必喜矣故凡刑法莫非率人以中茍懷是心安得過差察辭于差者差錯也辨訴紛糾惟從本情不以僞亂也如此則妄訴不行矣哀敬以折獄則明啓刑書而占之咸庶中正若俗所謂照條也條則無不中正也孚者信也如是則獄成而可信不疑矣輸者上之也上之則君安得而不信乎有并兩刑俗所謂二罪俱發也亦并上之惟上所斷則臣下之用刑不得自専矣穆王告羣臣以用刑凡四曰其審克之可見其明謹而不敢忽矣王曰嗚呼敬之哉官伯族姓朕言多懼朕敬于刑有德惟刑今天相民作配在下明清于單辭民之亂罔不中聽獄之兩辭無或私家于獄之兩辭獄貨非寶惟府辜功報以庶尤永畏惟罰非天不中惟人在命天罰不極庶民罔有令政在于天下穆王又告官伯族姓官伯官之長族姓族之尊此告同姓異姓之大臣也朕言多懼言刑不可以易言戰戰兢兢以言之敬刑故有德以將之則為刑若無其德是酷虐也德者何中也今天相民以生聖君又生賢佐以佑斯民前已言配享在下今又言作配在下表夫皇天之生聖賢皆欲配天之德以謹刑也然則重黎三后之生非皇天命之乎惟其用中故明清于單辭單辭一人之言也不待質證而得其情非夫得中之人則安有不惑乎茍得中矣雖事物紛至而沓來不待詰問情僞不得而逃非明清則不能也蓋以民之治罔不以中中則兩辭必有折衷豈復有私家之患乎私家者非公而忘私國而忘家之人也既曰私家必總于貨必辜有功總貨則悖辜功則誣刑安得平乎天實報人庶尤交作罪叢一身可不懼哉是以聖賢之人茍知用中則所永畏者刑罰也天之罰之非天不中惟人在命自取也天罰不極極中也庶民罔有令政在于天下夫既不中天下皆惡政也吁可畏哉王曰嗚呼嗣孫今往何監非德于民之中尚明聽之哉哲人惟刑無疆之辭屬于五極咸中有慶受王嘉師監于兹祥刑穆王既告伯父伯兄仲叔季弟幼子童孫矣兹又告嗣孫何哉蓋前告童孫王族之裔也行法之人也今告嗣孫王之嫡孫也故其所言皆君道何監非德以明道之以德則民有恥且格覿德則民皆歸中所謂民心罔中惟爾之中也哲人惟刑無疆之辭永有令聞也五刑既皆得中有慶必受王之善衆而纘承之監于兹祥刑者皆因謹刑而致也嘗謂周之有天下文武成康之下惟穆王可為賢聖之君觀孔子定書取其三篇君牙之教民伯冏之御下吕刑之治罰皆眷眷不忘為君之道而其卒也明章聖人之用中此與堯舜惟精惟一相授受者無以異也乃知其心深得此道可以襲堯舜三代之𫝊也而耄期倦勤思欲脫屣萬乘為逍遙遊周行天下使天下皆有車轍馬跡焉後世有列禦寇者托其遺說以謂穆王嘗駕八駿至于巨搜氏之國觴西王母于瑶池漢儒信其荒唐之言遂鄙其人謂耄荒為耄亂荒忽後人祖述其意和為一談至有作穆天子𫝊以附會者遂使穆王墮於昏君之域殊不知穆王雖起是念一聞祭公謀父祈招之詩遂止不行此亦從諌如流善補過者也𫝊曰一言之違駟馬莫追穆王是也胡不觀孔子之意乎孔子定書取是三篇示人主以軌範必其人之可師也則不信孔子而信列禦寇郭璞者亦愛竒之過也故於此不可不辨平王錫晉文侯秬鬯圭瓚作文侯之命犬戎之禍酷矣平王尚能收拾餘民以為東周振乾綱於弛紐回既倒之狂瀾亦可謂有功矣若非文侯尊奬王室述諸侯之職其焉能爾平王不得不報文侯也錫以黃流玉瓉晉之祖廟得用之矣既賜弓矢則是為方伯也昔衛國有狄人之敗出處于漕齊威公救而封之衛人作詩曰投我以木瓜報之以瓊琚言施雖薄而報當厚也則平王之賞不為過矣文侯之命王若曰父義和丕顯文武克慎明德昭升于上敷聞在下惟時上帝集厥命于文王亦惟先正克左右昭事厥辟越小大謀猷罔不率從肆先祖懷在位嗚呼閔豫小子嗣造天丕愆殄資澤于下民侵戎我國家純即我御事罔或耆壽俊在厥服豫則罔克曰惟祖惟父其伊恤朕躬嗚呼有績豫一人永綏在位父義和汝克紹乃顯祖汝肇刑文武用㑹紹乃辟追孝于前文人汝多修扞我于艱若汝豫嘉王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹父往哉柔逺能邇惠康小民無荒寧簡恤爾都用成爾顯德文侯平王命為方伯而曰父者尊之也而繼之以名作命之法也丕大顯明之文武克慎明德昭升于天敷聞于世天乃集命文王文王受命作周也亦惟先正能左右其君小大謀猷罔不率從故後王世世得嗣其位而我小子遭家不造造天丕愆天不眷祐膏澤不下於民罪皆在巳犬戎侵陵敗國喪家其禍甚大即我御事耉老成人無一在位我則不克享于成命當此家難若有同姓之諸侯如祖如父恤我此身使我永綏在位豈非有功乎汝獨能明乃祖之忠始儀刑文武用㑹續我命汝追孝于前文人此歸德於文侯之詞也汝多扞衛我于艱難豫實汝嘉今功成矣告歸其國矣是用賚汝以秬鬯一卣卣者以實酒之尊也使歸以酎祖廟告其為方伯也古者賜弓矢然後得専征伐朱弓黑矢天子錫有功諸侯之具也其勉勵之言曰柔逺能邇惠康小民無荒寧欲其勤恤爾都撫綏其國用成爾之顯德夫有功者必有德以將之平王欲其以德保成功真王言也竊嘗謂平王東遷周公實知之周公之於國默計於數百歲後方周之興禍之所伏近在商民而逺在犬戎是故營洛以遷商民實為國家培植其基以遺後嗣也商民叛服不常率能化之以歸於正而犬戎之禍洛得以為王都矣向使周公不曽營洛則商民散徙為亂未艾而洛邑荒蕪未必可都平王方倀倀然無所之又安能保東周之治乎周公之治國如奕秋觀奕一局之勢自始至終料其勝負不差毫釐非明照至理其能如是乎以此知周公化服商民實為周家消萬世無窮之禍營治洛邑又為周家建萬世不拔之基一舉而二事俱利郟鄏定鼎之期可不卜而知也周公有勳勞於天下其在是乎惜乎平王不能側身修行勤於政事以自治修車備器薄伐玁狁以復讎如宣王之中興是以黍離降而為國風也孔子曰如有用我者吾其為東周乎蓋傷平王無志於恢復而又無仲山甫方召之徒為之宣力也魯侯伯禽宅曲阜徐夷並興東郊不開作費誓伯禽有國在周公既沒之後史曰宅曲阜蓋紀其始至也始至而有戎夷之難故有是役也按禮曽子問篇子夏問曰三年之喪卒哭金革之事無避也者禮歟孔子曰吾聞諸老聃曰昔者魯公伯禽有為為之也解曰魯侯急王事不得已也彼其哀戚搶攘中而號令之嚴如此豈非家學所𫝊義方素明故歟費誓公曰嗟人無譁聽命徂兹淮夷徐戎並興善􅙀乃甲胄敿乃干無敢不弔備乃弓矢煆乃戈矛礪乃鋒刃無敢不善今惟淫舍牿牛馬杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑馬牛其風臣妾逋逃勿敢越逐祗復之我商賚汝乃越逐不復汝則有常刑無敢寇攘踰垣牆竊馬牛誘臣妾汝則有常刑甲戌我惟征徐戎峙乃糗糧無敢不逮汝則有大刑魯人三郊三遂峙乃楨幹甲戌我惟築無敢不供汝則有無餘刑非殺魯人三郊三遂峙乃芻茭無敢不多汝則有大刑淮夷既叛徐戎並興魯公倉卒之間處之若無難者蓋軍旅之興所當備而取勝者不過利器械畜牛馬嚴軍律禁竊盜積糗糧築營壘備芻茭惟此七事於行軍用師闕一不可魯公於此皆備豫不虞可謂得治軍之要矣何謂利器械甲胄貴􅙀􅙀簡也干貴敿敿施也弓矢貴備弓調矢利也戈矛貴于鍛鍛者鍊也鋒刃貴于礪礪者淬礪也如此則器械利矣故曰無敢不弔弔善也何謂畜馬牛軍之所止必大放牧彼有捕獸之機檻必當杜塞彼有陷獸之坑阱必當敜窒無使傷牛馬牛馬傷則汝有刑如此則牛馬畜矣何謂嚴軍律馬牛遁逸奴婢淫奔不當越隊伍而捕逐馬牛奴婢之失其害小而部伍不整其害大若他人捕獲敬以復還當議行賞若越逐不復是俗所謂逃軍也能免刑乎如此則軍律嚴矣何謂禁竊盜夫寇攘劫奪也踰墻垣穿窬奔竄也他人之馬牛盜而殺之他人之僕妾誘而匿之刑亦不可逃矣如此則竊盜禁矣何謂積糗糧夫三軍待餔不可一日無食無食則爭奪逃亡無所不至軍何由治茍有不逮則有大刑如此則糗糧積矣何謂築營壘夫楨幹板築之具也軍之所至惟恃壘壁茍無其具則暴露矣是以不供則有無餘刑無餘者全家囚繫必待其供而後釋之故曰非殺也如此則營壘築矣何謂備芻茭夫牛馬之行芻茭不飽何以用其力聚之不多則有大刑如此則芻茭備矣七者既修則軍勢强矣以此而行師則戰必勝而攻必取矣戎夷何足慮哉方軍之行必用軍法常刑輕也大刑重也而所謂三郊三遂者諸侯四郊有四遂遂有大夫東郊既用兵其所供億者三郊三遂也嗚呼魯公可謂得行軍用師之道矣孟子曰春秋無義戰蓋以當時諸侯不知自治之道惟怙勢以相侵伐故也觀魯公治軍備之先具如此則非驅市人而戰也嗟乎後世不知彼已不恤備之未具譊譊然惟以殺伐為說昧者何知第聞其語莫不以為正論一人唱之衆人和之及一敗塗地則鉗口結舌不復言兵聞魯公之風亦可少愧矣向非魯公得乃父之緒餘何以有此讀書者知其成功自有所本則思過半矣秦穆公伐鄭晉襄公帥師敗諸崤還歸作秦誓穆公以列國霸者不聽忠言咈人自用敗而還師實不足道而聖人乃取其書終百篇之義疑弗類也然即其悔過憂畏自責若無所容其軀一念之萌發於誠實天地為之震動鬼神為之辟易聖人豈不有感於中而為之登載其言乎𫝊曰禹湯罪已其興也勃焉穆公之謂也秦誓公曰嗟我士聽無譁豫誓告汝羣言之首古人有言曰民訖自若是多盤責人斯無難惟受責俾如流是惟艱哉我心之憂日月逾邁若弗云來惟古之謀人則曰未就豫忌惟今之謀人姑將以為親雖則云然尚猷詢兹黃髮則罔所愆番番良士旅力既愆我尚有之仡仡勇夫射御不違我尚不欲惟截截善諞言俾君子易辭我皇多有之昧昧我思之如有一介臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉人之有技冒疾以惡之人之彥聖而違之俾不達是不能容以不能保我子孫黎民亦曰殆哉邦之杌隉曰由一人邦之榮懷亦尚一人之慶按此篇講義永樂大典原闕
