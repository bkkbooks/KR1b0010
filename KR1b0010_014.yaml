body:
  text: 尚書講義卷十四宋史浩撰成王旣伐管叔蔡叔以殷餘民封康叔作康誥酒誥梓材周公旣成洛邑遷商頑民其富家大族所謂怙侈滅義驕淫矜夸閑之惟艱者皆已在洛矣則留商者實餘民也周公憂深思遠又慮餘民狃於故習復萌三監之志故命康叔以鎮撫之使無表裏之助則周室安矣康叔者周公之愛弟康乃其所食之邑若管蔡是也周公懲創二叔之不咸乃擇其弟之賢者立之作書三篇康誥者告其為政之大要酒誥者革其風俗之沈湎梓材者成其有國之規模也卒使衛之國祚過于齊魯而遺風餘烈至春秋時猶多君子則康叔者真不負成王周公之付託也嗚呼休哉康誥惟三月哉生魄周公初基作新大邑于東國洛四方民大和㑹侯甸男邦采衛百工播民和見士于周周公咸勤乃洪大誥治自惟三月哉生魄竊意乃史官之紀非周公之書也自王若曰則皆誥辭也惟三月哉生魄者哉始也月始生魄十六日也魄隂類也魂陽而魄隂故生明則屬陽生魄則屬隂月盈則虧虧則月漸不明以虧之始為主也周公初基洛而作新其城邑旣成而四方之民乃大和㑹和㑹者歡欣鼓舞而輻輳于洛必曰周者以表周之洛邑也豈惟民皆鼎來而和氣仁聲洋溢于諸侯侯甸男邦采衛亦皆遣其臣來朝故曰見士于周或謂士當作事非也記曰列國之大夫入天子之國曰某士自稱曰陪臣某則見士于周者見其大夫于洛也周公咸勤者勤勞也勞使者之來也大誥者成王敘武王之勲而勵諸侯以伐三監之書也今三監旣即誅乃推大誥之意而將申之以治道也王若曰孟侯朕其弟小子封惟乃丕顯考文王克明德愼罰不敢侮鰥寡庸庸祗祗威威顯民用肇造我區夏越我一二邦以修我西土惟時怙冒聞于上帝帝休天乃大命文王殪戎殷誕受厥命越厥邦厥民惟時敘乃寡兄朂肆汝小子封在茲東土王曰嗚呼封汝念哉今民將在祗遹乃文考紹聞衣德言徃敷求于殷先哲王用保乂民汝丕遠惟商耉成人宅心知訓别求聞由古先哲王用康保民𢎞于天若德裕乃身不廢在王命王曰嗚呼小子封恫瘝乃身敬哉天畏棐忱民情大可見小人難保徃盡乃心無康好逸豫乃其乂民我聞曰怨不在大亦不在小惠不惠懋不懋已汝惟小子乃服惟𢎞王應保殷民亦惟助王宅天命作新民王曰嗚呼封敬明乃罰人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺王曰嗚呼封有敘時乃大明服惟民其勑懋和若有疾惟民其畢棄咎若保赤子惟民其康乂非汝封刑人殺人無或刑人殺人非汝封又曰劓刵人無或劓刵人王曰外事汝陳時臬司師茲殷罰有倫又曰要囚服念五六日至于旬時丕蔽要囚王曰汝陳時臬事罰蔽殷彝用其義刑義殺勿庸以次汝封乃汝盡遜曰時敘惟曰未有遜事已汝惟小子未其有若汝封之心朕心朕德惟乃知凡民自得罪寇攘姦宄殺越人于貨暋不畏死罔弗憝王曰封元惡大憝矧惟不孝不友子弗祗服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔茲不于我政人得罪天惟與我民彝大泯亂曰乃其速由文王作罰刑茲無赦不率大戛矧惟外庻子訓人惟厥正人越小臣諸節乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝巳汝乃其速由茲義率殺亦惟君惟長不能厥家人越厥小臣外正惟威惟虐大放王命乃非德用乂汝亦罔不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則予一人以懌王曰封爽惟民迪吉康我時其惟殷先哲王德用康乂民作求矧今民罔迪不適不迪則罔政在厥邦王曰封予惟不可不監告汝德之說于罰之行今惟民不靜未戾厥心迪屢未同爽惟天其罰殛我我其不怨惟厥罪無在大亦無在多矧曰其尚顯聞于天王曰嗚呼封敬哉無作怨勿用非謀非彝蔽時忱丕則敏德用康乃心顧乃德遠乃猷裕乃以民寧不汝瑕殄王曰嗚呼肆汝小子封惟命不于常汝念哉無我殄享明乃服命高乃聽用康乂民王若曰往哉封勿替敬典聽朕告汝乃以殷民世享周公奉成王之命以告康叔故敘王若曰孟侯孟侯長侯也康叔實周公之弟而曰長侯者周之宗盟異姓為後同姓之國封實為長若所謂方伯也惟乃丕顯考文王封之父也丕大也顯明也丕顯哉文王之明德也夫大誥止敘武王之勲至是推原本所以致武王之勲者文王也此洪大誥治之證也文王之治無他道不過明德慎罰不敢侮鰥寡庸庸祗祗威威以顯民而已夫德者歴代聖人之所尚故文王明以揚之觀太誓之書曰若日月之照臨光于四方顯于西土惟我有周誕受多方非明德以顯民乎罰者聖人不得已而用故文王謹以將之觀立政之書曰文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶獄庶慎文王罔敢知于茲非慎罰以顯民乎不侮鰥寡者𤼵政施仁以此先之觀無逸之書曰文王卑服即康功田功徽柔懿恭懐保小民惠鮮鰥寡非不侮以顯民乎庸庸用人也觀棫樸之詩曰遐不作人追琢其章金玉其相勉勉我王綱紀四方非庸庸以顯民乎祗祗畏天也觀大明之詩曰小心翼翼昭事上帝聿懐多福厥德不囬以受方國非祗祗以顯民乎威威服衆也觀皇矣之詩曰王赫斯怒爰整其旅以遏徂莒以篤周祜以對于天下非威威以顯民乎文王顯民之治備見於詩書今告康叔之辭欲其推廣文王之治以治其國也用肇造我區夏者言文王之德始大有平天下之具非謂得天下也武成謂以撫方夏後世之贊辭也越我一二邦以修若虞芮之人視文王愛之真若父尊之真若天父所依怙天所覆冒也宜乎升聞于上帝上帝垂休天命有歸也誕受厥命者受命而未得其位也其所謂殪戎商者或者謂殪為殺非也盖自此周道勃興商道淪喪也若西土之邦西土之民則惟時敘也武王因之得以勉就伐功故曰乃寡兄勗而封得以在茲東土者武王紹文王之力也所謂文王有明德故天復命武王也周公旣陳先王致治之由而又訓之使念其父兄今民將在敬循乃文考紹聞服其德言猶以為未足又使之敷求商先哲王之德以保乂民夫商自成湯之後賢聖之君六七作其流風善政猶有存者豈不可以景行先哲而成治乎猶以為未足又使求商之老成人宅心知訓又尚論古之哲王如堯舜禹之德用康保民乃大合天心順我之德以裕乃身不廢今之王命集是數者則康叔之德可以永保其國矣康叔之德已能裕乃身而周公猶訓之曰恫瘝疾痛也如疾痛在身以行其敬上以畏難諶之天命下以防難保之小人慄慄危懼以盡其心罔有逸豫則下民俾乂矣周公又曰我聞怨無大小不當有也愚夫愚婦一能勝予欲其無怨惠其不惠勉其不勉乃服惟大我先王之德因以保商民亦以助我王宅天命作新斯民斯民始得歸化也此周公旣陳文王之明德而使康叔因文王之德而求商先哲王之德商耉老成人之德古先哲王之德以洪天之德于以保民則所以紹述文王之明德至矣盡矣敬明乃罰者惟敬以持心則從恕明以行之則無私文王不得已而用刑視其民如傷慎罰之實也人有小罪非眚非大過也過雖㣲而不能改惟終行之以為常乃其自作之孽是過也積之將至於大而不可解矣是則雖小而必罰也若罪大不終遂其非能知所犯出於過誤而求有以自新是則雖大而可赦也此宥過無大刑故無小之義也非慎罰而何殺與不殺斯理較然封能知此則有敘時乃大明其法則民服矣民茍服則自相飭勉而底於和協無犯非禮矣汝視民之被刑罰如身有疾痛民斯遷善遠罪而畢棄咎矣其視民如保赤子民斯不忍欺而康乂矣其殺不殺皆天子之法重則刑殺輕則劓刵皆非汝封所可專也故曰非汝封刑人殺人又曰非汝封劓刵人刑殺其可輕用乎哉王又曰外事外事者諸侯之所當事也臬猶門之有闑防民之其所謂法也汝布陳其臬司旣主行我之法又當師商罰之有倫者旣考商之法意又考商之民情取其要而服念之於五六日至於旬時乃得其要而大斷之慎罰之意著矣汝陳是臬事考商之典刑而斷之用其義刑義殺者皆良法也勿庸者刑期於無刑也以次汝封隱之於心乃盡順則曰時敘惟曰未有順事猶以為未足也非慎罰乎諸侯未有若汝封之心我心我德惟汝知之康叔若不以恕存心則周公此言不能入矣凡民自得罪者自作孽也㓂攘姦宄殺人以奪其貨財剛強而不畏死人無不惡之者又况元惡大憝不慈不孝不友不恭得罪于為政之人尤深也天生烝民有物有則民之秉彝而不慈不孝不友不恭豈非大泯亂乎泯亂者彝倫攸斁也乃其自取文王之罰則其可赦乎雖不赦亦未許封遽殺之謹之至也爾雅曰戛常也不率大常不遵法度也矧惟外庶子訓人惟厥正人越小臣諸有符節者皆有官君子也茍不率大常亦不在赦之科汝當分别播告以造民大譽若弗念我言不用我法是曠厥為君之道是汝長惡我實惡之茍速由茲義率之殺之汝得為君為長之道矣不然則旣不能宜其家彼小人及外正人之吏皆肆威虐而違王命矣是無德以致治也汝當罔不克敬典典常也凡厥寛民惟文王之敬忌是法民旣裕曰我惟有及於古之人則我一人無不恱懌嗚呼行文王所以慎罰之道至矣盡矣成王旣告康叔以明德慎罰之道又教其所以行文考之明德慎罰不侮鰥寡庸庸祗祗威威顯民之要曰爽惟民迪吉康爽者明也若能如我前所陳皆所以迪民於吉康也迪導之也若所謂躋民於仁夀之域也凡民之生皆有常性君不迪之無由自明我時其惟商先哲王皆有康乂斯民之德作求者徃敷求於商先哲王也汝勿謂商民不可治汝迪之則無不從也不迪則無政事矣無政事則何以為邦乎我不可不監告汝德之說民知德之說則罰斯可行盖不先以德而惟罰是用民無所措手足矣何治之有今民亂靡有定是不靜也定則知所戾止知其所止則君臣父子之道敘矣今曰不靜未戾厥心是民未能止其所也迪屢未同者雖屢迪之心猶未同非民之罪迪之未至也明惟天其罰殛我我其不怨者百姓有過在予一人天降罰于我以我不能迪也夫何怨之有惟厥罪無在大不可謂小惡為無傷也亦無在多不可謂細行不能累徳也而况顯聞于天者乎成王戰戰兢兢懼𫉬罪於天也如此康叔安得不敬乎敬哉無作怨怨其豈可作乎作怨者用弗詢之謀起匪彝之念也當蔽之以忱誠大取法敏徳用安汝心審汝徳逺汝猷則寛裕而民斯安我則不汝瑕玷不汝殄滅矣盖天命靡常天若罰我我尚不敢怨汝其可不念哉茍其念之則不至棄絶我之命矣享者享國也既享則當明汝服行之命髙汝聪之聽斯民其有不康乂者乎至此則所以行文王明徳慎罰不侮鰥寡庸庸祗祗威威顯民之效至矣盡矣王若曰者周公奉成王之辭於始曰王若曰矣今復以此終之也周公謂我之言皆王命也勿替敬典者一篇之㫖不出敬典汝聽我所以告汝之言乃以商民世享世享者世世享徳也嘗考衛國之政若武公之睿聖文公之好善可謂是有其人矣豈惟如此雖靈公之無道猶能免乎喪邦以至亡秦之世惟衛獨享國四十世九百年與周匹休則世享之言驗矣此皆康叔之遺澤也向使康叔不克敬典不聽成王周公之告則子孫享國安能如是之長乆耶嗚呼康叔者亦可謂聖人之徒矣酒誥此篇成王告康叔以商人化紂之沈湎當明酒禁故以酒誥别之其實亦告康叔之辭故一篇之義莫非戒酒先王設酒醴本為祭祀養老合歡皆欲成禮若夫流連荒亡至於敗國喪家亡人豈先王之意哉紂之不善惟此為甚此酒誥之所以作也王若曰明大命于妹邦乃穆考文王肇國在西土厥誥毖庶邦庶士越少正御事朝夕曰祀兹酒惟天降命肇我民惟元祀天降威我民用大亂喪徳亦罔非酒惟行越小大邦用喪亦罔非酒惟辜文王誥教小子有正有事無彝酒越庶國飲惟祀徳將無醉惟曰我民迪小子惟土物愛厥心臧聰聽祖考之彝訓越小大徳小子惟一妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母厥父母慶自洗腆致用酒庶士有正越庶伯君子其爾典聽朕教爾大克羞耉惟君爾乃飲食醉飽丕惟曰爾克永觀省作稽中徳爾尚克羞饋祀爾乃自介用逸兹乃允惟王正事之臣兹亦惟天若元徳永不忘在王家王曰封我西土棐徂邦君御事小子尚克用文王教不腆于酒故我至于今克受殷之命王曰封我聞惟曰在昔殷先哲王廸畏天顯小民經徳秉哲自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧曰其敢崇飲越在外服侯甸男衛邦伯越在内服百僚庶尹惟亞惟服宗工越百姓里居罔敢湎于酒不惟不敢亦不暇惟助成王徳顯越尹人祗辟我聞亦惟曰在今後嗣王酣身厥命罔顯于民祗保越怨不易誕惟厥縱淫泆于非彝用燕喪威儀民罔不衋傷心惟荒腆于酒不惟自息乃逸厥心疾很不克畏死辜在商邑越殷國滅無罹弗惟徳馨香祀登聞于天誕惟民怨庶羣自酒腥聞在上故天降喪于殷罔愛于殷惟逸天非虐惟民自速辜王曰封予不惟若兹多誥古人有言曰人無於水監當於民監今惟殷墜厥命我其可不大監撫于時予惟曰汝劼毖殷獻臣侯甸男衛矧太史友内史友越獻臣百宗工矧惟爾事服休服采矧惟若疇圻父薄違農父若保宏父定辟矧汝剛制于酒厥或誥曰羣飲汝勿佚盡執拘以歸於周予其殺又惟殷之廸諸臣惟工乃湎于酒勿庸殺之姑惟教之有斯明享乃不用我敎辭惟我一人弗恤弗蠲汝事時同于殺王曰封汝典聽朕毖勿辯乃司民湎于酒明大命于妹邦者欲令康叔明其大教于紂之邦妹邦朝歌紂之舊都成王周公既已遷其民于洛則土著不去者皆餘民也既居其地風俗未易革不得不諄諄告戒之也穆考者文王在周世次為穆故武王為昭載見之詩曰率見昭考謂武王也西土豳岐鎬之地庶邦諸侯庶士諸大夫少正御事羣小臣也皆得以酒祀其先惟天降命肇我民惟元祀者若曰有生以來惟聞以酒為祀未聞許之飲也以亂而喪徳皆因後世嗜之而忘反故曰亦罔非酒為行以罪而喪邦皆因後世嗜之而生禍故曰亦罔非酒惟辜文王誥教小子教其臣下有正有事無以酒為常庶邦之飲惟祀事訖始得飲福一獻之禮賔主百拜焉是以徳將之而無酒禍也今惟曰我民廸小子民皆視汝以為唱也惟土物者妹土之人物也謂商民本善其所以不善非民之罪紂之不善所化也愛厥心臧者惜其本善之心為紂所化故欲使之聰聽祖考之彝訓而化汝之徳小大之人與汝為一安得酒困乎此徳將之謂也妹土嗣爾股肱純者商民若繼以汝股肱而輔翼其純徳則必能藝其黍稷勤勞以事父兄所謂壯者以暇日修其孝弟也肇牽車牛逺服賈用孝養厥父母者又能懋遷其有無以致養厥父母父母乃喜咸自洗腆洗腆者蕭散優游之貌於時可以致用酒矣庶士有正庶伯君子者皆士大夫也在爾常聽我教爾大克羞耉惟君盖能明養老之義則克盡為君之道爾乃可以飲食醉飽矣其大者惟曰爾克永觀省祖考之彝訓考中正之徳猶不忘元祀克羞饋祀則爾自大其道兹乃允惟王有正有事之臣有正者大臣有事者小臣小大之徳與爾為一矣天亦順爾元徳令爾永不忘在王家以此觀之酒惟祭祀養老得用之民其可飲乎西土棐徂棐徂者不逺也諸侯御事小子尚克用文王教不厚于酒故我得至于今克受天命王曰我聞商先哲王廸畏上天明著小民經徳常徳也秉哲持智也自湯至帝乙成王畏相者能成王徳以畏相故也畏相者重其輔相也惟御事之臣亦能行恭敬之徳無敢暇逸其敢有心於會飲乎外之諸侯既不敢内之百官衆尹宗工與夫里居之士夫庶姓皆不敢湎于酒不惟不敢亦不暇者既各有職有事以助王之顯徳是上欲祗君下欲辟民豈暇飲酒乎在今後嗣王酣身者紂既沉湎六府漫漫四支綿綿不知其身之屬我也憒憒然豈復能造命以事天乎其祗其保皆懐怨不可變易大惟其縱肆淫泆于非常用燕安以喪其威儀民罔不䀌然傷心夫抑抑威儀惟徳之隅紂既酣身是無徳以將蕩蕩然矣民烏得不傷心乎既荒腆于酒不思自止其過乃恣厥心之疾很不克畏死又烏知天命之難諶乎彼方使民攘竊其犧牷牲用以謂將食無災安能薦酒醴為馨香之祀乎去先王為酒之義逺矣天之監觀豈不聞乎民之怨氣登聞于天庶羣酣酒腥聞在上故天降喪于商而無愛商之心矣天非虐商人自取之爾予非多誥人無於水監當於民監夫水之監形不過别其妍醜民之為監以其治亂興亡無一不在也商既墜命我其可不監以撫于時乎此教康叔以商監不逺之義也予自以告汝以劼毖之道劼固毖謹也與商之善臣侯甸男衛之諸侯况又有太史内史為汝之友乎彼善臣百宗工况惟爾事服休之賢者服采之能者乎况又有圻父農父宏父之三卿乎夫大國三卿圻父司馬也可順以疇咨農父司徒也可教以逺罪宏父司空也可順以安民定辟者可以安其君位而制于酒則沉湎之俗可移矣剛制者彊禁之若欲丕變其習不可不以剛制也既曰剛制又慮康叔為已甚之政勇於殺人則又為之法曰厥或告曰羣飲羣飲者君旣禁酒人當畏戢而尚羣飲實無忌憚也有告之者當不可縱勿使之逋逃也盡執拘以歸于周予其殺者不用康叔專殺也予其殺若今之法當議處斬非皆殺之也禁止之辭欲其知畏當如是言也何以知之至言商之臣工湎于酒則曰勿庸殺之姑惟教之此成王之本心也此周家之忠厚也惟其如此則汝當斯明享明享其國也若不用我教辭我亦弗恤汝不明汝事其罪亦同于殺汝當常聽朕毖聽念而篤行之勿辯者不必嘵嘵乃司民湎于酒爾民不湎于酒則汝之職舉矣然則成王勤勤以作誥為何事哉司民湎于酒而已又何言哉又何言哉此所以戒其勿辯也梓材王曰封以厥庶民曁厥臣逹大家以厥臣逹王惟邦君汝若恆越曰我有師師司徒司馬司空尹旅曰予罔厲殺人亦厥君先敬勞肆徂厥敬勞肆往姦宄殺人歴人宥肆亦見厥君事戕敗人宥王啓監厥亂為民曰無胥戕無胥虐至于敬寡至于屬婦合由以容王其效邦君越御事厥命曷以引養引恬自古王若兹監罔攸辟惟曰若稽田旣勤敷葘惟其陳修為厥疆畎若作室家旣勤垣墉惟其塗塈茨若作梓材既勤樸斲惟其塗丹臒今王惟曰先王旣勤用明徳懐為夾庶邦享作兄弟方來亦旣用明徳后式典集庶邦丕享皇天旣付中國民越厥疆土於先王肆王惟徳用和懌先後迷民用懌先王受命巳若兹監惟曰欲至于萬年惟王子子孫孫永保民案此篇講義永樂大典原缺
