body:
  text: 尚書講義卷十一宋史浩撰周書惟十有一年武王伐殷一月戊午師渡孟津作泰誓三篇泰字當作太意必太公所為也孟子引此篇亦用太字是矣左氏傳昭元年引太誓曰民之所欲天必從之亦書太字可無疑也説者乃曰紂之時天地之不交而否至是當泰矣故曰泰誓又曰泰者大之極也猶天子之子曰太子天子之卿曰太宰皆非是也夫書有湯誓秦誓以人名也甘誓費誓以地名也未有以義名者今武王之戰曰太誓太公所為豈非以人名乎曰牧誓戰於牧野豈非以地名乎茍或知此不必鑿其説也昔湯為順天應人之舉以得伊尹故湯誓之序曰伊尹相湯伐桀明非湯之本心也今武王太誓豈非以為吾不得太公事不克濟故以此名之乎矧當時太公之歸若天下之父歸之民心之趨向可知矣若是三篇果出於其手武王尤當名之也大明之詩曰殷商之旅其㑹如林其卒曰維師尚父時維鷹揚凉彼武王肆伐大商㑹朝清明乃知武王非太公未必成事則太誓之名亦與書序伊尹相湯伐桀之意同也學者又何疑焉泰誓上惟十有三年春大㑹于孟津文王三分天下有其二非文王取而有之民自從化然猶不肯有貳於紂故曰有君人之大德有事君之小心詩亦曰維此文王小心翼翼厥德不回以受方國文王未嘗受命亦未嘗有伐紂之心後世惑於太誓之辭乃取諸侯歸西伯之時為受命又有修德以傾商政之説漢儒𫝊疑和為一談唯唐韓愈作文王操敘羑里之厄曰嗚呼臣罪當誅兮天王聖明此足以白文王之志矣然武王於此書曰皇天震怒命我文考肅將天威大勲未集武成又曰誕膺天命惟九年大統未集若以九年逆數至三年䘮畢觀兵孟津已而復至誠已十有三年矣是文王果於九年之前受天命也或者求其説而不得乃曰文王實受命見紂之不道不忍伐之待其自斃抑又厚誣文王者殊不知武王為此説盖有意驅西土之人以赴敵也且文王之德豈惟西土之人服天下之人亦服八百諸侯不期而㑹者豈為武王哉為文王之德在人而不厭也武王雖為此舉懼人心之未服故託以文王嘗有此志諸侯素信文王者亦且不疑而武王之功或可必成矣此太公之謀也或者又曰載木主而行未之詳也若果然與木主俱行則知武王毎以文王為辭者懼民心之未從也後世固有託扶蘇項燕以起事者詐也猶可以得民心而况文王真有道化及民而未嘗得施設者則武王舉之以信諸侯未為過也雖然大雅有文王受命之詩武王成功之詩何耶二篇者後世稱美之作也若以為當時所作西伯爾安有文王之號乎大𫝊謂武王牧野既事柴上帝率諸侯追王太王王季文王故至武成始稱文考文王又安可引之以附㑹太誓之辭乎王曰嗟我友邦冢君越我御事庶士明聽誓惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母今商王受弗敬上天降災下民沈湎冒色敢行暴虐罪人以族官人以世惟宫室臺榭陂池侈服以殘害于爾萬姓焚炙忠良刳剔孕婦皇天震怒命我文考肅將天威大勲未集肆予小子𤼵以爾友邦冢君觀政于商友邦者武王同列之諸侯故曰友冢長也皆謂之長尊之也御事庶士者武王同行之士卒故曰我御事庶士豈無下賤者而皆謂之士奬之也夫天地之大所主者生殺之權耳然其大徳則専於生而已又以其權寄之于人而立人之聰明者以為君君之大德亦曰好生而已是以天地人君俱得稱父母父母者豈非生我之謂乎今商王紂一切反此弗敬上天是不知生之所自也降災下民是不知執生之權也凡民有好生惡殺之性與天地通者皆不得其所欲豈天地立人君之本意乎夫上失其道民散乆矣如得其情則哀矜而勿喜先王不得已而用刑得其情尚有哀矜之心紂乃於沈湎冒色中敢行暴虐民豈有生意乎夫罪人不孥罰止其身賞延于世非命以官先王不得已而用賞罰茍有功罪猶止其身付之無私爾紂乃於淫刑濫賞中延及無辜無功之人民豈有生意乎先王以甘酒嗜音峻字雕墻為戒所以奉天地也今紂為宫室臺榭陂池侈服以殘害于爾萬姓為父母者不如是也先王以遏惡揚善母夭胎鳥為戒所以順天地也今紂乃焚炙忠良刳剔孕婦為父母者不如是也暴虐也殘害也焚炙也刳剖也皆主於殺與好生之德異矣民無所怙恃而可謂之父母乎既與皇天之意不合宜其震怒也居是時有一人以生民為心豈不可以君天下而為人父母乎則觀政于商民實有來蘇之望矣武王其又奚辭惟受罔有悛心乃夷居弗事上帝神祗遺厥先宗廟弗祀犧牲粢盛既于凶盗乃曰吾有民有命罔懲其侮天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪予曷敢有越厥志同力度德同德度義受有臣億萬惟億萬心予有臣三千惟一心商罪貫盈天命誅之予弗順天厥罪惟鈞予小子夙夜祗懼受命文考𩔖于上帝宜于冢土以爾有衆厎天之罰天矜于民民之所欲天必從之爾尚弼予一人永清四海時哉弗可失王者遇災而懼側身修行故能轉禍為福至於列國相侵猶以其懼而修德不敢加兵則變故之來豈可以閒暇應哉今商王既無改過之心復安居若無事坐致其亡也况商之先祖莫不以祭祀為重𫝊曰商人明鬼明鬼言尊天事祖而弗敢慢也奈何不肖之嗣一切廢敗犧牲粢盛盡於凶盗恬弗之聞其於外侮又弗之懼第曰吾有民心可恃有天命可慿殊不知天之與民所以庇人君者以其上能事天下能愛民而已紂既反是尚欲保民心天命乎天之祐民使之為君以立政為師以立教惟能輔相上帝以寵綏其民乃為勝任今紂有罪無罪予曷敢違民心哉此見武王之應乎人也夫力同則度其德德同則度其義使服事商而盡臣節德也使撥亂世而反之正亦德也同是德也與其坐視斯民之塗炭孰若措斯民於晏安之世於是可以義起矣義之所激理之曲直形焉宜乎億兆離心不若三千之同德也商之罪已貫通乎幽明盈溢乎宇宙天命誅之予曷敢拒天命哉此見武王之順乎天也順乎天而應乎人豈敢夷居若紂乎則夙夜祗懼武王之心非為己也古者出征𩔖乎上帝宜乎社受命於祖受成於學武王出師用此法也今將爾衆而行天罰夫豈私意天固矜民民有所欲天必從之爾但輔我此行必當去穢德而臻永清之效矣爾不赴功則將有失時之患可不務乎泰誓中惟戊午王次于河朔羣后以師畢㑹王乃徇師而誓曰嗚呼西土有衆咸聽朕言我聞吉人為善惟日不足凶人為不善亦惟日不足今商王受力行無度播棄犂老昵比罪人淫酗肆虐臣下化之朋家作仇脅權相滅無辜籲天穢德彰聞惟天恵民惟辟奉天有夏桀弗克若天流毒下國天乃佑命成湯降黜夏命惟受罪浮于桀剥喪元良賊虐諫輔謂已有天命謂敬不足行謂祭無益謂暴無傷厥監惟不逺在彼夏王羣后諸侯也畢㑹無不來也方其徇師宜告乎諸侯而獨指西土有衆何哉盖諸侯實共苦紂不俟丁寧若夫西土之人素服文王之化不被商紂之虐又親見文王服事之乆一旦武王欲為此舉必有駭然不從命矣此所以必誓西土之民也夫人各有所嗜嗜善則為吉人嗜惡則為凶人非天生善人使之為善天生凶人使之為不善也方不善之萌於心人亦莫不以為善始也為之有慙色終也安意肆志而無忌惮矣彼其熾然為不善忽有指之為凶人其不怒者鮮矣何者其本知惡之不可為而凶人之為醜也徒以去善愈逺業已淪胥於此不可復改是以遂非而力行之使其有歉然自愧之心則必怠矣又安肯為惟日不足乎惟日不足嗜乎不善者也紂之不善嗜惡可知凡無法之政必力行之犂老庶老之衆乃播棄之而使不安罪人為惡之徒乃昵比之而使親近淫於色湎於酒而敢行暴虐臣下化之殆有甚焉者矣朋家合相親睦而作仇權勢合當畏逺而相滅無辜之民至於籲天穢德彰聞不獨聞而可指也夫天恵斯民君奉天命夏桀弗順此道已移而之湯矣今受之罪過於桀剥喪元良微子箕子之去賊虐諫輔比干之死謂已有天命答祖伊之告也謂敬不足行不敬乎上天也謂祭無益將食無災也謂暴無傷焚炙刳剔也失德至此其祚必移前監不逺武王舉此以告西土之人俾西土之人知前代亦有成湯者曾順天應人而為此行也觀此則知武王所以激西土之人以赴敵者罔不切至孰謂文王曾有伐紂之心乎天其以予乂民朕夢協朕卜襲于休祥戎商必克受有億兆夷人離心離德予有亂臣十人同心同德雖有周親不如仁人天視自我民視天聽自我民聽百姓有過在予一人今朕必徃我武惟揚侵于之疆取彼凶殘我伐用張于湯有光勗哉夫子罔或無畏寧執非敵百姓懍懍若崩厥角嗚呼乃一德一心立定厥功惟克永世古人大抵信夢卜以其敬鬼神也髙宗以夢得傅説文王以卜得吕望一旦用之在上人無異論若以此法施之後世則殆矣今武王又以夢卜之協告其國人民必信以為休祥而知必勝無疑矣居是時使不夢不卜武王庸有不勝乎告之以此欲民知天其以予乂民也武王又恐民以彼衆我寡為言復告以受者億兆夷人離心離徳夫心徳既離則是無君臣之分皆途之平人爾固不如十人之同心徳也雖有周親先儒謂雖周公召公皆王室之親其實不以親而以仁用也是殆不然伐木之詩曰雖有兄弟不如友生與此義同非謂兄弟不足恃言友生又在兄弟之上非謂三千所親之忠信為不足恃言十亂之仁又在其上也蓋惟仁人乃可以用師而後世或有伐國不問仁人之説其不知此矣茍伐國而不問仁人焉知順天應人之道乎昔人以伐燕問孟子曰取之而而燕民悦則取之取之而燕民不悦則勿取此仁人之言也惟仁人乃能知順天應人之道武王繼以天視自我民視天聴自我民聴得應順之實矣百姓有過在予一人武王此言已足以君天下矣堯舜之民比屋可封豈必人自為善上有以率之爾凡置百姓於有過使之就死地者皆暴君之所為誠能引咎歸已則知所本矣今朕必往湯之伐桀已有是言明其不兩立爾我揚其武但即其疆取其凶殘之一夫餘自咸與惟新雖伐其子孫視湯之舉為無愧也勉哉夫子或爾衆以不可不畏寧執非敵之見期於必勝庶無輕敵之心今百姓危懼不保首領故曰若崩厥角茍能一其心徳以赴功豈惟保其首領亦可保其子孫故曰惟克永世泰誓下時厥明王乃大巡六師明誓衆士王曰嗚呼我西土君子天有顯道厥類惟彰今商王受狎侮五常荒怠弗敬自絶于天結怨于民斮朝涉之脛剖賢人之心作威殺戮毒痡四海崇信姦回放黜師保屏棄典刑囚奴正士郊社不修宗廟不享作奇技淫巧以悦婦人上帝弗順祝降時喪爾其孜孜奉予一人恭行天罰太誓三篇數紂之罪始則略言之中則詳言之至其末也益詳矣蓋當其臨陣唯恐人無鬭志故悉數其實以怒我衆也王者之征六師並行大巡而明誓欲人人知其罪爾夫天道福善禍淫顯顯在人人固一日不可不用也是以厥𩔖惟彰今商王之罪莫大於狎侮五常五常既廢則君不君臣不臣父不父子不子雖形存而性亡矣其與禽獸無異矣自絶于天結怨于民作威殺戮毒痡四海姦回則崇信之師保則放黜之先王之典刑不用天下之正士悉戮郊社不修則天地神祇無所歆宗廟不享則祖宗之靈無所託明而人倫幽而鬼神皆紊亂而失其敘可謂近于禽獸矣淫亂之行不期而有上帝弗順祝降時䘮亡無日矣武王告西土君子故舉狎侮五常言之盖惟君子足以語此茍三綱五常絶則天理滅矣宜乎上帝之弗順也又舉其剖賢人放師保囚正士以告之西土君子其不寒心以求武王為之依歸乎故曰爾其孜孜奉予一人恭行天罰也然則西土君子其有不用命者乎古人有言曰撫我則后虐我則讎獨夫受洪惟作威乃汝世讎樹德務滋除惡務本肆予小子誕以爾衆士殄殲乃讎爾衆士其尚迪果毅以登乃辟功多有厚賞不迪有顯戮嗚呼惟我文考若日月之照臨光于四方顯于西土惟我有周誕受多方予克受非予武惟朕文考無罪受克予非朕文考有罪惟予小子無良武王既陳紂之酷虐使西土之君子皆知無所容身矣于此又引古人之言謂紂何有於我哉撫我則為后虐我則為讎夫使民情至此則君之惡可知矣盖武王既已合其衆于商郊一不勝則豈徒爾衆塗地天下生靈愈受其弊矣是以不得不極言其惡以激西土之人也獨夫者孟子所謂殘賊之人謂之一夫是也紂既不務德而唯威是作非汝世讎而何樹德務滋日以增長也除惡務本既伐而必勝可也我以爾有衆殄殲獨夫之讎惟克果毅乃能必勝春秋𫝊曰殺敵為果致果為毅於是又以賞罰誘之爾能奉乃辟功多者厚賞不迪者顯戮諭之以賞罰矣又恐其志之或怠也乃引文王之德以鎮服之其曰若日月之照臨光于四方夫日月有明容光必照無不及者是文考之靈無乎不在况又顯于西土汝西土之人常若文考臨之在上茲伐也可不助我以徼文考之福乎况我有周大受多方於天命不可不為此舉也予克受非予武受克予予無良皆非文考之罪觀武王始以文王而驅諸侯之戰出於一時之權其心實未安今將勝矣當以正論而立天下之義故不敢歸罪于文王以是見文王初無伐紂之心武王借此以為資藉章章矣學者可不深詳之乎武王戎車三百兩虎賁三百人與受戰于牧野作牧誓商郊之戰考之大誓曰有臣三千又曰有亂臣十人牧誓則曰戎車三百兩虎賁三千人其數不同如此説者謂車有兩轓故曰兩也勇士若虎之奔故曰虎賁也以司馬法考之車有七十二人三百兩當二萬一千六百人則與三千之説異矣以周官考之虎賁氏之官其屬有虎賁士八百人則與三百人之説抑又異矣以意逆之實紀一時之數不必盡如司馬之法周官之書也然以三百人之虎賁當三百兩之車乃車以一人而為之主爾則三千一心十亂同德又其外也春秋列國晉楚齊秦之戰皆七八百乘而武王能以三百兩勝若林之師非天人助順疇能爾耶牧誓時甲子昧爽王朝至於商郊牧野乃誓王左杖黄鉞右秉白旄以麾曰逖矣西土之人王曰嗟我友邦冢君御事司徒司馬司空亞旅師氏千夫長百夫長及庸蜀羌髳微盧彭濮人稱爾戈比爾干立爾矛予其誓杖鉞秉旄以身先衆人者盖當是時唯武王為切也既已為此一不成則禍莫大焉此不得不爾也逖者逺也司徒司馬司空在列而不備六卿者竊意從行居守各有攸職是以不備言也亞旅亞卿師氏大夫長乃隊伍之長庸蜀以下八國皆附庸或蠻夷君長以此知㑹孟津者不獨中國之諸侯雖夷狄亦不附紂也植干戈以聽誓言奮勇之𤼵盖可以想而見矣王曰古人有言曰牝雞無晨牝雞之晨惟家之索今商王受惟婦言是用昬棄厥肆祀弗答昬棄厥遺王父母弟不迪乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐于百姓以姦宄于商邑今予𤼵惟恭行天之罰今日之事不愆于六步七步乃止齊焉夫子勗哉不愆于四伐五伐六伐七伐乃止齊焉勗哉夫子尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土勗哉夫子爾所弗朂其于爾躬有戮泰誓言悦婦人而已此推其極至于惟婦言是用故昏棄先王之祀而不知其報昬棄三仁之屬而不迪其親皆用婦言故也妲已之罪于是始著不愆云者不特見其整肅抑又知其行軍之不暴也伐刺也六步至七步四伐至七伐而止復整陣而進當時之師雍容不迫其所謂詭道竒計未嘗用也嗚呼此其為王者之師歟詩之大明初言武王燮伐燮和也至于牧野其㑹如林檀車煌煌駟騵彭彭則肆伐之功出於維師尚父時維鷹揚故也然則使之如虎如貔如熊如羆以奔商人者豈武王之志哉太公之謀實然也觀此則無疑于泰誓之為太也武王伐殷徃伐歸獸識其政事作武成此篇或疑其有脫簡以其語之不倫殊不知史氏之記先其凡例而後其事實也何謂武成詩曰文王受命有此武功於時始用武功以伐崇也至一戎衣天下大定方可謂之武功之成也桃林華陽之畜不用之畜也故曰往伐歸獸下車之後凡所設施無非政事識記也記其政事而為此書也武成惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商厥四月哉生明王來自商至于豐乃偃武修文歸馬于華山之陽放牛於桃林之野示天下弗服丁未祀于周廟邦甸侯衞駿奔走執豆籩越三日庚戌柴望大告武成既生魄庶邦冢君暨一百工受命于周此記其事之大凡也一月周之正月旁死魄者月朔之二日既已生明其旁為死魄也哉生明者初生明也既生魄者既望之二日而生魄也一月二日伐商至四月二日始來自商商人既定而急於興治故其歸如是之遲也夫偃武修文歸牛休馬示不復用乃曰武成是知武者所以定亂而興治聖人不當黜也𫝊言武有七徳而終之以安民和衆豐財盖如是然後可以為武之成也祀于周廟告于祖宗也柴望大告告于天地山川也庶邦冢君暨百工受命于周告于鎬京所㑹之諸侯羣臣也此史氏舉其凡目而其辭則載之于後固非簡篇之脱誤也王若曰嗚呼羣后惟先王建邦啓土公劉克篤前烈至于大王肇基王迹王季其勤玉家我文考文王克成厥勲誕膺天命以撫方夏大邦畏其力小邦懷其德惟九年大統末集予小子其承厥志厎商之罪告于皇天后土所過名山大川曰惟有道曾孫周王𤼵將有大正于商今商王受無道暴殄天物害虐烝民為天下逋逃主萃淵藪予小子既獲仁人敢祗承上帝以遏亂略華夏蠻貊罔不率俾恭天成命肆予東征綏厥士女惟其士女篚厥𤣥黄昭我周王天休震動用附我大邑周惟爾有神尚克相予以濟兆民無作神羞案此段講義永樂大典原闕既戊午師逾孟津癸亥陳于商郊俟天休命甲子昧爽受率其旅若林㑹于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵一戎衣天下大定乃反商政政由舊釋箕子囚封比干墓式商容閭散鹿臺之財𤼵鉅橋之粟大賚于四海而萬姓悦服列爵惟五分土惟三建官惟賢位事惟能重民五教惟食喪祭惇信明義崇德報功垂拱而天下治此則史氏紀用武之終始以表其成而卒識其政事也俟命之意太誓已詳成功之際是謂大定血流漂杵孟子不取不喜其佳兵也明武王之師不得已而用用是修文以告其成夫前徒倒戈容或有漂杵之理不足為武王道也孟子其亦知武王之心矣商政之不善不能率由舊章也反商之政宜乎由舊也夫所寶之賢為足重故釋囚封墓式閭以惇信不義之物為足棄故散財𤼵粟大賚四海以明義列爵分土並用賢能以崇德尊重彝倫歸本反始以報功政事之要無出於此武王至是夫何為哉恭已正南面而已天下安有不治者哉其曰武成亶其然乎盖嘗論武王之功成於武成而其要則在於惇信明義崇德報功惟此八字可引以為武王之徽號以其所紀之實也嗚呼此其所以垂拱無為而治定也
