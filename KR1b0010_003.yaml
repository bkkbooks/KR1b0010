body:
  text: 尚書講義卷三宋史浩撰臯陶矢厥謨禹成厥功帝舜申之作大禹臯陶謨益稷矢陳也謨嘉言也禹以功臯陶以謨列扵帝堯之朝舜因而申之宜矣而必附以益稷者史之意也盖益稷亦禹臯陶之儔也惟此四人舜之同僚而能推腹心露誠實移所以事堯者事舜則舜必有以服其心者矣得此四人之心舜之所以有天下也文王作興二老歸之說者謂天下之父歸之其子焉往漢高叙三傑曰吾能用之所以得天下也然則帝舜申之而附以益稷意可見矣大禹謨曰若稽古大禹曰文命敷於四海祗承于帝曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳帝曰俞允若兹嘉言罔攸伏野無遺賢萬邦咸寧稽于衆舍己從人不虐無告不廢困窮惟帝時克粤若稽古大禹曰文命文命禹之號若堯曰放勲舜曰重華是也放勲者蕩蕩乎民無能名巍巍乎其有成功也重華者襲堯之爵行堯之道是堯而已矣文命者奉堯之聲教而敷于四海也禹貢告功成而歸美于帝曰東漸于海西被于流沙朔南暨聲教訖于四海即文命敷于四海祗承于帝也舜所以申禹之成功始見于是其曰后克艱厥后臣克艱厥臣禹言為君難而為臣不易也政乃作乂黎民易于歸徳者禹所以戒舜也舜曰俞允若兹信其為然也嘉言罔攸伏者無言不聴也野無遺賢者無徳不用也萬邦咸寧者敏徳之實也稽于衆舍己從人者無善不好也不虐無告不廢困窮者無一夫不被其澤也舜于此備言為治之效不自以為徳而歸徳于堯故曰惟帝時克益曰都帝徳廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君都美也彼都者彼美也甚都者甚美也益聞禹贊敏徳又聞舜之歸徳乃推廣其意又有廣運之言焉以謂堯之治以道化也廣運如天之無為四時行焉百物生焉天未嘗有為也其所以敏徳與夫惟帝時克皆道之見于事業者故皆曰徳也而堯徳廣運㝠然不見其蹟者進乎道矣聖神文武随所應而彰非可以一徳名也神耶聖耶文耶武耶不可得而指名矣蕩蕩乎巍巍乎皇天眷命而使奄有四海者所謂大哉堯之為君也禹曰惠迪吉從逆凶惟影響益曰吁戒哉儆戒無虞罔失法度罔遊于逸罔淫于樂任賢勿貳去邪勿疑疑謀勿成百志惟熈罔違道以干百姓之譽罔咈百姓以從己之欲無怠無荒四夷來王道降而有徳非降也道之見于事業也是故謂之徳盖道無對也孔子所謂巍巍乎顔子所謂卓爾孟子所謂躍如也𤼵而為徳則道生一矣生一則有兩端是有對矣是故有吉必有凶吉凶由人所召顧所修之徳如何耳禹所謂惠迪吉從逆凶者思順其一而無二三其徳也所謂徳惟一動罔不吉徳二三動罔不凶也天之降災祥在徳而已矣舜于此盖優為之益乃因禹之戒賛曰戒哉儆戒無虞聖人不畏多難而畏無難也罔失法度無作聰眀亂舊章也罔逰于逸罔淫于樂無佚逰荒亡之事也任賢勿貳譛愬不行也去邪勿疑無依違牽制也疑謀勿成無敢嘗試為之而僥倖其或成也百志安得不光眀乎百姓之譽人所欲得也違道而干毁必随之矣何補乎百姓之欲雖天必從咈其情而從吾之欲則背叛而不可救矣何補乎此皆昏亂之世所有益事堯舜之君上接洪荒㫁無此事何自而知之耶盖以理推也舜固無是矣而益乃諄諄言之盖舉其害徳者以堅舜修徳之心愛君之道也舜不以為忤無怠無荒勤而行之四夷安得不歸往乎舜之徳所以如天之無不覆幬如地之無不持載至矣盡矣不可以有加者實得禹益之規戒故進而不已而至扵道也禹曰於帝念哉徳惟善政政在養民水火金木土穀惟修正徳利用厚生惟和九功惟敘九敘惟歌戒之用休董之用威勸之以九歌俾勿壊帝曰俞地平天成六府三事允治萬世永賴時乃功舜重堯之華所以行堯之所未行皆盛徳事也而益尚戒之禹聞益之戒歎曰於欲帝念此言而無忽然且指其治要以告之謂凡為君必主扵徳以徳為政斯為善政善政之實專在養民民之所以有養以穀為重穀者養民之大本五材得是而能聚是故謂之六府無則五材為虚器雖有不能為用也三徳得是而能宣是故謂之三事無是則三事為虚名雖有不能為用也用五材三事者名也陶冶械器則非粟不易倉廩不實則禮節不知禹之胼胝荒度者意有在於烝民乃粒而彝倫可敘也故箕子述洪範九疇之要首言五行次言五事五行六府之本五事三事之資也而繼之以八政一曰食盖明九功非穀不能敘也然則穀者實五材三事之精神脈絡也六府惟修三事惟和非君有食以養斯民安得九功惟敘而斯民歌舞以樂其生乎戒之用休洪範之五福也董之用威洪範之六極也民知避凶而趨吉矣勸之以九歌者以詠歌作起人心之嚮徳也俾勿壊者仁聲入人有日新之徳而彝倫不斁也然則徳惟善政果在於不違農時務農重穀也後有人君今年下詔曰農者天下之大本也眀年下詔曰農者天下之大本也卒使海内富庶興於禮義史臣贊其徳曰務在養民得是道也舜俞其言而舉地平天成六府三事允治萬世永賴為禹之功所謂禹成厥功帝舜申之此其實也帝曰格汝禹朕宅帝位三十有三載耄期倦于勤汝惟不怠摠朕師禹曰朕徳罔克民不依皐陶邁種徳徳乃降黎民懐之帝念哉念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功帝曰臯陶惟兹臣庶罔或干予正汝作士眀于五刑以弼五教期于予治刑期于無刑民協于中時乃功懋哉臯陶曰帝徳罔愆臨下以簡御衆以寛罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寜失不經好生之徳洽于民心兹用不犯于有司帝曰俾予從欲以治四方風動惟乃之休堯曰格汝舜舜曰格汝禹堯以道治舜徳升聞故以禪舜舜遜于徳弗嗣已而嗣位徳足以堪之故也是以禹謨所敘罔匪以徳至是帝堯大學之道得所付矣大學之道在眀眀徳舜得是道所言所行罔非眀徳史謂眀徳是虞帝始盖以此也今舜告老復欲禪禹禹曰朕徳罔克民不依此亦舜遜于徳弗嗣之意也舜弗遜其人而禹遜臯陶且曰臯陶邁種徳夫徳貴于根深而柢固也臯陶種徳如農者之深耕易耨固其根本所以能穫盖大學之道以正心誠意為本所以能眀眀徳于天下也正心誠意可謂種之徳也進而至于平天下可謂逺也盖一年之計莫如種穀十年之計莫如種木百年之計莫如種徳種徳及逺故曰邁也臯陶之徳既下于民民懐其徳素望已著禹自以為不足是以遜之盖知其徳可以平天下也帝念哉者欲舜念念不忘皐陶之徳禹所以為皐陶地者至矣念者心不暫捨造次顛沛必于是念之在兹徳也釋之在兹亦徳也名之必可言言之必可行亦徳也出而見于事業亦徳也惟帝念功念臯陶種徳之功也其亦可以付託矣舜因其言故曰臯陶惟兹臣庶罔或干予正是其下皆正也汝作士以刑輔教而吾彞倫得敘也期于予治而民協于中刑乃措而不用是臯陶懋此大徳而教中于民之功不可不念也而臯陶不自以為徳歸徳于舜謂刑之所以不用者帝以好生之徳洽于民心而其所致之實本于帝徳之罔愆也罔愆者無過不及能執其兩端而用其中于民也故凡所賛皆舜之用中也夫簡以臨下有不紊之綱至其御衆則有寛和之恩中也罰弗及嗣而賞則延之寛厚也宥過者赦其詿誤刑故者罪其有心寛厚也罪疑惟輕罰則從恕功疑惟重賞則從予寛厚也與其殺不辜寧失不經寛厚之極也舜之用中濟以寛厚此好生之徳所以使民淪肌浹髓而不可忘故能置刑罰于無用之地也舜不自以為徳而復歸徳于臯陶曰俾予從欲以治四方風動惟乃之休盖舜眀刑弼教之本心于此得矣故曰從欲以治然舜賛臯陶如此而禹之所以遜臯陶之意舜無一言及之者盖舜之心已屬禹乆矣不可以一時之遜而易吾之心其曰朕志先定豈虚言哉帝曰來禹洚水儆予成允成功惟汝賢克勤于邦克儉于家不自滿假惟汝賢汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功予懋乃徳嘉乃丕績天之厯數在汝躬汝終陟元后人心惟危道心惟微惟精惟一允執厥中無稽之言勿聴弗詢之謀勿庸可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉慎乃有位敬修其可願四海困窮天禄永終惟口出好興戎朕言不再禹曰枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮協従卜不習吉禹拜稽首固辭帝曰毋惟汝諧正月朔旦受命于神宗率百官若帝之初舜雖念臯陶之功而屬禹之意愈篤乃曰洚水儆予洚水洪水也天降災祥所以儆戒予而地平天成之功他人不能辦也故曰惟汝賢克勤于邦克儉于家若所謂無間然者而又不敢自溢自大此又他人不能及也故曰惟汝賢不矜不伐而天下之功能悉歸焉予懋乃徳嘉乃丕績其徳其功果在皋陶之上是天之厯數在汝躬無疑矣我老汝攝終當陟元后盖天命已定不可辭也於是告之以歴代聖人所𫝊之道曰人心惟危道心惟微惟精惟一允執厥中也惟皇上帝降衷于下民是以歴代聖人執其兩端而用其中于民民既受中以生非天作之君作之師以輔翼之則其中安保不迷而失之耶然則中者君天下之綱領而歴代帝王受命之符也舜命禹之言堯盖嘗以語舜矣魯語所謂堯曰咨爾舜是也且喜怒哀樂之未𤼵謂之中既曰未𤼵何時而見此道心也豈不微乎惟其𤼵而中節人始知其自中出也不從中出則喜怒哀樂四者之動吉凶悔吝生焉此人心也豈不危乎夫心一而已自其静者言之則道心不可見自其動者言之則人心多妄作惟能心悟而自得得其中于喜怒哀樂未𤼵之前則𤼵而皆中節矣孰不為喜聖人之喜則天下鼓舞于春風和氣中矣孰不為怒聖人之怒則一怒而安天下之民矣以至哀則為禮以防萬民之偽樂則為樂以防萬民之情以其中節故也然則何以知之惟精惟一而已精者杳兮㝠兮不專心致志則不得道心之静也一者為物不貳一之所起人心之動也有一則兩端具矣兩端具則可中取矣不于一而中取則二三其徳而動罔不凶矣舜執其兩端而用中於民以其得一也得一者心有所得於喜怒哀樂未𤼵之前所謂心悟也通扵一則萬事畢矣自道而出惟一可以見中道生一故也堯舜禹三聖相授以一道中而已矣聖人既已得是道𤼵而無不中節者不失其道心也本於道心則不可以人心間之而世之人豈能皆知道心乎無稽之言弗詢之謀非姦則佞此人心也豈可信乎撫我則后虐我則讎可愛可畏此人心也豈可恃乎汝其欽哉修其可願民之所欲天必從之而况君乎使鰥寡孤獨困窮之民罔不獲所為君之職盡矣則於萬斯年永綏爾禄宜也此天禄永終也夫口者禍福之門既能出好興戎吾言一出禍福所繫汝豈可不從吾命乎禹之不願為君出於誠實舜之所以属禹堅確不移禹乃曰枚卜功臣惟吉之從使舜取在廷之功臣若皋陶益稷輩人人卜之也卜之而吉則予之夫舉天下以予人不由於心而獨付之卜筮何容易哉此乃禹驚懼之際迫切之辭也於此可以深知其不敢當也洪範稽疑之疇凡卜筮皆本於汝則從然後謀之龜筮卿士庶民也今使舜汎然卜之龜筮可乎故舜告之曰官占惟先蔽志此汝則從而方謀之龜筮也日官之占必先蔽自朕志然後求卜今朕志先定然後詢謀於人而僉同卜之龜筮而協從質之鬼神而無疑矣我其已卜豈可再乎習再也若習坎之習儻再卜之瀆則不告矣禹至是何言乎惟拜而堅辭也舜曰毋毋者勿復辭也他人無以當朕意者故曰惟汝諧也月正元日受命于神宗有虞氏祖顓頊而宗堯告于堯廟也凡即廟之禮悉如舜之初受命也抑嘗論舜禹之相受如此而孔子歎道之巍巍乃曰舜禹之有天下而不與焉何哉盖以堯之治純於道舜禹之治自道而嚮於徳民有徳以名之也故舜典禹謨無非闡揚其徳之見於事功者也非若堯蕩蕩而民無能名焉向非舜剖露危微之心精一之學後世何以知舜禹得堯之𫝊乎孔子正懼學者之於典謨止求事功之蹟而不求舜禹精一之妙故於洙泗之教𤼵是警䇿也然則舜禹之聖不在於得堯之天下而在於𫝊堯之道眀矣嗚呼盛哉帝曰咨禹惟時有苗弗率汝徂征禹乃㑹羣后誓于師曰濟濟有衆咸聽朕命蠢兹有苗昏迷不恭侮慢自賢反道敗徳君子在野小人在位民棄不保天降之咎肆予以爾衆士奉辭伐罪爾尚一乃心力其克有勲三旬苗民逆命益贊于禹曰惟徳動天無逺弗届滿招損謙受益時乃天道帝初于歴山往于田日號泣于旻天于父母負罪引慝祗載見瞽瞍䕫䕫濟慄瞽亦允若至諴感神矧兹有苗禹拜昌言曰俞班師振旅帝乃誕敷文徳舞干羽于兩階七旬有苗格征苗之舉當載在禹未受命之前盖舜初居攝已竄三苗于三危于時弗率禹乃奉辭而伐罪也逮禹治水三危既宅三苗已丕敘矣若以禹受命之後弗率豈苗再叛乎况舜既已倦勤禹有天下逺人不服禹當召六卿而恭行天討若後世所謂親征也乃㑹羣后奉辭而罰罪豈禹自知不能服苗尚仗舜之餘威乎抑口授之筆録屋壁之㫁簡失其次乎所不敢知也禹宅百揆能使地平天成六府三事允治萬世永賴紹位之後聞益滿招損謙受益時乃天道之言是欲修徳以待天時也禹當自修文徳以來逺人而尚以煩舜乎恐無是理也其曰帝乃誕敷文徳必在禹未紹位之前眀矣盖嘗論帝王之臣出行所學以輔人主了無他法一言以蔽曰徳而已矣苗民逆命是不可以兵取而當以徳化也是故益之贊禹言舜之徳可以化頑嚚於閨門之内使之底豫非徳動皇天皇天降佑父母之衷其能丕變如此耶是以人主當以修徳為先務徳既格天豈有人而不能化乎三代而下士不知學置徳於無用之地或以兵武導其君或以財利蠱其君或以讒諂面諛逢其君使其君從事於征伐從事於聚斂不信忠良吝於改過者皆伯益之罪人也此無他不學故也伊尹在有莘所以欲堯舜其君者徳也卒能格於皇天而受天眀命傅說相高宗高宗専欲納誨以輔其徳鬼方三年乃克者修徳以待其自服也孔子罪由求之不能相季氏以其逺人不服不能修文徳以來之而謀動干戈於邦内也嗚呼伯益惟徳動天之一語實萬世人臣事君之定法聖人復起不易其言矣
