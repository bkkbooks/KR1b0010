front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0010_WYG_001-1a, image: WYG0056/WYG0056-0171a.png}
body:
  text: 尚書講義卷一宋史浩撰虞書昔在帝堯聰明文思光宅天下將遜于位讓于虞舜作堯典此書序也班固謂先聖孔子作凡典謨訓誥誓命之文必有史氏紀其所作之由孔子取史語裁為法度之言以信後世雖謂之孔子作可也凡稱昔在必其人之聲名功業不泯者自古以來惟帝堯足以當之皇降而帝帝降而王帝者君天下之號而堯其名也或曰堯其諡也夫古者死無諡諡始于周堯則其名無疑矣且以舜禹言之有鰥在下曰虞舜又曰來禹豈呼舜禹之諡耶聰明徳之至大者是故天以聰明在上而元后亦以聰明作民父母天之聰明豈必僕僕然屬耳瞪目而得之耶亦曰無所不聞無所不見而已卒之聴于無聲視于無形天下之理不得遁而皆存乃可謂憲天之聰明也文非絺章繪句則凡施之外者光明皆是也思非焦心勞慮則凡藴之内者光明皆是也光者光明也惟茲光明悉本於性天生蒸民有物有則人人皆具是光明衆人迷焉晦而窒之一身不能用聖人覺焉擴而充之所以能滿天下是故讀書者能了此一光字則百篇之内凡所謂光皆帝王心傳之妙日用之本無餘藴矣堯用是光而宅天下宅者安而行之也安而行之其誰以為非性乎故曰堯舜性之也雖然堯之德天也天何言哉四時行焉百物生焉其不得已而有言蓋以老而避位不私其家而與一側陋之人懼天下不明是理是以其言見於後世序者明一篇之大㫖言雖不多而一二語間如射者之破的非孔子孰能與於此哉堯典天命之謂性率性之謂道修道之謂教夫天命之性堯全德而具未嘗失也故其所行自欽明文思格於上下率性之道也自克明俊德至黎民於變時雍修道之教也聖人之論歴萬世而不可易者以前聖後聖其歸一揆爾堯典篇目也典者常也經也經常者萬世不刋之典也曰若稽古帝堯曰放勲欽明文思安安允恭克讓光被四表格于上下曰當讀為粤字粤者始詞也若稽古者順考古帝堯之德猶今紀功德之文曰謹按是也放勲者號也有勲可見故以是尊之也上古君天下者一於道爾故民鑿井耕田不知帝力於我何有無功可見也堯則放前人之功巍巍乎有成矣欽者敬也為人上者奈何不敬則欽者堯之首德明則其次也序書以聰易欽何也蓋聰明天賦天所以命之者在是故曰亶聰明作元后至於欽明則率性而行者率性而行首以欽德則允恭克讓固其性之自然而非矯飾也堯具是四德出於本性之自然率而行之安其所安無一毫作為故曰安安夫一性之光明被四表而格上下固非智巧果敢所能致至於推而放之東海而準推而放之西海而準推而放之南海而準推而放之北海而準卒之上下與天地同流非光明則不能徧也如是則民物之休戚天地之變化孰有彼此之間皆吾一性之動而已豈非率性之道乎克明俊徳以親九族九族旣睦平章百姓百姓昭明協和萬邦黎民於變時雍此堯脩道之教也古之欲明明德於天下者其本在於正心誠意堯之德盛矣至出而應世未有不由此而天下治也後人謂克明俊德為明揚側陋之人非也大學曰克明俊德自明也自明者内明而外俊明之至也此非脩身而身脩之效歟賢者親之無能者亦親之而九族至於親睦親之至也此非齊家而家齊之效歟欹者平之晦者章之而百官巨姓至於昭明章之至也此非治國而國治之效歟協和者調一也而黎民至於變時雍和之至也此非平天下而天下平之效歟自常人論之堯行此德以治天下不過一治世之君耳殊不知堯之所以能致此者大學之道也孔子曰脩已以安百姓堯舜其猶病諸言其甚難也孟子曰天下之本在國國之本在身人人親其親長其長而天下平此堯之道所以推之萬世而不可易後聖有作豈能越是道而行之耶其曰修道之教也宜矣韓愈謂堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公以是傳之孔子夫數聖人相距數百嵗何所見而相授受直得大學之道而已此堯所以為出治之祖也嗚呼盛哉乃命羲和欽若昊天厯象日月星辰敬授人時夫聖人所以為聖者能以已之光明覆被一世而其修德修政動合自然之道而已克明俊德至於天下平矣繼當修政政者所以與世共之也蓋天不人不因人不天不成天人之際其實無間君天下者茍能順天之時授人以事亦自然之理非性分之外别有天人也乃者因之也因黎民於變故命羲和以正天時此見堯首德之欽若又曰敬授堯之欽德不於奉天治人之間見之其何用耶古者南正重司天北正黎司地揚雄謂羲近重和近黎其實重黎分掌天地羲和則兼天地而分四時名不同爾厯其書也象其器也日月星其三光也辰其􅄤次也仰觀俯察既已得其序則時以作事事以厚生民之本於是乎在矣分命羲仲宅嵎夷曰𤾉谷寅賓出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾申命羲叔宅南交平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虗以殷仲秋厥民夷鳥獸毛毨申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛既總言命羲和之大㫖矣兹復分而言之於二仲則言分二叔則言申者蓋天地温厚之氣始於東而盛於南嚴凝之氣始於西而盛於北其始分之其終申之也以方言之則宅嵎夷曰𤾉谷宅南曰交趾宅西曰昧谷宅朔方曰幽都宅者安此一方也天之運行以日為主故於東西出納獨言賓餞者二仲為主也以事言之則東作南訛西成朔易而四時之功備平治秩序力作於三時夏則待其成故曰敬致冬則藏矣故曰在以候言之則四伸為得中氣故取日之長短驗於分至皆一時之中也春秋曰殷殷中也中則分矣夏冬言正正也正則至矣朱鳥南方七宿也火心宿也二十八星獨於南方全言夏秋冬則取心虗昴者以分至者定之適當其次也日中宵中隂陽之所以分也以民言之則春析之而作夏因之而長秋樂其成故夷冬則藏乎室故隩以動物言之則春合而孕夏褪而革秋生而鮮冬氄而温舉是四官上關天時下及地利中取人物無乎不有及其成功授人時而已則三百有六旬有六日為一朞三百六旬而已虗是六日與一歲之間有六晦小盡率一歲餘十二日積三年三十六日及二年二十四日成六十日故五歲而再閏也觀其日星之運轉人民之動息庶物之生長與夫歲月日時之行豈人力所能加損實天道自然之序惟在聖人奉若而使人不失其時則百工允治庶績咸明亦自然而致此孔子曰惟天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功也厥功之成不見其迹非順天之道則天之大其孰能與於此哉帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成歲允釐百工庶績咸熙前靣既命羲和以厯象授人時此又使之考察餘分以明置閏之法蓋一歲十二月月三十日正三百六十日餘六日六小月又餘六日是一歲餘十二日三歲餘三十六日以三十日為一閏又兩年餘二十四日凑前所餘六日為一閏故三年一閏五年再閏如此然後四時始定歲功始成百工皆得赴功庶績莫不光明釐理也熙光明也大抵事須是隨時做經曰百工惟時又曰食哉惟時又曰欽哉惟時亮天功若是不置閏以歸其餘則四時皆不得其正天下事顛倒錯亂百工何由而理庶績何由而熙履端於始舉正於中歸餘於終日既有餘無所頓放自然是用置閏天地無全功置閏之法分明是聖人在這裏裁成天地輔相天地似乎專是人事然亦天理之自然斗指兩辰之間便知其為閏以此見亦非聖人以私意為之也凡讀二典不可將作後世看後世視此等事多以為緩而不切唐虞之時兹事甚重蓋四時不定則庶功不成利害非小只看月令無一事不順天時聖人安得不以為急乎帝曰疇咨若時登庸放齊曰𦙍子朱啓明帝曰吁嚚訟可乎帝曰疇咨若予采驩兜曰都共工方鳩僝功帝曰吁靜言庸違象恭滔天帝曰咨四岳湯湯洪水方割蕩蕩懐山襄陵浩浩滔天下民其咨有能俾乂僉曰於鯀哉帝曰吁咈哉方命圮族岳曰异哉試可乃已帝曰徃欽哉九載績用弗成帝曰咨四岳朕在位七十載汝能庸命㢲朕位岳曰否德忝帝位曰明明揚側陋師錫帝曰有鰥在下曰虞舜帝曰俞予聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉堯之治至是成矣蓋奉若天道至於庶績咸熙民孰有不治者哉自常人觀之功成治定思享逸樂於無窮延壽考於萬歲而堯乃疇咨其能是之人而登用之又疇咨其順我之事者而共治之有以見黄屋之非心也臣有放齊者不恤丹朱之嚚訟而以開明襃之意堯之必予子也吁者驚嘆之聲也口不道忠信之言謂之嚚心常起憤爭之念謂之訟堯既知之誠不可以為君也臣有驩兜者不知共工靜則能言之用則皆違之貌恭而心不敬滅天理而窮人欲也而以方聚布百工襃之意堯之必見聽也堯既知之誠不可以當予事夫洪水之災湯湯然其害方盛蕩蕩然沃山升陵浩浩然大浸稽天下民之怨甚矣四岳朝之元老敢問其有能使治之者誰耶僉者衆也於者美之也衆以鯀為美而堯以為不然以其負命敗類知其必不成功也岳曰异哉者舉之也姑試之乃可帝乃不得已而用之已而又欲以天下予四岳岳以不德辭始誨以明明揚側陋側陋者隠㣲也明揚舉揚也師衆也錫貢也衆乃貢其説于帝以為有鰥在下曰虞舜然必曰有鰥在下者言其無妻也其意若曰舜雖可以嗣德然側陋一介人未必服堯乃以女妻之天下必以堯之貴戚而不敢慢也所以為舜地者至矣堯曰予聞則心已許之矣其曰如何復問四岳曰予固聞之未知果如何也岳舉其家行之美進進然治而使不及亂其盛德可知矣堯於是始妻以女而觀其刑于寡妻之德終則敬用之矣嗚呼大道之行天下為公親莫如子疎莫如深山之匹夫用不用惟其人者公也滔天之惡圯族之凶用不用由乎衆者亦公也堯何容心哉蓋堯之德天也天之福善禍淫豈必竊竊然弊精神勞思慮而紀録之耶禍福皆由自召此天所以不勞而功成也其九載績用勿成而不畀洪範九疇歴試諸難而天受之非堯之心上與天通其能相應若是乎
