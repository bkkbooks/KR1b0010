body:
  text: 尚書講義卷十三宋史浩􅁧西旅獻獒太保作旅獒道德一也道不可見見於有用者德也德有疵累則道末得為純全德之醇乎醇即道矣譬如鑑不止垢瑩然清明之質玉不留瑕温然潔白之姿使鑑有㣲垢必不能覿形玉有纎瑕必不能成器人或不矜細行必不能進于道古之拳拳愛君者唯恐其有㣲垢纎瑕不能為明鑑美玉此召公作旅獒之意旅獒惟克商遂通道于九夷八蠻西旅底貢厥獒大保乃作旅獒用訓于王曰嗚乎明王愼德四夷咸賔無有遠邇畢獻方物惟服食器用王乃昭德之致于異姓之邦無替厥服分寶玉于伯叔之國時庸展親人不易物惟德其物德盛不狎悔狎侮君子罔以盡人心狎侮小人罔以盡其力不役耳目百度惟貞玩人喪德玩物喪志志以道寧言以道接不作無益害有益功乃成不貴異物賤用物民乃足犬馬非其土性不畜珍禽竒獸不育于國不寶遠物則遠人格所寶惟賢則邇人安嗚呼夙夜罔或不勤不矜細行終累大德為山九仭功虧一簣允迪茲生民保厥居惟乃世王西方之戎有國曰旅獻獒庭實也不却而受之召公之所憂也夫以武王有聖德一獒之受何足為累而公諄諄如此何哉盖獒之為物善知人意嗾之則能觸人非止警夜之犬也後世昏君有恃此而拒下者武王畜此殆將何用夫旣留其種𩔖烏知厥後無諛佞之臣指獸之能以動人主慢侮臣下之心乎召公防微杜漸止邪于未形意深遠矣公其以道事君者歟武王革命去商之虐薄海郷風九夷八蠻賔服内附則五戎六狄亦可知矣通道者言其無壅皆得達于王所非後世所謂開邉也嗚呼者嘆辭也將以開寤人主當先其憂深思逺之聲容也明王敬德四夷咸賔者無怠無荒四夷来王也無有遠邇畢獻方物者尊君親上之心不可以墟拘也惟服食器用王則受之他物不當受受之皆無益也服食器用惟王及后世子百官之供億必不可無者既推其餘以及諸侯以昭吾德之所致又以寶玉錫之同姓厚睦親親以見不殖貨利之意諸侯敢不服乎人不易物惟德其物者惟其有德予之足以為榮茍惟無德物固自若予之不足為貴矣所謂王者中心無為以守至正者也召公之戒其曰不狎侮不役耳目不作無益不貴異物不畜非土性之犬馬不育珍禽竒獸不寶遠物皆去邪而歸至正之戒也且狎侮君子則不盡心狎侮小人則不盡力役耳目則為聲色所惑百度焉得而正所謂玩人則喪德玩物則喪志也志以道寧居之安也言以道接求諸道也作無益則飾文繡事土木徒費工力終歸于壊貴異物則求玩好採珍竒徒費貲糧民益窮空畜犬馬則不知土性蹙蹶齧噬有害無利育禽獸則不憚蒐獵窮追遠捕遠人不服矣中心無為以守至正者其可一念萌此哉其卒曰所寳惟賢則邇人安邇安則遠至矣此王者輔德之要道來遠人之機括也召公欲武王夙夜勤止而于細行有所於持所以全其德也又謂為山九仭功虧一簣欲其終能保其全德也其曰允迪茲者欲武王信行此道曰生民保厥居者所謂保民而王也惟乃世王者以義制事以禮制心垂裕後昆而使世世脩德也嗚呼召公愛君之道至矣盡矣此其所以為三代之臣歟武王有疾周公作金縢金縢者蒼籙册書之匱凡災祥之興於是考焉祝史之辭於是藏焉以金緘封歴代寶之故曰金縢周公嘗以册納於匱中爾史氏乃直謂周公作金縢豈金縢因周公而顯故以是名篇乎金縢既克商二年王有疾弗豫二公曰我其為王穆卜周公曰未可以戚我先王公乃自以為功為三壇同墠為壇於南方北面周公立焉植璧秉珪乃告大王王季文王史乃册祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身予仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神乃命于帝庭敷佑四方用能定爾子孫于下地四方之民罔不祗畏嗚呼無墜天之降寶命我先王亦永有依歸今我即命于元龜爾之許我我其以璧與珪歸俟爾命爾不許我我乃屏璧與珪乃卜三龜一習吉啓籥見書乃并是吉公曰體王其罔害予小子新命于三王惟永終是圗茲攸俟能念予一人公歸乃納册于金縢之匱中王翼日乃瘳武王克商未久而遽有疾弗豫弗豫弗恱也居是時商民未盡服周德未盡敷羣臣惴惴危疑唯恐王室之不競也又况大臣太公周公召公能不痛心乎太公召公欲為王穆卜穆敬也是敬禱于祖廟也周公曰未可以戚我先王者若曰未足以感動也周公是時已起忘身殉國之心矣旣不敢率二公亦不敢告二公第以身任武王之疾必欲其有瘳吾有死而已其曰自以為功獨以此為己任也為三壇同墠者野外之祭也意必其在無人之境為是舉也盖古者無廟則為壇墠以祭三王有廟周公不於廟祭之而為是壇墠此深不欲人之知也孔子有疾子路請禱愛師之心與周公愛君之心同也而孔子知之未若周公乞以身代而不使人知也然則周公愛君可謂切至矣三壇同墠所以告太王王季文王而自為壇於北面立焉植璧秉珪拱俟祖考之來格史乃册祝曰惟爾元孫某某者代武王名也或曰史不敢名以書考之有道曾孫周王𤼵亦史所記史固未嘗諱也意者成王啓書時𫝊示羣臣不敢名其父故以某代之也厲虐者危殆之疾也丕者大也若三王在天之靈必責丕子之來則請以旦代之予仁如考考祖考也能多材多藝能事鬼神是周公自獻其身以為武王不如我多材多藝能事鬼神也乃命于帝庭敷佑四方用能定爾子孫于下地四方之民罔不祗畏者武王已受天命旣佑下民于四方又定本支于百世一身之任可謂重矣安可遽絶乎言至於此旦之一身不足惜矣儻三王使武王無墜天之降寶命則我祖考亦永有依歸䖍恪之心惟恐三王之不受此身也今我即命于元龜者周公俟命旣無形聲之相接復欲卜之以知祖考之從違也則又告之曰爾之許我我其以璧與珪歸俟爾命爾不許我我乃屏璧與珪屏棄也將棄珪璧而不事鬼神矣其廹切之辭如家人父子有激怒祖考之意周公豈嘗試為之而僥倖其茍免者哉祖考寧不動心乎至是卜三王之龜皆吉是已許周公矣啓籥者啓金縢之籥而取其占驗之書合茲吉兆也公曰視此卦體王其無害予小子新命于三王惟永終是圖是言三王示此吉兆也茲我所以望三王念我武王之明騐也公歸乃納册于金縢之匱中武王翼日乃瘳周公之心喜可知也想夫周公自時厥後常念死期之必至其所以不死者天假之年以遺成王也使天不留周公以遺成王安得遷商頑民使之格化乎又安得制禮作樂以示將來乎又安得持盈守成神祇祖考皆安樂之乎又安得定鼎郟鄏卜世三十卜年七百乎故曰周公不死天特留以遺成王也孔子曰文王旣没文不在茲乎周公之不死盖此意也而莊周乃曰聖人不死大盗不止謬矣武王旣喪管叔及其羣弟乃流言於國曰公將不利於孺子周公乃告二公曰我之弗辟我無以告我先王周公居東二年則罪人斯得于後公乃為詩以貽王名之曰鴟鴞王亦未敢誚公秋大熟未穫天大雷電以風禾盡偃大木斯㧞邦人大恐王與大夫盡弁以啓金縢之書乃得周公所自以為功代武王之說二公及王乃問諸史與百執事對曰信噫公命我勿敢言王執書以泣曰其勿穆卜昔公勤勞王家惟予沖人弗及知今天動威以彰周公之德惟朕小子其親迎我國家禮亦宜之王出郊天乃雨反風禾則盡起二公命邦人凡大木所偃盡起而築之歲則大熟此章非典謨訓誥誓命之文皆史辭也方成王在幼管蔡羣叔肆為流言流者肆也以為周公將不利於孺子成王不能察亦以為疑周公當冡宰之任所謂有伊尹之志則可庸俗之人烏得不疑周公自信此心無一毫顧忌乃告二公曰我之弗辟所以不行刑辟負三王之付託者以未知流言之所自也居東二年乃得罪人之實向使三監及淮夷不叛亦不知罪人之所在以此知周公信任知道初不以流言為忤也然而猶不行刑辟者有兄弟天倫之愛不忍置之罪地也貽王之詩謂之鴟鴞曰旣取我子無毁我室其意若曰子旣叛國寧廢其子勿毁我王室權其輕重三監當誅矣王雖得詩其疑未解然亦未敢誚公尚懐猶豫周公居是時所謂逺則四國流言近則王不知也周大夫雖知之其如王不知何周公之心上與天通天實知之是故動威以彰周公之德盖非啓籥取其占騐之書則不得見周公之册也然則感悟成王又豈人之所能為乎盡弁者不敢慢也盖周家之典禮所當然也至於致問諸史與百執事則太公召公之心也二公誠知王之疑周公為非是然而無策以回成王之心至是可以伸其志矣而諸史百執事皆有愀然歎嗟之聲不謀同詞曰公命我勿敢言其言出於無心成王安得不翻然悔悟而知己之非乎其泣賛之詞曰其勿穆卜啓籥見書成王已知天為周公動威不必卜也夫偃禾㧞木謂之時數適然亦可也唯出郊迎勞之際反風起禾是為殊異盖非此則無以顯天威特為周公動也大抵人臣秉公正之操行其所學不欺此心俯仰無愧作者皆然是故人雖可誣天不可誣也觀周公一事學者益當自信武王崩三監及淮夷叛周公相成王將黜殷作大誥三監管蔡霍三叔也王制曰天子使其大夫為三監監於方伯之國國三人武王旣受命以大義立紂之子武庚為諸侯收商民之心也又懼其未服而有叛心乃以三叔監之三叔周之懿親也今與淮奄為叛罪不容誅矣故史氏幷言三監及淮夷斥三叔與夷狄同𩔖也夫叛者武庚也今序不言武庚而直曰三監及淮夷者盖以武庚雖有叛心非三監及淮夷挾之未必敢爾也誅其造意者此史法也而孟子亦曰管叔以殷畔管叔為三監之罪魁宜矣而先儒乃以管蔡商為三監審如是說不知為方伯者誰耶觀蔡仲之命曰乃致辟管叔于商囚蔡叔于郭鄰以車七乘降霍叔于庶人三年不齒此誅三監也意者霍叔未嘗與謀止貶其同位而不能正救故其罪輕也然則管蔡其主盟者歟故詩書多言管蔡然而周公大誥之書止言將黜商而不及三叔者親親之義周公尚忍有言耶以是知曰辟曰囚曰降皆不得已而為之也大誥者言非細事也主少國疑大臣未附百姓不信而欲動干戈以誅叛亂勝則為天下王不勝則周之為周未可知也其事存亡所繫此誥諸侯得不謂之大誥乎大誥王若曰猷大誥爾多邦越爾御事弗弔天降割于我家不少延洪惟我幼沖人嗣無疆大歴服弗造哲迪民康矧曰其有能格知天命已予惟小子若渉淵水予惟往求朕攸濟敷賁敷前人受命茲不忘大功予不敢閉于天降威用寧王遺我大寶龜紹天明即命曰有大艱于西土西土人亦不靜越茲蠢殷小腆誕敢紀其敘天降威知我國有疵民不康曰予復反鄙我周邦今蠢今翼日民獻有十夫予翼以于敉寧武圗功我有大事休朕卜并吉肆予告我友邦君越尹氏庶士御事曰予得吉卜予惟以爾庶邦于伐殷逋播臣爾庶邦君越庶士御事罔不反曰艱大民不靜亦惟在王宮邦君室越予小子考翼不可征王害不違卜肆予沖人永思艱曰嗚呼允蠢鰥寡哀哉予造天役遺大投艱于朕身越予沖人不卬自恤義爾邦君越爾多士尹氏御事綏予曰無毖于恤不可不成乃寧考圗功已予惟小子不敢替上帝命天休于寧王興我小邦周寧王惟卜用克綏受茲命今天其相民矧亦惟卜用嗚呼天明畏弼我丕丕基王曰爾惟舊人爾丕克遠省爾知寧王若勤哉天閟毖我成功所予不敢不極卒寧王圗事肆予大化誘我友邦君天棐忱辭其考我民予曷其不于前寧人圖功攸終天亦惟用勤毖我民若有疾予曷敢不于前寧人攸受休畢王曰若昔朕其逝朕言艱日思若考作室旣底法厥子乃弗肯堂矧肯構厥父葘厥子乃弗肯播矧肯穫厥考翼其肯曰予有後弗棄基肆予曷敢不越卬敉寧王大命若兄考乃有友伐厥子民養其勸弗救王曰嗚呼肆哉爾庶邦君越爾御事爽邦由哲亦惟十人迪知上帝命越天棐忱爾時罔敢易法矧今天降戾于周邦惟大艱人誕鄰胥伐于厥室爾亦不知天命不易予永念曰天惟喪殷若穡夫予曷敢不終朕畝天亦惟休于前寧人予易其極卜敢弗于從率寧人有指疆土矧今卜并吉肆朕誕以爾東征天命不僭卜陳惟若茲王若曰者周公奉辭而伐罪也大誥爾多邦越爾御事多邦諸侯也御事諸侯之卿士師尹庶士也弗弔者呼昊天而悼武王之云亡愬其奪之遽不少延其命也洪惟我幼沖人臨戎而代成王言也嗣無疆之厯數撫無疆之五服乃遭家弗造未能知人安民况知天命之所在乎此言盖所以感動諸侯欲其以武王之故憫其孤弱而同心以赴敵也已予惟小子周公自謂也若渉淵水未知攸濟周公自責其不能輔導以聳動諸侯也大抵欲鼓舞衆心非責巳不能動周公旣為王言之又于已言之諸侯武王之臣也聞此可不感激奮勵而前乎是故敷飾武王受命之因而述其大功以為周家之造如此艱難豈以商一遺種作亂而遂拱手以聴其猖獗乎予不敢閉于天降威用天旣降威予不敢遏也武王一怒而安天下之民安寧也寧王謂武王也或者謂文王文王未嘗受命受命者武王也故亦謂之寧考寧人武王寶是大龜以稽疑成王紹天明即命即位之初卜之得其兆曰有大艱于西土西土人亦不靜越兹蠢商小腆誕敢紀其敘皆兆詞也夫武庚在東而曰西土人亦不安靜是武庚之叛西土之人亦不安而動也成王即位之時其兆已先見則西土之諸侯其可不赴此役乎商小腆誕敢紀其敘者或曰小腆若所謂小醜未之詳也今天降威知我國有疵有疵所謂有隙可投為三叔叛也知者龜為先知也民不康者不恱也商民言曰予復反鄙我周邦鄙夷周邦而反從商也商民無常吁可畏也我師旣動之明日有十夫來􅂇夫天之所􅂇者順也人之所􅂇者信也十夫之來皆豪傑也敉寧武圗功此為大美事也而况卜之并吉乎人之􅂇信天之助順則勝商必矣肆予告我友邦君以諸侯為友尊之也予既得吉卜卜其行師而勝也則商之逋播臣武庚不足平也而爾庶邦君越庶士御事反曰艱大旣以為難且大宜乎未盡從命也乃測兆詞之言以謂西土人不静者非為商民寔成王宫室之内有縱非􅂜而召亂王當自考翼欲其先自治不當罪商也其曰不可征是謂不當伐四國而勸成王何不違卜也此乃廷議之時諸侯不從故有是言周公今作誥乃重述其言而剖决于誥中也告以成王自聞汝言永思其艱亦不敢輕用兵其如蠢動鰥寡之為可哀何周公自謂予造此役負此大艱于身豈得已哉不卬自恤為王急急于此亦豈為自恤其身實畏天命而憫人窮也義爾邦君者以義期之使綏我之行無勞我憂共成此役以終武王之功故予小子不敢替天命盖天方美武王以興我周亦惟卜是用故克綏受天命今天其相我民亦惟卜是用而欲使我違卜有是理乎嗚呼天命可畏所以輔我丕丕基者是卜也王曰爾惟舊人言諸侯皆武王之舊人也爾當大逺思省武王之勤勞若此可不為其子地乎天閟毖我成功所者言天難諶勉我以成功予不敢不盡力以終寧王圗事嗚呼使公無此志成王不能持盈而守成矣肆予大化誘我友邦君我肆大化惟天誘汝衷與我同力可得成功天棐忱辭其考我民天聰明自我民聰明天明威自我民明威民之戴周如此而商人尚敢叛命予豈敢不念前寧人而終圖其功乎天亦惟用勤勉我民民歸則天意從矣今商民之叛若有疾者當力務去之予豈敢不念前寧人所受之美命而卒其成功乎王曰若昔朕其逝朕言艱日思若昔者順寧王之道以東征未嘗不日思其艱若考作室厥子乃弗肯終其役厥父葘厥子乃弗肯卒其業厥考翼敬事也兢兢業業以創業垂統厥子其肯曰予有後弗棄基前人作基業後人豈當棄乎言武王成此大業今若商人逋誅是棄此基業肆予曷敢不竟此役乎今伐商之役譬若兄考有友而伐其子其民其僕勸而不救可乎故雖管蔡同氣若擾我成王必并王室棄之不得不以吾君之子為重也嗚呼肆哉肆陳也爾諸侯聴我所陳明德于邦皆由哲人今此十夫知天命之所在不謀同歸天固棐忱豈能易君臣之大法今天降戾于周邦惟此大艱人胥伐于厥室是骨􅁏自相背何止鬩墻也彼自取夷滅爾天命豈可易哉予永念曰天之剪商若穡夫之除草武王旣闢其基曷敢不終我畝盖言前人之功有貴于後人繼繼承承可不力圗所以共濟之道乎天亦惟美於武王敢不從天之卜是當力保武王之疆土况卜之并吉乎以爾東征天命必不差卜陳惟若茲若茲者如前所言也大誥一篇自首至尾惟言卜之不可不從寧王之功不可不終竊意周公専為邦君御事導王違卜而作是書所以反覆詳盡以卜為言諸侯聞此若𤼵醯雞之覆則必人人用命矣嗚呼周公之心其所以為成王者如此其至可以副皇天動威成王感泣之意矣成王旣黜殷命殺武庚命微子啟代殷後作微子之命百篇之内已有微子今微子之命乃紀其錫命之書也當紂之亂微子痛宗廟之祀將絶乃抱祭器而逃于荒野以俟有君然後求續故孔子止云微子去之而戰國之士遂以為抱祭器而適周非知微子者使微子懐適周之念是二其心者也是違其君者也烏得三仁之列乎武王有天下釋箕子囚封比干基式商容閭當時㣲子儻在豐鎬之間武王豈不待之如商容乎然而未聞是微子猶未歸周明矣豈嘗面縳銜璧如楚逄伯之言乎方武王旣成伐功憫紂之亡急於繼絶以武庚實紂之子故不問賢否而立之又以三叔監焉使不為非以續其宗祀武王之志可謂忠厚矣及武庚之叛成王周公乃擇賢者繼之始得微子若以後世君臣懲創武庚之變必絶商祀乃以勤勤告戒直欲延商之祀與周同休可謂能繼武王之志矣詩歌周家忠厚盖如是然後可以言忠厚也啟微子之名也不立之朝歌而立于宋此所謂黜商也此篇周家制誥之書先述乃祖次言其德後復戒之勉之誠萬世王言之大法也微子旣封宋當曰宋公歴千萬世微子之名不磨以見其不忘商之舊爵也微子之命王若曰猷殷王元子惟稽古崇德象賢統承先王修其禮物作賔于王家與國咸休永世無窮嗚呼乃祖成湯克齊聖廣淵皇天眷佑誕受厥命撫民以寛除其邪虐功加于時德垂後裔爾惟踐修厥猷舊有令聞恪愼克孝肅恭神人予嘉乃德曰篤不忘上帝時歆下民祗恊庸建爾于上公尹茲東夏欽哉徃敷乃訓愼乃服命率由典常以蕃王室𢎞乃烈祖律乃有民永綏厥位毗予一人世世享德萬邦作式俾我有周無斁嗚呼徃哉惟休無替朕命王若曰猷者始辭也商王元子帝乙之長嗣紂之庶兄也惟稽古崇德象賢此一篇之大㫖盖非稽古則不能賛成湯之德賛其祖之德是謂崇德稱其人之賢是謂象賢成王命微子之意得矣統承先王不墜其宗緒修其禮物不易商之禮制而作賔于王家與國同休示不以臣禮待待之以客禮也於是罔為臣僕之志遂矣至是宋始得與杞同為二王之後振鷺有客之詩皆曰客作賔之證也自乃祖成湯克齊聖廣淵皇天眷佑誕受厥命撫民以寛除其邪虐功加于時德垂後裔是為崇德自爾惟踐修厥猷舊有令聞恪愼克孝肅恭神人予嘉乃德曰篤不忘上帝時歆下民祗恊庸建爾于上公尹茲東夏是為象賢自欽哉往敷乃訓慎乃服命率由典常以蕃王室洪乃烈祖律乃有民永綏厥位毗予一人世世享德萬邦作式俾我有周無斁嗚呼徃哉惟休無替朕命戒之勉之之詞至矣孔氏曰帝王之制坦然明白可舉而行其以此歟觀其丁寧告戒㣲子至誠惻怛若父兄之訓子弟欲其永世與我有周無斁則知殺武庚之舉深出於不得已也嗚呼此其為三代之王歟唐叔得禾異畝同穎獻諸天子王命唐叔歸周公于東作歸禾周公旣得命禾旅天子之命作嘉禾唐叔得禾異畝同穎此誠和氣所召竊意其國政平訟理人和而天地之和應之若此而唐叔不有其功致之天子則尊君親上之心可見矣成王不敢當乃推本於周公因使唐叔趣召周公是以有歸禾一書周公旣得命陳天子之命而作嘉禾想見當時君臣之間情義相感有融融洩洩之樂所謂君能下下以成其政臣能歸美以報其上者其在茲乎惜乎此書不及見於後世也
