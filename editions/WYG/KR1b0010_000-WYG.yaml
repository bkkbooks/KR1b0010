  text: 欽定四庫全書經部二
  hash: sha256:0cc932f81e16f40609470aaa0474e8369dec60a220254d8de2f21651552b055d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0010_WYG_000-1a, image: WYG0056/WYG0056-0169a.png}
body:
  text: 尚書講義二十卷書類提要臣等謹案尚書講義二十卷宋史浩撰浩字直翁鄞縣人紹興十四年進士孝宗為建王時浩以司封郎中兼直講即位後遷翰林學士知制誥累官右丞相致仕事蹟具宋史本𫝊此書宋史藝文志作二十二卷文淵閣書目一齋書目並載其名而藏書家已久無傳本故朱彞尊經義考亦注云未見惟永樂大典各韻中尚全錄其文謹依經文考次排訂釐為二十卷案宋館閣書目云淳熙十六年正月太傅史浩進尚書講義二十二卷詔藏秘府葢本當時經進之本故其説皆順文演繹頗近經幄講章之體其説大抵以注疏為主叅考諸儒而以已意融貫之當張浚用兵中原時浩方為右僕射獨持異論論者責其沮恢復之謀今觀其解文侯之命一篇亦極美宣王之勤政復讎而傷平王之無志恢復則其意原不以用兵為非殆以浚未能度力量時故不欲僥倖嘗試耶朱子語類嘗稱史丞相説書亦有好處如命公後衆説皆云命伯禽為公之後史云成王既歸命周公在後看公定予往矣一言便見得周公且在後之意云云其後命蔡沈訂正書𫝊實從浩説則朱子固於此書有所取孫應時燭湖集有上史越王書云書𫝊多所𤼵明帝王君臣精微正大之藴剖決古今異同偏見開悟後學心目使人沛然飽滿者無慮數十百條又云欲以疑義請教者一一疏諸下方則浩此書實與應時商㩁之則亦非率爾茍作矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:46225dfcc27188a42df74901b791e3866dd200fbf5ab5fded2dc7babe3652c54
