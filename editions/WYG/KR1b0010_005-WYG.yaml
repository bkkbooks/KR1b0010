body:
  text: 尚書講義卷五宋史浩撰夏書禹别九州隨山濬川任土作貢禹治水於堯之朝敘其功勲列其貢賦為一代之大典不載之舜典之次而史係之夏書者禹所製故也九州之疆理昔先帝王立其城郭保其人民必取一方之鎮髙山大川以為依據方其大浸稽天城郭人民已化為魚鼈之淵民之避害必即一方之髙山以為橧巢營窟望洋向若但見九州之髙山浮於水上企而視之若島嶼然雖謂之九洲亦可也禹能隨山刋木乘舟乘車乘輴乘樏排決其水或注之江或入於海然後人得平土九州不復混然無别此疆爾界自此而分是故兩河之間必為冀州東南據濟西北距河必為兖州東北據海西南距岱必為青州東海北岱南及於淮必為徐州北至淮南距海必為揚州北距荆山南及衡山之陽必為荆州西南荆山北距河水必為豫州東距華山之陽西至黒水必為梁州東距西河西距黒水必為雍州疆理既定後世雖有作者不能易矣故曰别九州也九州之地人既可以桑麻衣食懋遷有無而寶貨之産草木之珍以漸而出禹因著其品目條章以為享上之資不責以所無不拘其定額使民安之而無非所從出之怨故曰任土作貢也孟子曰夏后氏五十而貢其實什一也則其無定額可知而又載龍子之言曰貢者校數嵗之中以為常因知後世貢賦之物不卹其地之所産或昔有而今無或昔多而今寡一立定式永不可免故曰莫不善於貢蓋失大禹之本制故也禹貢禹貢一篇非為任土作貢而為是書也蓋因洪水既平禹貢𤣥圭于堯歸美而告厥成功爾若謂任土作貢而曰禹貢紀書者當曰任土賦貢作禹貢矣不曰作禹貢者則知隨山濬川任土作貢是紀山川用力先後之次序土地所産貢賦之名物皆聚此書也其實禹貢是因進此書及𤣥圭以告成功故以是名篇也或者難曰禹錫𤣥圭堯實錫禹以賞其功審如是説不知告成功者其堯耶其禹耶若曰堯錫當曰錫禹𤣥圭賞厥成功可也是知告成功者禹也錫𤣥圭者亦禹也無疑矣以書考之天之畀曰錫天乃錫禹洪範九疇是也君之賜曰錫平王錫晉文侯秬鬯圭瓉是也臣之貢亦曰錫師錫帝曰九江納錫大龜是也孰謂禹錫非禹貢耶禹敷土隨山刋木奠髙山大川昔者鯀陻洪水以其隄防不固水之奔放侵齧防一隤則鄰國為壑水何由平善治水者得水之性順而就下必積土取薪作為捍防以導其去路鯀則陻之宜乎績用弗成也禹之治水先備土木將以立隄防也敷開也敷土刋木得其先務矣或謂刋木所以闢路方水未作亦有人民豈無塗路水退依然如故何待處處隨山而刋木耶山林川谷丘陵能出雲為風雨見怪物者皆曰神禹將有事於明必先致力于幽禱于山川鬼神也奠髙山大川得其先務矣或謂奠者定也至是髙山大川皆定矣融結之始山川具在何待禹定耶後世河決瓠子天子至親屈萬乗負薪率塞則視禹先事而敷土刋木為如何沈白馬於河以祭則視禹先事而奠髙山大川為知何禹之治水所以異於人者備先具也嘗謂箕子所論鯀陻洪水汨陳其五行帝乃震怒不畀洪範九疇而禹能得之謂必有髙世之見度越其父及觀禹行水之先初無巧妙敷土刋木奠髙山大川而已蓋天下萬事只同一理理之順者為吉逆之則凶鯀逆水之性是故無往而不逆禹能順水之性是故無往而不順也順則九疇之錫􅂜倫之敘由是而之焉𫝊曰通於一而萬事畢此之謂也茍於此一事不得其道則知五行之汨陳􅂜倫之不敘斷無疑矣又何必事事物物嘗試而得之乎天監不逺舉念即知又況九載績用弗成者耶蓋水性趨下行于地中隄防不先一失其性奔放泛濫何所不有順其就下之性使之弗畔而東入於海此禹之治水也故昔人曰禹之治水水之道也蓋於治水能順其理而行則知金木水火土皆不失其性推之九疇無所處而不當矣嗚呼盛哉冀州既載壺口治梁及岐既修太原至于岳陽覃懐底績至于衡漳厥土惟白壤厥賦惟上上錯厥田惟中中恒衛既從大陸既作島夷皮服夾右碣石入于河惟彼陶唐有此冀方冀實堯都也禹盡力溝洫而不先帝都非知急務者蓋將以成萬世永賴之功而不使其君安于巖廊之上豈愛君之志哉夫治水當尋其源梁雍在冀上而禹必自冀始先吾君也按地理志壺口在河東北屈縣既載壺口是壺口已為平陸然治梁及岐梁岐實雍地上流也壺口既浚則可以決上流之壅矣原之大者曰太原後世因以為郡名今晉陽是也太岳在太原之南㳂流而導之也覃懐河内地底績功亦就也漳水横截故曰衡漳白壤土色無雜膏腴也天作地藏可以為帝王之都矣厥賦上上錯者錯雜也賦為上上而無貢其曰錯者貢亦在内所以優畿内也厥田中中五等也白壤沃壤也而田惟中中不多取也恒衛二水既從故道大陸之地斯可興作島夷化外而猶得衣其羽皮以表水平而異類亦得樂其生也州之境内舟楫所由必通道以達於帝都冀州東西南三面皆大河其北則有滹沱嘔夷淶易之水皆東入於海碣石之山實在海濵舟行此水欲至帝都必由此山之南泝河流而西上而碣石在其右故曰夾右也常謂堯既都冀天下仰之為京師故率土之濵皆知歸嚮望雲就日葵藿一心慕義趨風梯航萬里孰不奔走於闕庭之下碣石冀地畿内也然猶紀其水陸之所經從則夫八州安得不具敘其趨朝入貢之道路乎此禹教天下以尊君親上之大義也濟河惟兖州九河既道雷夏既澤灉沮㑹同桑土既蠶是降丘宅土厥土黑墳厥草惟繇厥木惟條厥田惟中下厥賦貞作十有三載乃同厥貢漆絲厥篚織文浮于濟漯達於河兖州之地周逥皆河濟故不引山同言也濟之為水其流至細而得在四瀆之祀者以其經營中國而終與江河淮同㑹于海也兖當河之下流而九河又兖之下流水當下流汗漫澎湃無以泄其怒故疏九河以導之又其下為逆河逆者迎也迎其水以殺其怒使之趨下而入于海也九河既道是大水已盡傾下始得見雷夏之澤雷夏有澤以瀦其水則漸露平陸而灉沮二水見焉二水㑹同由地中行於是桑土既蠶則禹降丘宅土平治之功亦勤矣以降丘宅土之勤則知禹於兖最為用力厥土黒墳沈淤之地也厥草惟繇繇長也草生於水得水故特長也厥木惟條久在波浸土之所産無大木也厥田六等厥賦正者田既中下賦亦適相當也作十有三載者禹於此州治水已四載矣始定其賦之同中下也厥貢厥篚皆出於蠶土宜桑也按史記禹疏二渠以引河水北載之髙地注云其一則漯川是也蓋兖州所道或由濟水或由漯水皆可入河而至冀浮者謂能通利舟楫也海岱惟青州嵎夷既畧濰淄其道厥土白墳海濵廣斥厥田惟上下厥賦中上厥貢鹽絺海物惟錯岱畎絲枲鉛松怪石萊夷作牧厥篚檿絲浮于汶達于濟自兖而之青順治也青州今山東東北據海遼東在焉西南距岱萊夷在焉嵎夷者𤾉谷也日所出處其地極東今水既平嵎夷亦在封畧之内濰湽二水得其故道矣萊亦夷也其地為陸庶草繁廡可以放牧也厥土雖白而墳墳起也近海多斥鹵土鹹不可種植而猶田為第三賦為第四以其土白而墳猶有冀州白壤之膏脈焉厥貢厥篚非上所賦臣下所以供上者也故取其一方竒物以為獻非上所欲得也有其名物未必皆取也惟絺絲枲衣服所資鹽與海錯膳羞所用漆洎檿絲琴瑟所取至於鉛松則器用藥物或待其供若夫怪石非上所欲以其温潤如玉俗以為美不忍不貢亦芹暄之意也青州水道自汶入濟泝濟西上至滎澤入河而至冀達于濟則達于河可知矣海岱及淮惟徐州淮沂其乂蒙羽其藝大野既豬東原底平厥土赤埴墳草木漸包厥田惟上中厥賦中中厥貢惟土五色羽畎夏翟嶧陽孤桐泗濵浮磬淮夷蠙珠暨魚厥篚𤣥纎縞浮于淮泗達于河東至海北至岱南至淮是為徐州之境淮之原出於豫至揚徐始大汎濫為患尤在於徐故於徐言之沂出泰山縣艾山南入于泗至徐而始大乂治也二水既乂徐方始平而蒙羽二山向無樵牧者始可以種作矣徐之澤名大野大野既豬水有所歸則東原底平厥土赤埴墳埴土之細膩可以埏為器者草木漸包進而叢生也厥田三等厥賦五等厥貢惟土五色五色土或曰可以備錫諸侯也羽谷有雉其文五采可以備車旂之用孤桐生於嶧山必生於山之陽其枝榦輕空故可取以為琴瑟之材也石沈物也而泗濵之石謂之浮磬蓋石出於水面其狀若浮其聲越可取以為磬也淮夷近屬之夷寶貨所出蠙介物也珠生焉魚鱗物也枕生焉非獨此也來獻其琛玉亦在焉厥篚𤣥纎縞𤣥繒白縞皆輕細若蟬翼鮫綃之類也以是知淮夷寶貨所出焉或謂淮夷為二水恐不然也泗水南入於淮北通菏澤與濟水通則可以達于河而至冀書言自泗入河蓋略其辭也淮海惟揚州彭蠡既豬陽鳥攸居三江既入震澤底定篠簜既敷厥草惟夭厥木惟喬厥土惟塗泥厥田惟下下厥賦下上上錯厥貢惟金三品瑶琨篠簜齒革羽毛惟木島夷卉服厥篚織貝厥包橘柚錫貢沿于江海達于淮泗北據淮南距海為揚州揚子一江出于章貢奔而入于京口自岷嶓以來水之入于江者凡九故至于敷淺原而經京口乃入海也章貢之水至于彭蠡既已豬而為澤復㑹岷嶓二江之水以為三江也陽鳥雁也隨陽往來故曰陽鳥方水汎濫無所歸宿彭蠡既豬則得所居矣然彭蠡所㑹止有岷江而曰三江何也蓋嶓冡之江過三澨至於大别南已入于江矣至是不得不謂之三江也而曰震澤底定者揚在中國南近東也震為東方之卦而厥土塗泥總揚之地謂之震澤宜矣或者取太湖之震澤以為據謂一江出義興一江出毗陵一江出吳縣以是為三既已誤矣惟此三江東方之細流何足為禹道不知太湖之震澤乃後世取禹貢震澤而以名具區之澤也豈可據是以解經乎東方謂之震澤若西南謂之坤維是也惟灨岷嶓三江既入乎海則東方澤國可以桑麻稻粱故曰震澤底定也西北之氣嚴凝東南之氣温厚温厚之氣浮於陽故東南之美有㑹稽之竹箭而篠簜既敷敷者開舒也厥草之華多妍媚而馨烈夭者艶也大塊噫氣其名為風鼓舞𤼵揚其陽氣也然而地不滿東南濵海也扵卦為巽風之所聚多颶風焉是無作作則大木斯拔惟其挺然獨秀者真喬木也故有取焉厥土塗泥沮洳也厥田九等厥賦七等而上厥貢惟金三品金銀銅也瑶琨玉之次篠簜竹之纎齒為象齒革為犀皮羽為翠羽毛為髦牛木為沈檀之屬也陽氣𤼵越凡木皆薌也島夷化外能以百卉之皮紡績為絲而衣焉厥篚織貝朝霞白㲲古貝之屬也其包而致逺惟橘與柚實西北之所貴也蓋踰淮則無是物矣然錫亦貢也納亦貢也錫貢納錫每兼言者決非常貢之物故重其事也揚州水道必松江入海自海復入淮泝流而入泗遂至菏澤達於河而至冀按左氏𫝊吳城邗溝通江淮即今淮南漕渠禹時未有故須縈紆而得達河也荆及衡陽惟荆州江漢朝宗于海九江孔殷沱潛既道雲土夢作乂厥土惟塗泥厥田惟下中厥賦上下厥貢羽毛齒革惟金三品杶榦栝柏礪砥砮丹惟箘簵楛三邦底貢厥名包匭菁茅厥篚𤣥纁璣組九江納錫大龜浮于江沱潛漢逾于洛至于南河荆楚地也衡在楚之南衡嶽之南無大山故曰衡陽岷山嶓冡二江未合是為江漢江漢距海不知其幾而曰朝宗于海者海在東也二水之赴雖千萬里必朝于海也蓋其濫觴之初其勢巳東如臣下之朝于君雖道阻且逺此心不得而遏也九江孔殷孔甚也殷盛也言荆適在九江之盛處也或以為烏江蜯江烏白江嘉靡江畎江源江廩江隄江菌江是為九江此皆細流也不足為功按左𫝊曰江漢沮漳楚之望也又唐志曰江南道其大川湘灨沅澧而灨兼章貢二江是為九江九江東㑹于彭蠡合為一江至潯陽而九江盡矣故經曰過九江至于敷淺原敷淺原在潯陽之境故至今人指潯陽謂之九江也沱潛二水既導則荆州為平土然梁州亦有沱潛或曰源於梁州而委于荆州是未詳也沱潛既平宜乎雲夢之澤作乂也雲夢跨江兩岸其廣九百里雖不如賦者之誇然既曰雲土是雲夢皆有土矣要亦非卑隘之澤也厥土塗泥不異揚厥田八等厥賦三等厥貢羽毛齒革惟金三品亦與揚同言之先後不必辨也杶榦栝柏木之美礪砥砮丹石之英惟菌簵楛皆弓矢之材非不良也而有名可貢者菁茅是也蓋菁菹豆實而茅可縮酒此為王祭所重故有名焉其曰三邦必荆之三國産是物也昔齊伐楚責楚貢之不入不言羽毛齒革金石竹木而曰包茅不入王祭不供其意若曰有名者尚且不貢則無名者可知矣是知所重者祭祀厥有名者惟菁茅也既包又匭則其貴重可知矣厥篚𤣥纁二色合而為絳也璣不圓之珠以是飾組也九江之湄黿鼉龜龍之窟而納貢獨以龜云者以其為天子之寶也解者曰龜之大者長尺有二今荆楚之間或有之其大不止於尺二也荆州之境亦江流所經但山川囬逺不可循揚州入都之道故舟浮江沱潛漢入豫州境乃遵陸逾山復浮洛水而至南河以達冀也荆河惟豫州伊洛瀍澗既入于河滎波既豬導菏澤被孟豬厥土惟壤下土墳壚厥田惟中上厥賦錯上中厥貢漆枲絺紵厥篚纖纊錫貢磬錯浮于洛達于河南距荆山北極河南之南是為豫州伊水出𢎞農盧氏縣瀍水出河南穀城縣澗水出𢎞農新安縣三水俱入洛是以得其故道而自此入河也滎水泛濫但見其波今既豬蓄而為澤矣然後導菏澤被孟豬是菏澤既導而孟豬亦蒙其利也豫之賦貢可定矣厥土惟壤無砂礫也下土墳壚墳起而黒亦沃衍也田惟四等賦非一色而猶在二等足以知其肥磽也厥貢之物漆可以備器用枲也絺也紵也麻苧葛三物之絲也可以備衣服矣厥篚纖纊緜之細者磬錯用以錯玉也詩它山之石可以攻玉此之謂也然錫亦貢也錫貢兼言所以重其事亦不常貢也或謂待錫命然後貢非也春秋譏天王求金求車杜其漸也後世猶有伐大宛以求馬諷其臣以獻鷹者禹為萬世立法豈肯作俑而使人主有求于諸侯之國耶是以知其不然也豫州去冀最近故浮洛即達于南河而至冀矣華陽黒水惟梁州岷嶓既藝沱潛既道蔡蒙旅平和夷底績厥土青黎厥田惟下上厥賦下中三錯厥貢璆鐵銀鏤砮磬熊羆狐貍織皮西傾因桓是來浮于潛逾于沔入于渭亂于河華山之南有梁州梁與雍西鄰黒水梁鄰黒水之南雍鄰黒水之北岷山嶓冡之水實在梁地一出蜀郡西徼外一出隴西郡山西二水既泄而下流則二山可以種藝而其下有沱潛二水沱出岷江而潛出嶓冡蔡蒙二山又在岷嶓之下沱潛既導則梁州水患平矣旅於蔡蒙之山而告和夷之底績也厥土青黎青􅀺淤壤宜物者也厥田七等厥賦雜出八等九等是田賦共為三錯也厥貢璆鐵銀鏤砮磬璆玉也磬石也銀白金也惟是三物必礲必錯故取砮鐵鏤三物同貢也熊羆狐貍織皮者四獸之皮其毛可以緝而為毯故曰織皮梁州之大川曰江曰漢皆東入于海其取帝都之道最為隔絶故或因桓而來或浮潛而下皆㑹于沔沔漢上也自沔入渭必遵陸逾山始能至焉爾雅云正絶流曰亂堯都冀之平陽與渭汭東西適相直既出渭即逕絶河而東不復沿流故曰亂也黒水西河惟雍州弱水既西涇屬渭汭漆沮既從澧水攸同荆􅄮既旅終南惇物至于鳥鼠原隰底績至于豬野三危既宅三苗丕敘厥土惟黄壤厥田惟上上厥賦中下厥貢惟球琳琅玕浮于積石至于龍門西河㑹于渭汭織皮崐崘析支渠搜西戎即敘黒水在雍之西南雍實天下最髙處以形言之地之􅆃也上有平原廣野可以為國邑而水則必隨山之東西南北以導之故曰隨山濬川也自雍以西水當西導自雍以東水當東流雍既西據黒水東距河河必東流山自雍起起而東走于海水亦隨山而行此昔人有三條四列之説至于弱水在雍之西禹亦不能使之東地勢然也故曰弱水既西既西云者本自西流故也涇水至濁屬于渭水之涯漆沮二水從之而與澧水同入于渭既入于渭則水勢已平矣荆山非荆州之山産玉之山也其地在馮翊懐徳縣岐山在美陽縣二山相近既旅者告祭水功之成也終南惇物鳥鼠三山之原隰皆底績至于豬野陂而蓄之水功全矣三危四裔之地也竄三苗于三危意者雍州之外羈縻之國也至于丕敘亦得平土生息而大定也厥土黄而無雜厥田得土之正色所以為一等厥賦六等厥貢惟球琳琅玕皆玉之美者雍之境内有山緜亘南北險絶難逾故水道所達蓋有二焉一則自積石浮舟順河之流自北而南至龍門西河一則浮渭而東入于河蓋渭之入河適在龍門之下故曰㑹于渭汭也以九州所敘言之當繫之西戎即敘之後今先載此未之詳也雍州之水至灃而水功畢矣故詩美豐邑曰豐水東注維禹之績是也織皮崑崙析支渠搜四者皆雍西諸戎即敘者皆已得平土而居也導岍及􅄮至于荆山逾于河壺口雷首至于太岳底柱析城至于王屋太行恒山至于碣石入于海西傾朱圉鳥鼠至于太華熊耳外方桐柏至于陪尾導嶓冡至于荆山内方至于大别岷山之陽至于衡山過九江至于敷淺原禹别九州之山不言其首尾蓋方欲使一州之疆里不越故不包舉也及境界既定乃言隨山之功欲使天下皆知其山緜亘聯屬不止一州自首至尾初無間斷間有隠伏不見其一氣所鍾脈絡相貫如人之骨節然也梁雍天下之􅆃地最髙處也自梁雍以東實為中國諸山東奔各有脈絡然皆自梁雍𤼵也以梁雍為􅆃則岍雍州山也岍為一支其在雍曰岍曰岐曰荆山其在冀曰壺口曰雷首曰太岳曰常山壺口之旁别出一山曰底柱曰析城曰王屋曰太行而合于常山焉至于碣石碣石海濵之山河至此而入海故也西傾亦雍州山也西傾為一支其在雍曰西傾曰朱圉曰鳥鼠曰太華其在豫曰熊耳曰外方曰桐柏曰陪尾陪尾淮濵之山淮由此而達于海故也嶓冡梁州山也嶓冢為一支漢之原也其在梁曰嶓冢在荆曰荆山曰内方曰大别大别漢濵之山漢至此而入江故也岷山亦梁州山也岷山為一支江之源也其在梁曰岷山在荆曰衡山在揚曰敷淺原敷淺原江濵之山江由此而達于海故也此禹所導之山也導有二義焉隨山曰導者引導也經歴其山也濬川曰導者疏導也排決其水也蓋禹方當浩蕩懐襄之時所見者髙山也其乘車乘舟所至之處也故因敘之欲使帝堯知九州之名山非専為一州主也導弱水至于合黎餘波入于流沙導黒水至于三危入于南海導河積石至于龍門南至于華隂東至于底柱又東至于孟津東過洛汭至于大伾北過洚水至于大陸又北播為九河同為逆河入于海嶓冡導􅃞東流為漢又東為滄浪之水過三澨至于大别南入于江東匯澤為彭蠡東為北江入于海岷山導江東别為沱又東至于澧過九江至于東陵東迆北㑹于匯東為中江入于海導沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北㑹于汶又北東入于海導淮自桐柏東㑹于泗沂東入于海導渭自鳥鼠同穴東會于澧又東㑹于涇又東過漆沮入于河導洛自熊耳東北㑹于澗􅈆又東㑹于伊又東北入于河禹别九州之川不究其源委止取州境之水言之蓋欲一州之疆理弗越故不包舉也及境界既定乃敘濬川之功欲使天下皆知水之在州境者其來有自而其去有方不止盤紆於一州之地也蓋天以梁雍限中國故其地最髙為天下之脊水之出乎梁雍之東者必東注以入于海水之出乎梁雍之西者亦當西導雖禹不能使之東也導弱水至于合黎餘波入于流沙此西域地也水在雍西散渙無力不能負芥故曰弱水既生于西必西導可也導黒水至于三危入于南海此西南夷地也水在雍之西南幽險若漆不知所出故曰黒水既生西南必南導可也或者曰弱水黒水無用于中國禹故導之使西殊不知雍西乃偏方下土鍾聚惡弱之氣是以二水並生其地也若謂禹故不使之東是不知地理者之言也想夫雍西非無甘洌清泚之流禹亦安能激之而使東乎所謂行其所無事者能順地勢故也且夫梁雍以東有水必東説者不曰禹以東海為壑而曰以四海為壑者豈非東西南北之水各隨其方而導之乎後世𫝊西域者謂于闐以西水皆西流入于西海此其證也自梁雍以東水之東走者不一而其大者有七曰河曰漢曰江曰濟曰淮曰渭曰洛其一曰河不知其源或云河出崑崙或云出吐蕃之悶磨黎山未之詳也禹之導河始於積石積石雍地也河至是而廣矣故經曰浮于積石言其始大也自積石而至龍門龍門禹所鑿也南至于華隂東過冀之底柱孟津大伾洚水大陸然後播為九河同為逆河以入海焉河當下流水盛怒而無以泄故疏九河以殺其勢又為逆河以寛其壅故能順行而入于海也九河自古論之者多矣而了無定説蓋以九河之形不復見故也竊料此地自春秋時已淪沒于海乆矣世𫝊以謂齊桓塞之其實求其九而不可得故倡為此論至漢韓牧欲尋九河復其故迹王横難之曰往者天嘗連雨東北風海水溢西南出浸數百里九河之地已為海所漸矣漢去古未逺其説可信信如此言則九河之迹何自而求之徒為紛紛也且以禹貢碣石實在海垠今之碣石宛在水中則九河之淪沒有是理也其二曰嶓冡導􅃞東流為漢梁地也又東為滄浪之水過三澨至于大别南與岷山之江合于荆地同㑹于彭蠡謂之北江其三曰岷山導江東别為沱梁地也至荆而與漢合澧水注之㑹于彭蠡彭蠡者灨江之下流章貢二水合一江而出至是始與岷嶓之水會故謂之三江至揚而同入于海東方震澤始得為平土矣然而兹言三江今所敘乃岷嶓二江而不及灨者非禹所導故不言也嶓冢之漢南入于江久矣同與岷山之江至於彭蠡始與灨合為一江已不可分矣而又曰東為北江東為中江何哉蓋揚子既為一江以灨言之則為南江以岷山言之則為中江以嶓冡言之則為北江其實一江也譬如人身五臟之氣各有所主合而會于咽常人知其為一而望氣者知其為五水既合為一江常人知其為一而治水者知其為三此醫之所以為神醫而禹之所以為神禹也然而又曰過九江者豈三江之外復有九江乎夫長江萬里水之奔赴奚止九江禹之所定指其大者言之所謂湘灨沅澧江漢沮漳是也三江實在其數焉其四曰導沇水東流為濟入于河溢為滎東出于陶丘之北又東至于菏又東北㑹于汶又北東入于海沇水𤼵源于冀州而書不言所導之自或云出于王屋未之詳也濟在河之北洛在河之南二水適然同湊于河水既輕清浮而在上不與濁流混至其溢也則在上者必濟水也既豬為滎復出陶丘之北而至于菏皆豫地也東北㑹于兖之汶北東至青之境而入海矣嘗謂通天下一氣氣之輕清者為神氣之重濁者為物惟水亦然諸水惟濟為輕清波流若神隠顯出沒非地脈所能斷故直與江河淮相為終始而㑹于海此所以得祀而為四瀆也其五曰導淮自桐柏東㑹于泗沂東入于海淮水出豫之胎簮山在南陽平氏縣東北至桐柏桐柏亦豫地淮至此而大禹始導之逕徐之泗而㑹沂水以入于海矣其六曰導渭自鳥鼠同穴東㑹于灃又東會于涇又東過漆沮入于河鳥鼠在西傾之下雍地也灃涇漆沮皆出于雍入于龍門西河故經曰㑹于渭汭而入河矣其七曰導洛自熊耳東北㑹于澗􅈆又東㑹于伊又東北入于河熊耳豫地也澗􅈆伊皆在豫其入河則在孟津之西經言導河東過洛汭是也嘗謂水之有名唯四瀆而禹之所導乃兼漢渭洛言之想其所施之功力不異四瀆也總而論之漢可附江而渭洛可以附河其備敘之者蓋欲帝堯知天下大川不止于四瀆也九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海會同六府孔修庶土交正底慎財賦咸則三壤成賦中邦錫土姓祗台徳先不距朕行五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米五百里侯服百里采二百里男邦三百里諸侯五百里綏服三百里揆文教二百里奮武衛五百里要服三百里夷二百里蔡五百里荒服三百里蠻二百里流東漸于海西被于流沙朔南暨聲教訖于四海禹錫𤣥圭告厥成功案此叚講義原缺啓與有扈戰于甘之野作甘誓甘之戰有扈氏之罪不容誅矣王者有征而無戰征之為言正也各欲正己也焉用戰啓以天子之尊有事于諸侯彼當牽羊肉袒悔罪于馬足車塵以囬天子之怒不知出此而遂至于戰其悖禮拒命之迹著矣啓雖不作誓以威衆扈亦何所逃誅耶扈國扶風而甘其南郊也或曰扈亦禹之族于啓為同姓嗚呼茍畔王命雖管蔡亦當誅況扈其疎族而又獲罪于天者耶甘誓大戰于甘乃召六卿王曰嗟六事之人予誓告汝天子躬冒矢石六卿皆從不謂之大戰可乎周官士師一曰誓用之軍旅天子六軍其將皆命卿今觀諸此此法非始于周始于夏也夫以至仁伐至不仁以至義伐至不義勢若雷霆之震萬鈞之壓況已及其郊宜乎賈勇矜能徳色誶語見于顔面顧乃咨嗟以告六事之人則王者用兵誠非得己也以不得己之心而用之兹其所以為行天之罰歟有扈氏威侮五行怠棄三正天用勦絶其命天之生人賦以最靈之性非徒使之生息長養塊然於天地間蓋欲其行天之權以輔化工之不及茍非其人天道廢矣故天之禍人尤亟於逆天者王者於此其可赦耶夫水火金木土運行而不停者謂之五行天地人循環以為紀者謂之三正此天之所以隂隲下民而人君所以奉若天道之大要也有扈氏獨威侮怠棄之威侮暴慢也怠棄廢忽也天何望哉昔者鯀陻洪水汨陳而巳未至於威侮五行也身猶殛死羲和尸官廢時亂日而巳未至於怠棄三正也國猶不祀今也有扈氏其罪貫盈天命誅之則勦絶之期能幸而免乎今予惟恭行天之罰王親督戰易所謂在師中吉象曰承天寵也則王用行師豈不為行天罰乎天之命啓使行其罰豈必諄諄然賜弓矢而後征賜鈇鉞而後殺乎亦以有扈氏自作逆天之孽因而誅之出於無私與天合道爾是故或謂之天討或謂之天吏皆出於無私也三王應天率由此道後之摟諸侯以伐諸侯者私也故為三王之罪人以土地之故糜爛其民者又私也故為五霸之罪人至於黷武窮兵不能自戢使無辜生靈肝腦塗地者抑又私也故未免為諸侯之罪人安得以啓之所謂恭行者告之乎其曰恭行奉天而弗逆也竊嘗謂天之惡逆天者甚於人之惡冦讐而其愛奉天者又甚于人之愛其子今有扈氏既以逆天而致罰則當時天下諸侯朝覲訟獄謳歌者不之益而之啓豈人之所能為哉天也左不攻于左汝不恭命右不攻于右汝不恭命御非其馬之正汝不恭命攻治也王者之兵貴乎先自治也春秋𫝊記魯及齊戰孟氏之軍孟孺子為左顔羽御邴洩為右季氏之軍冉求為左管周父御樊遲為右此一車之中自有左右也或者以謂今之左右則不然蓋天子親征車徒並起凡言左右者徒也言御者車也鄭伯禦周為魚麗之陳先偏後伍伍承彌縫周官以五人為伍五伍為兩則伍者豈非徒乎杜預以十五乗為大偏九乗為小偏則偏者豈非車乎徒必用人故為翼長者在左右車必用馬故為御者率在中使左不治左右不治右則掎角之勢不成兵刃既接將棄甲曳兵而走矣豈不為辱命乎使御非其馬之正則進退之節失序所謂右無良焉必敗偏敗衆乃􅂝矣豈不為辱命乎兵法曰先為不可勝以待敵之可勝啓於是時豈有服敵之心哉先為不可勝以俟夫天命而已矣用命賞于祖不用命戮于社予則孥戮汝祭義曰凡建國之神位右社稷而左宗廟左陽也故賞由之右隂也故刑由之夏之宗廟社稷禹所建也啓方臨戎賞罰不違成憲而必歸之祖社則兹行豈其私哉荘周曰禹攻有扈夫攻有扈者啓也而曰禹何哉蓋啓仗禹之威以成功則賞罰必由於祖社宜矣閟宫之詩曰戎狄是膺荆舒是懲此頌魯僖公也而孟子乃曰周公方且膺之誠以僖公之保彼東方周公之餘澤也故以其功歸之是亦荘周不言啓之意也然則孟子所謂啓賢能敬承繼禹之道與此書實相表裏至于孥戮則如後世髠鉗之類啟豈有是哉威衆之辭不得不深爾不然何以湯誓亦云
