body:
  text: 尚書講義卷十五宋史浩撰成王在豐欲宅洛邑使召公先相宅作召誥周自大王去邠邑于岐山之下文王遷于豐詩稱既伐于崇作邑于豐是也武王遷于鎬考卜維王宅是鎬京是也成王至是欲謀都洛洛當天地之中四方貢賦道里適均而武王克商遷九鼎居之已有意都洛矣成王所以繼先志也其曰在豐自鎬至豐欵文王之故都告文王之清廟也其曰相宅將營宫室必相其陰陽所謂辨方正位以建國也鎬京謂之宗周而洛謂之成周成周東都也即是朝諸侯焉其後宣王中興復㑹諸侯於東都有以見成王營此所以朝諸侯也說者謂成王實未嘗遷幸至平王避犬戎之禍始居于洛謂之東周而鎬京始廢黍離之詩序曰周大夫行役至于宗周過故宗廟宫室盡為禾黍於是鎬京為犬戎所殘始為丘墟揚雄乃謂太和在成周信如說者之言成周乃平王所都而謂太和之世未之詳也然書序今言欲宅洛邑欲者未定之辭竊意周公知洛為天地之中故欲營治以為王都因遷商頑民而自治之則平王東遷之應已兆於此矣召誥惟二月既望越六日乙未王朝步自周則至于豐惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅厥既得卜則經營越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成若翼日乙卯周公朝至于洛則達觀于新邑營越三日丁巳用牲于郊牛二越翼日戊午乃社于新邑牛一羊一豕一越七日甲子周公乃朝用書命庶殷侯甸男邦伯厥既命殷庶庶殷丕作召誥之作召公復命之辭也而此載行幸作役告成之月日意者聖人定書取史氏之紀冠于首也於是周公輔成王七年矣二月朔後六日成王自周至豐周即鎬亰成王所都豐有文王之廟以營洛告也三月丙午正三日也朏者生明之名又三日而召公至既得卜矣則經之營之又三日則庶民攻之庶殷者以見殷民之多雖頑而即工也水北曰汭攻者治其險穢位者朝市宗廟郊社之位也位成矣周公始來遍觀乃以丁巳用牲于郊告天也牛二者上帝而以后稷配翼日社于新邑告地也牛一羊一豕一者天子社稷皆太牢用牛其是矣附以羊豕羣小祀從也稷不與者以配天而致告也庶殷吾讎也猶有子來之心則周民可知矣天地至神也猶申告成之祀則祖宗可知矣遷都之意幽明已白周公乃朝用書命庶殷侯甸男邦伯者周公以書告商民與諸侯所以遵王命也蓋周有天下九夷八蠻尚皆馴服獨有商民不能革化昧天命之所歸故謂之頑成王周公安得奠枕今于此舉所以探商民之心而鎮服商民之亂也庶殷丕作大盡力役亦既聽命矣復何患哉然則非周公無以經始非召公無以成終成王之致隆平師保之力也太保乃以庶邦冢君出取幣乃復入錫周公曰拜手稽首旅王若公誥告庶殷越自乃御事嗚呼皇天上帝改厥元子兹大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬天既遐終大邦殷之命兹殷多先哲王在天越厥後王後民兹服厥命厥終智藏瘝在夫知保抱攜持厥婦子以哀籲天徂厥亡出執嗚呼天亦哀于四方民其眷命用懋王其疾敬德案此條講義永樂大典原缺相古先民有夏天迪從子保面稽天若今時既墜厥命今相有殷天迪格保面稽天若今時既墜厥命今沖子嗣則無遺壽耉曰其稽我古人之德矧曰其有能稽謀自天嗚呼有王雖小元子哉其丕能諴于小民今休王不敢後用顧畏于民碞王來紹上帝自服于土中相考也先民古聖人也面嚮也考古聖人有夏曰禹天順其與子而保民禹亦面考天道而順之也有商曰湯天順其格天而保民湯亦面考天道而順之也今皆既墜厥命豈禹湯之罪哉桀紂廢棄而失之也今幼沖之子成王嗣文武之業無遺壽耉之人周公為之師召公為之保也考古人之德知文武畀付之意亦若禹湯之望其後嗣也矧又能考謀自天其都洛之舉非人謀也考之於天亦能面考天道而順之也順天矣若小民不諴亦何貴於君乎故召公又曰有王雖小實武王之元子也大能諴感於小民今有休美矣夫使諸侯及庶殷大作以聽命非有以感于民心其能若是皆周公召公歸美之辭也王不敢後者不敢不敬天也用顧畏于民碞者不唯畏天亦畏民心之險也上而欽天而天豫下而畏民而民從則來紹上帝荷上帝之歆以宅土中享四方之歸豈不宜哉旦曰其作大邑其自時配皇天毖祀于上下其自時中乂王厥有成命治民今休王先服殷御事比介于我有周御事節性惟日其邁王敬作所不可不敬德召公既贊成王曰今休又恐諸侯庶殷未之然也於是引周公之辭以為證亦曰今休可謂善揚君之美矣皇天者法道之天也道之在天下聖人得之以洪覆人物其功乃能配天民物之在君治如生於元氣之中長養而不知其恩如遊於春風之中鼓舞而不知其和故曰其自時配皇天蓋民者民物神祇之主毖祀于上下則天地神祇為之降格卜宅于大邑則中土之民為之時乂上有昊天之成命下有斯民之嚮治今其享盈成之美矣然則周公之辭與召公之誥蓋無以異召公於是又曰王先服殷御事商之御事比介于我有周御事者成王始以商民難變遷之洛邑使居地中陶天地之正氣變其風聲氣習欲令商之御事比我有周御事以同其心介我有周御事以協其力如是乃為服周之化也然商民既庶矣又何加焉曰教之則節性者豈非教之乎教之則日進而不自知安知商民之為周民乎周民之為商民乎雖然王欲使羣下節性茍身自不修雖令不從矣此所以戒以敬作所而不可不敬德也易曰艮其止止其所也老子曰不失其所者久則所者其性也王不敬作所則羣下之性何從而節矣我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命今王嗣受厥命我亦惟兹二國命嗣若功前事之不忘後事之師也夏之天下桀失之商之天下紂失之則監于二代者前車之覆後車之戒也商人固曰商鑒不逺在夏后之世今嗣王不可不監夏后之世又不可不監商紂之時也我不敢知夏商之受命與夫歷年之多寡亦不敢知其不延而早墜厥命蓋以天難諶而命靡常豈可俄而度哉此不敢知也然而豈終不可知耶試以德之敬不敬占之則應若影響之無差矣夏禹敬天而天受之敬民而民歸之成湯亦然至其末也桀紂反之而失天下則嗣王承文武之烈其所以得天下亦禹湯也豈可不以桀紂為戒乎故曰既受厥命我亦惟兹二國命嗣若功誠欲使成王思二國之所以失天命繼嗣文武之道順以求其功也嗚呼使夏人思大禹之功則安得有鳴條之戰使商人監夏氏之失則安得有牧野之師嗣王監之而不敬焉亦使後人復以嗣王為監矣嗚呼乃召公之戒可謂切至矣王乃初服嗚呼若生子罔不在厥初生自貽哲命今天其命哲命吉凶命歷年知今我初服宅新邑肆惟王其疾敬德王其德之用祈天永命其惟王勿以小民淫用非彞亦敢殄戮用乂民若有功其惟王位在德元小民乃惟刑用于天下越王顯上下勤恤其曰我受天命丕若有夏歷年式勿替有殷歷年欲王以小民受天永命拜手稽首曰豫小臣敢以王之讎民百君子越友民保受王威命明德王末有成命王亦顯我非敢勤惟恭奉幣用供王能祈天永命王乃初服始宅而朝也召公譬之若生子罔不在厥初生夫人有生之初不失善心是天所命不自他求而固有者也故曰自貽哲者上智之謂也上智之人與生俱生至於下愚則以習而成非天命也茍不失其赤子之善則德之吉凶數之修短皆自我感召而已王宅新邑如人初生不可因陋就寡當汲汲修其敬德庶復其初是以用其德以祈天永命也以德則動罔不吉以數則多歷年所此天之永命也王其勿以小民過用非法之故亦敢殄戮也蓋小民麗于非法以愚而不知禁故也王豈可亦恣其殄戮而弗哀矜之耶𫝊曰如得其情則哀矜而勿喜夫如是然後可以乂民若有功皆王以德為先非因刑而致治也若小民則知用刑于天下而已刑豈可常用哉王當以敬德而易小民之用非法則斯顯著昭明矣遷都本以為民今君臣一心以勤恤民庶幾則王受命歷年當若夏商以民心而受天命民歸而天豫之也復曰豫小臣敢以讎民讎民商之頑民也百君子周之賢士大夫也友民周之良民也保受王威命明德則民心無頑良無逺近皆歸之矣王終有成命矣當是時也王之威德豈不顯著昭明哉臣但能以民心天命規正於王不敢自伐其勤勞惟恭以事王助王毖祀而有祈於天君臣如此天豈不永其命乎召公相成王為左右之功於兹可見召公既相宅周公往營成周使來告卜作洛誥案此條講義永樂大典原缺洛誥周公拜手稽首曰朕復子明辟復子明辟自孔氏以為周公居攝而還位于成王之辭其後諸儒無有異論惟王安石以為復者告也明辟君也周公以定洛告成王非攝位而還之也復者若說命所謂說復于王孟子所謂有復于王者是也若謂周公作是書而還位於成王則召公為保周公為師相成王為左右是成王自即位巳為君在上不知周公昔何所受而今還之也漢儒不達復字之義乃以為還位後世紛紛遂有復辟之論以事理考之當以王說為然也洛邑既成周公懲三監之叛畏商人之不服為腹心害欲為國家消萬世之禍是以身任其責斷然宅洛而不辭復子明辟若曰致書於王也嘗謂周公攝政固當還也方周公有營洛之役王之所聞止於伻圖而公遽以還政為說言非其時成王得無疑乎又況周公相踐阼而治踐阼實在成王何以復辟為也其言迥然非類學者當自知之王如弗敢及天基命定命豫乃𦙍保大相東土其基作民明辟豫惟乙卯朝至于洛師我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食伻來以圖及獻卜王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來來視豫卜休恆吉我二人共貞公其以豫萬億年敬天之休拜手稽首誨言辟君也成王既長為明君矣周公居于洛宜也王如弗敢者周公遣伻之辭也夫受天之命先有以基之然後乃定而不傾王如未敢相捨當及天之基命定不可失之意豫今作洛乃是嗣保天命大相東土其基王之治民明辟爾蓋周家所患在於商民商民苟弗悛嗣有三監之叛周之所以為周未可知也周公知其然作宅東土以鎮服其民所以為王基其治民作辟之本嗣保者或云繼召公而相宅也是故自乙卯朝至于洛師者衆也若所謂京師也既卜河朔黎水又卜澗水東瀍水西又卜瀍水東皆不如洛洛者召公所先卜也龜之有靈其不變如此伊洛瀍澗皆在河之左右而黎陽獨河北故曰河朔黎水洛食者凡卜之道先墨龜為兆而今謂之令龜灼而兆順其墨謂之食墨其曰惟洛食者兆順其墨也伻使也使之獻圖而告卜也王乃拜手稽首以受之以食洛為天休則營而作之可與吾宗周並休矣常吉永吉也二人皆知其永吉斷以示天下所謂共貞也則億萬斯年實我公之惠也拜手稽首誨言拜其誨言不敢慢也或曰二人文武也以詞語考之周公召公而已此不可不辨周公曰王肇稱殷禮祀于新邑咸秩無文豫齊百工伻從王于周豫惟曰庶有事今王即命曰記功宗以功作元祀惟命曰汝受命篤弼丕視功載乃汝其悉自教工孺子其朋孺子其朋其往無若火始焰焰厥攸灼敘弗其絶厥若彞及撫事如豫惟以在周工往新邑伻嚮即有僚明作有功惇大成裕汝永有辭王既定洛復歸于鎬使往來以傳辭也周公居洛始祭以落其成故曰肇稱殷祀祀之盛也如易所謂殷薦之上帝之殷也而必歸之王周公不敢專也夫禮有常文非此族者不在祀典今而咸秩之是雖不在祀典者亦預祀也豈非盛乎周公使百工從王以歸周則周公居洛也明矣而惟曰庶有事者請所事於祭祀之間也王即命曰記功宗宗者尊其功也以功之尊者作元配所謂以勞定國則祀之也新邑既定莫先於紀功紀功莫大於百世祀此成績所以紀大常而祭於蒸之意也惟命者周公受命之辭也曰汝受命篤弼篤弼言王受命之後篤重輔弼故今有報功之意也既大閲紀功之載籍乃悉有王自命之人蒞政之初紀功乃有不實之患此周公所以勤勤也孺子者王也其朋言王不可以私黨用人也其往言王自此以往也火始焰焰當即撲之勿待其炎灼而弗可絶也一順典常以撫事如我在周輔佐之日勿參以私人我雖在新邑王當使舊僚嚮者舊也使舊僚以作有功厚大汝心裕廣汝德勿屑屑以自私則汝有譽於天下矣嗚呼周公一覽載籍之失其丁寧告戒已如此則成王之過行戲言宜乎少矣公曰已汝惟沖子惟終汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮乃惟孺子頒朕不暇聽朕教汝于棐民彞汝乃是不蘉乃時惟不永哉公既受命故復以王之居周者戒之汝惟沖子惟終戒其克終如始也為君之道必察其臣之誠僞故享不享皆當識也享者享于上也若祭祀之享方其來享茍多物而誠不至焉與不享同役志于享則凡所以奉我者皆誠也不役志于享則其儀略吾故知其不享則凡所以奉我者皆僞也然則王固不當以貨取也爽輕也侮不䖍也不享其誠而享其物則事之爽侮無足怪者王不能識其不享使至于爽侮是王固可以利動而羣臣皆得以易之矣乃惟孺子頒朕徒以髙爵厚祿頒我茍不暇聽我教汝于治民之常道汝乃是不蘉蘉勉也於此不勉則王所以責我以公其以豫萬億年之語亦徒然矣故以乃時惟不永哉戒之嗚呼周公之言切至矣篤敘乃正父罔不若豫不敢廢乃命汝往敬哉兹豫其明農哉彼裕我民無逺用戾王若曰公明保豫沖子公稱丕顯德以豫小子揚文武烈奉答天命和恆四方民居師惇宗將禮稱秩元祀咸秩無文惟公德明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教豫沖子夙夜毖祀既告以不可不勉聽朕教汝于棐民彞今乃冀其篤敘篤敘者力行而敘民彞也乃正父罔不若者汝父無不順此以致治也豫不敢廢其命汝歸周當敬之哉兹豫其明農哉夫其乃祖乃父所以裕民之道初不求之逺而使至於背戾先於農而已倉廩實然後知禮節衣食足然後知榮辱則農者在所先務也臣工之詩戒助祭之諸侯終始以農告蓋周之先祖世修后稷公劉之業於此而不忘本周公所望於成王也王若曰公明保豫沖子公稱丕顯德者王以為公明保輔我稱我祖我父丕顯之德欲我對揚我祖我父之烈以答天命以和民之秉彞而處于衆則民成矣先成民而後致力於神是故厚宗將禮以有功者置之元祀而無文者咸秩之以為從祀周公豈淫祠者哉必其德明可薦之鬼神故也光于上下天地為之感格也勤施于四方萬民為之嚮化也旁作者左右我王使用穆穆斂敘之德以迓其隆平故文武之教不迷凡我所以致祭之道皆由公指之則吾何為哉恭己夙夜以事百神而已易曰出可以守宗廟社稷以為祭主也其此之謂歟王曰公功棐迪篤罔不若時王曰公子小子其退即辟于周命公後四方迪亂未定于宗禮亦未克敉公功迪將其後監我士師工誕保文武受民亂為四輔公功棐迪罔不若時公輔導我勉勵我無不順時也王又曰公者呼之也小子成王自稱也其退即辟于周者公既語我我退即往君于周矣命公後者使公且住洛緩其歸周之期也四方雖順治未定于宗禮故亦未及鎮撫公之功祝公順將其後監我士師工者居洛以監觀刑獄百工之事誕保文武所受於天之民治為四方之輔也嗚呼成王憚禮之未定可謂知所先務矣周公所以不得不作周官也周官之書必作於辨方正位體國經野之後者蓋此意也而謂之宗禮者伯夷掌禮謂之秩宗而周官亦謂之宗伯則禮之謂宗禮蓋有自矣成王至是欲以禮法維太平此神祇祖考不得不安樂之也說者以命公後為立伯禽於魯其說似非古者諸侯入為王卿士未有即命其世子嗣位者周公身存而伯禽自立可乎解書者徒見建爾元子俾侯于魯之詩遂遷就而為之說使成王果越舊章而為之周公亦豈肯受乎王曰公定豫往已公功肅將祗歡公無困哉我惟無斁其康事公勿替刑四方其世享成王之於周公非待之不疑何能致是非恃之以為安危亦何必勤勤如是耶今曰公定言公之心肯處于洛我乃敢歸宗周公功肅將祗歡者言周公肅而將命商民自然得其歡心茍公不留我則困矣此所以戒其無困我能於康民之事無厭斁之心則有望於公在無困也公其勿替俾儀刑于四海乃可世世享德矣成王懼商民之頑懲三監之擾其恤民之心如是切至孰謂其幼沖哉以周公之聖受武王寄託克荷天下之重而成王猶丁寧告戒之勤若此況其下於周公者成王馭之必有其道矣嗚呼賢哉周公拜手稽首曰王命豫來承保乃文祖受命民越乃光烈考武王𢎞朕恭孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先曰其自時中乂萬邦咸休惟王有成績豫旦以多子越御事篤前人成烈答其師作周孚先考朕昭子刑乃單文祖德伻來毖殷乃命寧豫以秬鬯二卣曰明禋拜手稽首休享豫不敢宿則禋于文王武王惠篤敘無有遘自疾萬年厭于乃德殷乃引考王伻殷乃承敘萬年其永觀朕子懷德王既告之如是之悉周公拜手稽首而復於王曰王命臣以宅洛邑臣承保文祖所受於天之民而增光烈考武王所以有後嗣之意無不盡恭也孺子來相宅者成王實始來祭也成王大厚典禮以禮商之賢人治為四方新立其法使罔不來朝則天下之恭蓋自成王為之先也其自時中已治至於萬邦咸休由內以及外王乃有成績豫旦以衆賢及御事勤奉文武之成憲以答有衆則有衆之孚信蓋自周公為之先也成王若是周公又若是可謂相得益彰矣考我昭明成王以儀刑四方乃盡文王之德也使我敬治商民故綏安我以秬鬯二卣夫秬黑黍鬯香草卣中尊也皆天子所以享上帝薦祖考之物成王使周公以此有事於神祇故曰明禋也周公拜手稽首以將君命不敢宿留於家則以禋于文王武王之廟其祝之辭祭之福具見於下蓋欲文武惠吾王力行敘治之勤無有遇疾所謂身之痾政之疵民之瘼皆去矣萬年厭飫我王之德而商之餘民亦乃延頸以考我王王使商人乃承其餘烈亦且萬年永觀我王懷柔之德所謂與王同休也嗚呼周公如是之謙恭如是之將命後世猶有謂成王以天子之禮樂賜周公者嗚呼其誤矣故曰魯之郊禘非禮也周公其衰矣然則魯用天子禮樂世世僭禮孰謂成王肯賜之乎戊辰王在新邑蒸祭歲文王騂牛一武王騂牛一王命作册逸祝册惟告周公其後王賔殺禋咸格王入太室祼王命周公後作册逸誥在十有二月惟周公誕保文武受命惟七年此自召誥之首用牲于郊社于新邑之後至是禋于文王武王之廟天神地祇人鬼俱享矣皆史氏之紀聖人定書分而附于二篇之前後使當時作洛之次序雖百世之下可考而知也其遺後世亦厚矣戊午社于新邑又七日甲子周公乃以成王朝諸侯庶殷既皆用命王乃告以使公居洛之意與公反覆言之已定矣乃用牛以告文武使知周公居洛之意其曰後者不敢絶周公之歸意姑留以鎮洛之辭也說者乃謂王立周公之後於魯夫使之居洛而立其子是成王疑周公不用命立其子以堅其心也周公豈反側而跋扈者何必為此使成王果有是心周公方且恐懼之不暇而敢受之乎此後世求經太深至於如此之鑿也其實王欲歸周百工既從王于周獨使公少留而後歸也蒸冬祭也歲十二月索享之祭故備物而熟之故曰蒸今祭于文武之廟加牛以彰其備禮也逸史之名也王賔周公殺牲以祭而祖考咸格太室者太廟之中室按月令冬居𤣥堂夏秋之間土用事四居太廟之太室祭有九祼在饋先先其誠也保事既畢乃明告周公之居洛中册使逸安之在十二月周公乃還政以居洛周公相成王誕保文武之民至是七年亦可以還政矣此皆史氏之紀也
