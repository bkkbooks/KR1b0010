body:
  text: 尚書講義卷二宋史浩撰虞舜側微堯聞之聰明將使嗣位歷試諸難作舜典孟子曰舜為法於天下可傳於後世此天意也夫自開闢以來天地廣大純厚之氣停蓄於上下歷鴻荒至三皇四帝而有舜舜得其氣之大全蓋欲使之為天下後世作法不得不生於側微側微者隱陋也夫既起於隱陋則萬古耕稼陶漁者皆得以取法夫既父頏母嚚象傲則萬古處父子兄弟之間者皆得以取法夫既百官事之二女女焉則萬古為朋友長幼夫婦者皆得以取法夫既齊七政頒五瑞巡狩以覲諸侯協時月正日同律度量衡舉賢去不肖則萬古為君者皆得以取法向使舜不生於側微則人倫五者政化百為可以為法爾耕稼陶漁何所法乎是故孰不為耕使人遜畔者舜也孰不為漁使人遜居者舜也然則天固生舜於側微之中其意蓋為天下後世作大模楷欲使天下後世自天子至於庶人皆當法舜也嗚呼非孟子不能形容大舜非深明大舜者不能知天意之所在也前言側陋者其地也此言側微者其人也堯曰豫聞之安有以天下與人聞之不熟而輕授乎君人之德唯在聰明聰明者與天地同體故曰惟天聰明惟聖時憲是故堯舜以聰明在上而仲虺稱湯亦曰惟天生聰明時乂穆王稱文武亦曰聰明齊聖序書者以聰明包括舜之大德當矣夫以側微一介之野人而使之當五典百揆四門大麓上而欽天事神中而黜陟幽明下而至於夷蠻鳥獸魚鱉皆獲其所豈不為甚難哉惟其難而能為之使天下之人皆知之皆見之皆以莫能及而心服焉此舜之所以終能享無為之治也舜典曰若稽古帝舜曰重華協于帝濬哲文明溫恭允塞玄德升聞乃命以位愼徽五典五典克從納于百揆百揆時敘賓于四門四門穆穆納于大麓烈風雷雨弗迷帝曰格汝舜詢事考言乃言底可績三載汝陟帝位舜讓于德弗嗣粵若稽古帝舜此不謂之虞舜而曰帝舜者舜已為帝也服堯之服誦堯之言行堯之行謂之重華宜矣然非其心協于堯則非所謂重也重者言其施為皆由堯之本意也濬深也哲深于內而文明溫恭篤實見于外者皆合堯之欽明文思也幽微之德既上聞于帝聰則堯之信舜者久矣夫天下之至難者莫若敘彝倫明百度懷萬邦格皇天堯使舜敬徽五典五典克從者彝倫敘也納于百揆百揆時敘者百度明也賔四門以禮外客四門穆穆然和敬者萬邦懷也納于大麓行深山大澤中雖烈風雷雨而不變皇天格也此皆舜受命之符而天下于此亦必皆知舜之可以為吾君也然則堯之所以稔舜之德者至矣盡矣格來也呼之辭也詢事考言者雖以堯之聖其觀人也亦必先詢其行事而後考其言歷試諸難詢其行事也至是足以驗其言矣乃言底可績者知其言之必可行非若共工之靜言庸違也告之以三載汝當陟帝位舜猶自以為德不足以嗣堯而辭焉則受堯之位其敢慢命而違其言乎故韓愈曰堯以是傳之舜豈非授受一道而不可以差殊觀乎嗚呼此其所以為堯舜也正月上日受終于文祖正月一月也上日非朔日乃吉日也文祖其始祖廟也有事于祖廟則餘廟可知矣古者人君受命告于文祖受終亦然受終者明堯猶在御而倦勤退位終天子之事爾至是舜始攝也古之聖人求與天地相似者惟堯與舜此孔子定書獨首二典也堯之有天下黃屋非心心乎道也堯舜以治天下為有道者之細事故視此身如寄逆旅無一分留戀舉而與賢初無吝色原其本心無偏無黨合乎道耳是以孔子取為萬古帝王之軌範後世雖有巧辨不得少訾焉也在璿璣玉衡以齊七政此舜作體天之法也堯有厯象舜則璣衡厯象以數推也璣衡以形求也其實均于體天以布政也璿為隂類故璣在上玉為陽類故衡在下天氣下降地氣上騰之象也日月五星于是不得遁矣然而人君一事之乖宜一物之失所則日月為之薄蝕五星為之謫見謂之七政舜亦視之而立政也後世帝王其有即政之初不知應天以立政者是不法舜也而能治天下乎肆類于上帝禋于六宗望于山川遍于羣神此舜作事天之法也肆遂也類祭也上帝天也天夫道也地妻道也舉天則地必從矣昊天有成命之詩曰郊祀天地者以此也禋亦祭也六宗者祭法所謂時也寒暑也日也月也星也水旱也四坎壇之祭四方山林川谷之見怪物者皆得為之神以其幽逺望而祭之故曰望于山川遍于羣神也後世帝王其有為社稷主即位之初而不能告天地神明者是不法舜也而能治天下乎輯五瑞既月乃日覲四嶽羣牧班瑞于羣后此舜作合符節之法也輯合也公侯伯子男五等諸侯皆有所執之玉即政之始而合斂之既盡也既月乃日覲受命之後班于羣后以明天子之賜而諸侯執之安有不知所自者乎後世帝王即政之始不能班瑞而使諸侯不知其命維新者是不法舜也而可以治乎歲二月東巡守至于岱宗柴望秩于山川肆覲東后協時月正日同律度量衡修五禮五玉三帛二生一死贄如五器卒乃復此舜作率諸侯之法也天子適諸侯曰巡狩巡狩者巡所守也無非事者蓋巡狩者天子有事於四方所以省方觀民設教也舜不待稍久而遽出者知國家之綱紀有在於是豈不謂之急先務乎舜都平陽而二月逺至東嶽者春行東方不敢紊也岱宗泰山也燔柴而祭天告至也望而秩于山川遂覲東方之諸侯協時月正日所以一正朔也同律十二律也度丈尺也量斗斛也衡權衡也所以齊不齊也修五禮吉凶軍賔嘉也五玉五瑞也三帛即纁玄黃也二生羔鴈也一死雉也諸侯各以其等而行贄見之禮也五器五瑞也執而歸之天子畢禮則復還之也舜以是而率諸侯諸侯敢不虔恭而奉命乎後世帝王於即政之始不知考禮正刑一德以自尊者是不法舜也而可以治乎五月南巡守至于南嶽如岱禮八月西巡守至于西嶽如初十有一月朔巡守至于北嶽如西禮歸格于藝祖用特此舜作行幸之法也五月必至南方八月必至西方十有一月必至北方各以其時也以其時者順天道也如岱禮如初如西禮其實無異也及其告歸用特者牲用一牛格于藝祖藝祖太祖廟也一牛蕆事告至之禮如是其儉則道路之供億菲薄可知矣舜非不知千乘萬騎可以自奉三牲九鼎可以奉祖廟也蓋以謂五載一巡茍作法于豐天下蕭然煩費矣子孫寧無起封泰山而禪梁父之説者乎謹始之道舜其得之後世帝王疲民以事遊觀之美是不法舜也而可以治乎五載一巡守羣后四朝敷奏以言明試以功車服以庸此舜作選諸侯之法也天子巡守諸侯各朝于方嶽之下羣后四朝是也既使之敷奏而觀其言又使之明試而責其功然後錫之車服民功曰庸以車服而賞庸所以表凡我之行皆為民也諸侯以民功而受賞其誰不勸乎然天子之賜山川土田皆在所錫而而必曰車服者以車服為賜豫之大也采菽先王能錫命之詩也而曰君子來朝何錫豫之雖無豫之路車乘馬又何豫之玄衮及黼車服之重也如此後之帝王茍不先明試之法而與以私恩假以名器是不法舜也而可以治乎肇十有二州封十有二山濬川此舜作養民之法也蓋洪水既平之後民日繁庶分州所以均戶口也然既庶矣又何加焉曰富之封山濬川富其民也肇始也舜始分冀為幽並分青為營也封十有二州之山則斧斤以時而材木不可勝用濬十有二州之川則旱暵有儲而粒米不狼戾矣茍不治之于安平無事之日事至而為之備亦巳晚矣民何所仰乎後之帝王茍不留意于養民是不法舜也而可以治乎象以典刑流宥五刑鞭作官刑撲作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉此舜作恤刑之法也蓋民得所養又何加焉曰教之教之不從設刑以糾亦不屑之教誨也及其至也刑不用而天下化矣典刑常刑也殺人者死傷人抵罪各象其所犯五刑墨劓剕宫大辟流者屏之逺方納之圜土冀其自新而不殘其支體也鞭撲亦所以緩肉刑而贖刑則終之以恕也又時有眚災肆赦之舉此刑之所以無刑也至于終以怙恃而不悛革始不容于世矣康誥曰人有小罪非眚乃惟終自作不典式爾不可不殺此其意也欽哉欽哉惟刑之恤哉哀矜惻怛之意備見于此後之帝王不養其民而虐之不教其民而刑之是不法舜也而可以治乎流共工于幽洲放歡兜于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服此舜作用刑之法也幽洲北裔崇山南裔三危西裔羽山東裔流之放之竄之皆遷也殛則死矣夫共工氏有靜言庸違象恭滔天之罪歡兜氏有醜類惡物是與比周之罪三苖氏有不分孤寡不恤窮匱之罪鯀則有方命圯族彝倫攸斁之罪在堯之時所謂四凶族實衆所棄者棄之矣宜乎天下之咸服也夫賢者在位乃能成治然而不肖者不去賢者其肯進乎舜先去四凶得用賢之要術也後之帝王知不肖而不能退退而不能逺是不法舜也而可以治乎二十有八載帝乃殂落百姓如喪考妣三載四海遏密八音堯夀百一十七歲以經考之十六歲即位七十載使舜居攝歷試三載自正月上日二十八載矣禮曰大德者必得其夀昔華封人祝堯曰使聖人夀堯曰辭夫堯豈不知夀之可尚蓋以堯自揆其德必可得夀無所事祝也然而封人之心則不然有君如堯使千萬年在位人心猶未厭也彼百姓四海攀號慕念至三載之久其以父母事堯也宜矣月正元日舜格于文祖詢于四嶽闢四門明四目達四聰案此假講義原闕蓋永樂大典割截以歸各韻間有脫佚也今無可復考姑從闕文咨十有二牧曰食哉惟時柔逺能邇惇德允元而難任人蠻夷率服此舜作自治之法也夫蠻夷不可以禮義化不可以恩惠服使吾自治國勢日強自然畏而懷之此攘夷狄之法也夫外攘夷狄在于內修政事必求共理之賢十二牧其人也欲修政事莫先于食哉惟時莫大于柔逺能邇莫急于惇德允元而難任人何以言之吾不能務農重榖而奪其時安得家給人足乎吾不能撫寧近者使之胥悅安得逺者聞風而慕義乎吾不能崇尚有德信用其善則任人進矣任人小人也君子小人趨操不同使有德者進必能為國逺謀無貪功喜殺之心敵人亦必知我國有人而不敢犯至于任人則狃于時論不知上䇿在于自治逞一人之私意掠忠義之美名動干戈興徭役誓不與賊俱生不知彼已者往往從而和之以為當然及其敗事憂在國家吾奉身而退官職猶昔也名譽猶昔也何憚而不為是説哉其弊在于時尚髙論眩于名實而信用之過也茍難任人則任人不得參于其間蠻夷自然率服何者吾有自治之法足以使之服也率服足矣何必窮兵而逺討耶後之帝王不先自治而以征伐為務是不法舜也而可以治乎舜曰咨四嶽此舜作建官之法也夫建官而首詢四嶽明無私意矧舜之進用實由四嶽舜無求舉之意已足以知四嶽之公也今也建官可不咨其論乎是故論相必先伯禹一相得人則九官無不當其職者豈不為得其要乎故曰堯舜之仁不遍愛人急親賢也然不曰帝而曰舜者欲使後世知九官之賢雖在堯朝舜能用之以盡其材所以申堯未竟之志也後之帝王不辨能否而以私意建官是不法舜也而可以治乎有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首讓于稷契暨臯陶帝曰俞汝往哉言有能相我起大功業光帝堯之行事者乎當使之居道揆之地以表百官也亮信也采任也信任以惠疇人敷錫天下也非伯禹孰能當之僉曰伯禹作司空帝曰俞者允也信也且贊其已成之功而用之也禹之遜稷契臯陶非虛遜也必其人皆相才然後可以言于帝也及禹有天下相不用他人信乎當時所遜實一時之傑也禹之所任于此可見夫一相得人風虎雲龍其相應和如此舜享無為之治豈他求哉帝曰棄黎民阻飢汝后稷播時百榖棄在堯朝已為稷官民厄于飢能播百榖百榖之茂以時而已今而申之也蓋生民之本有在于是食為八政之先舜命相之後即申命稷知所本矣而稷亦自知非吾播種天下之飢亦將未艾乃不辭而承命夫稷自孩童已能陳五種為戲事是天生斯人以養天下之人則舜豈得不命之而為天下後世法哉帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬稷既播種民富矣又何加焉曰教之司徒司民也民之飽食逸居茍無教焉禽獸何異此教之不可後也夫百姓所以不親以人倫五者不遜遜順也契當敬敷此五者以為教也在寬者不可急也必勞之來之匡之直之輔之翼之使自得之也蓋孩提之童無不知愛親及其長也無不知敬兄兄弟夫婦長幼朋友君臣之道本其固有迷而不覺耳惟使其自得然後知非外鑠而行之不疑然則在寬善教也善教得民心自得之謂也帝曰臯陶蠻夷猾夏寇賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允教之不從則有刑焉撲作教刑也臯陶明于五刑墨劓剕宫辟也不得不并蠻夷寇賊而言也其實所以弼五教也刑以威四夷詰姦慝誅暴亂則蠻夷之殺伐寇賊之誅鋤皆𨽻之士師實未嘗用干戈以窮討也在舜之世有司空司徒而不立司馬之官者兵刑為後也上刑適輕下服下刑適重上服刑之而服輕重無私也流所以宥五刑曰流矣必有所止所止則為宅也五服三就則輕也重也輕重之間也五宅三居則近也逺也逺近之間也舜之用刑如是之審期于無刑之意見矣兹其所以貴于明允也臯陶之賢宜不待告舜之愼刑其至矣乎帝曰疇若豫工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓于殳斨暨伯與帝曰俞往哉汝諧工宜後也而舜命垂者以垂能順百工之事也夫工雖賤事而治天下者于此考其成是故紀治之成者必曰吏稱其職民安其業而贊之曰技巧工匠咸精其能夫咸精其能是于細事不敢欺也而不謂之治成乎垂之遜殳斨伯與風化使然也伯禹既遜其下皆遜以此知一相得人不憂天下之不治也往哉汝諧無出垂之右者垂安得而辭乎帝曰疇若豫上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞往哉汝諧虞之掌上山下澤則鳥獸草木咸得其性其曰若者順也然孟子曰舜使益掌火益烈山澤而焚之禽獸逃匿何哉夫不驅禽獸之猛安得養蕃而滋茂然非益能順鳥獸草木之性不能當其職也遐想當時物物皆被德化至于咸若則朱虎熊羆無如益也故曰往哉汝諧帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首讓于夔龍帝曰俞往欽哉舜命伯禹首咨四嶽今欲典禮乃復咨之所重者禮也舜之命官罔不序上而論相下而敷教恤刑蠻夷百工草木鳥獸皆被其德然後功成作樂治定制禮宜矣三禮天地人也禮以祭為主故官名以秩宗然禮與刑常相為用禮不下庶人刑不上大夫禮之所去刑之所取也古者禮官兼折刑故書曰伯夷降典折民惟刑夙夜惟寅嚴恭寅畏以行禮也直哉惟清訟直刑清以折刑也伯夷之職盡矣欽哉者二事皆重不可不敬也帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和夔曰於豫擊石拊石百獸率舞禮所以防偽而教之中樂所以防情而教之和伯夷典禮防其偽也后夔典樂防其情也蓋喜怒哀樂之未發謂之中發而皆中節謂之和和者行其中也直則厲矣溫以和之寬則慢矣栗以和之剛者幾于虐矣今也以和而無虐簡則幾于傲矣今也以和而無傲皆所以抑其過而勉其不及中之謂也豈非和所以行中之謂乎曰教胄子者國之元子與公卿大夫之子也使胄子教養于禮樂中和之域太平之極摯也夫樂行而易直子諒之心油然生焉樂之本也若夫見于形器聲音則樂之餘也然不于樂之餘而驗之何以知其本也是故詩者志之所之也嗟嘆之不足故有永歌焉聲依永者貴人聲也律和聲者樂勝而不流也由是而八風從律八音克諧矣天神降地祇格人鬼享三禮行之得樂而和故曰神人以和舜治之盛于此至矣盡矣不可以有加矣擊石拊石百獸率舞蓋有不期然而然者嗚呼盛哉帝曰龍朕堲讒説殄行震驚朕師命汝作納言夙夜出納朕命惟允受命于天惟舜獨正正矣百邪無自而入此即讒説殄行也夫治定功成宜乎端拱無為怠于為治矣而舜方且立納言之官以司出納安有壅蔽之患哉夫舜固不患此實有意于為天下後世法耳堲疾也讒説殄行惡之大者宜乎其疾之也變白為黑譖毁矯誣讒説也詭激崖異巧佞絶倫殄行也惟兹二者人所取信能動搖衆心故曰震驚朕師也龍作納言採下之言而進乎上宣上之言而達于下蓋所謂朝夕納誨以輔台德也故曰夙夜出納如此則讒説殄行烏得攘臂于其間乎故曰朕命惟允允信也非龍無以當此帝曰咨汝二十有二人欽哉惟時亮天功三載考績三考黜陟幽明庶績咸熙分北三苖四嶽十二牧九官二十二人也夫舜典一篇所以重堯之華而天欲使舜為天下後世之法故其小大之事先後之序無一不可為軌範者觀其所行天下後世有一事不合者皆過也帝堯之治如元氣之運太虛其渾淪磅礴不可推測但見四時行焉百物生焉舜則無不備矣如四時迭運而成歲必春而蠢必夏而假必秋而收必冬而藏一有不合如春行夏令秋行冬令不可差忒豈非天意欲使之為天下後世法乎然而堯舜之心則一于道耳行之而為法也後世帝王茍有得道于巳載之行事一付之公而無一毫私意是亦堯舜也故曰行堯之行是堯而已矣又曰舜何人也有為者亦若是可不勉諸直哉惟時時不可失也亮天功舉天以明功無私之謂績亦功也必待三載者美以久而成也三考九載也夫三載稽其功罪而賞罰之揆之以事也至于九載則非特知其事且知其心也幽者有懷于中而外不得而見者至是君子小人判矣黜也陟也退小人而用君子也不止于賞罰而已非以道觀烏能若是夫既以道觀則如明鑑如止水君子小人不得遁矣且以伯鯀言之九載續用弗成治水無功也非以道觀則安知其彛倫攸斁故九載而殛之非止于罰也夫天下之治常敗于小人而成于君子茍小人去矣庶績咸熙勢所當然也熙明也雖堯舜之聖亦不過辨君子小人而已舜治若此而三苗猶不即工分背者離散其黨也嘗觀易之為書言君子小人多矣或分其內外或辨其消長獨于大君有命開國承家直曰小人勿用蓋以小人一用則邦有必亂之道也語至于此則舜之黜陟幽明又所以為天下後世之法也後世帝王無意為聖君則已如有意于為聖君當以舜為模楷然則舜為法于天下可傳于後世孟子豈誣我哉舜生三十徵庸三十在位五十載陟方乃死舜壽一百一十二歲三十載堯舉舜而敷治敷治者敷堯之治于天下後世也攝位二十八載攝位者攝堯之位而行堯之道也避堯之子服堯之喪三載而踐位五十載至于鳴條而陟方説者謂巡守至蒼梧山地近莒之紀城陳留有鳴條亭諸説未之詳也帝釐下土方設居方别生分類作汨作九共九篇稿飫詩書皆有序序所以為作者之意是故雖更秦滅學而亡其辭讀其序者皆得其義獨此汨作九共稿飫十一篇辭義皆亡不可得而訓釋竊意繼舜典之後必有虞之所建置也而漢儒乃以九共為一篇既曰九篇不知何所據而以為一篇雖不敢以臆説苐若以為九則百篇具以為一則又亡其八矣
