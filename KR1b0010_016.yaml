body:
  text: 尚書講義卷十六宋史浩撰成周既成遷殷頑民周公以王命誥作多士此史氏紀周公遷商民于洛而告以天命也周公既成洛邑始自别為成周既以鎬京為宗周不得不以成周自異既遷商民于此又不得不以周為名也言民則士在其中今不誥民而誥士成王之意深矣蓋天下之俗有二一曰士二曰民後世之治不思率士而求率民此所以紛紛而不得其要也今夫民俗之善不過出入相友守望相助疾病相扶持其極則鑿井耕田日用飲食而已何有於君上哉何知於禮節榮辱哉唯夫士俗之善則禮義亷耻由此而生禮以辨君臣上下之分義以明是非利害之端亷以持進退取豫之節而耻以立曲直避就之方橫目之民蚩蚩可見視士之所為以為趨向茍士之所為無異於橫目則亦何所貴哉晉惠公之在秦也小人戚謂之不免君子恕以為必歸士民之見如是相逺則欲移風易俗豈不望於士君子哉孟子曰巨室之所慕一國慕之此民也而況於士之類乎多士惟三月周公初于新邑洛用告商王士王若曰爾殷遺多士弗弔旻天大降喪于殷我有周佑命將天明威致王罰勑殷命終于帝肆爾多士非我小國敢弋殷命惟天不卑允罔固亂弼我我其敢求位惟帝不畀惟我下民秉為惟天明畏周公始宅洛必先誥多士者以其在民上民視之為趨嚮故也必曰商王士者商之遺士也武王伐紂許久矣而士猶念商而謂之商王士以此知三代之時士有節操非若後世乍臣乍叛之徒成王所以委曲諭之而不忍加誅亦以勸當世也然而不可不諭者慮其此心不回將復有武庚之變故使周公鎮之而告以天命也傳曰不知命無以為君子唯士然後可以天命諭也天之弗弔大降喪于商而佑我有周周將天威以致罰于王以正商命之終于天也今陳告爾多士非我小國敢獵取天命天不與爾故使爾王不能固守其治天所以輔我此言天之不與商也非我一人敢僥求天位帝不與爾故使我民相擕持而至以昭天之明威此言帝之不與商也曰天曰帝交舉以明商之得罪於天深所以使商士知天命之可畏而不敢怨也我聞曰上帝引逸有夏不適逸則惟帝降格嚮于時夏弗克庸帝大淫泆有辭惟時天罔念聞厥惟廢元命降致罰乃命爾先祖成湯革夏俊民甸四方自成湯至于帝乙罔不明德恤祀亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤在今後嗣王誕罔顯于天矧曰其有聽念于先王勤家誕淫厥泆罔顧于天顯民祗惟時上帝不保降若兹大喪惟天不卑不明厥德凡四方小大邦喪罔非有辭于罰兹欲使商之多士知天命之所歸故舉汝商之先祖所以革夏以證我周之先考所以代商之由使之無疑於天命也引棄去也天之所棄者以其逸而無勤勞也有夏之君不趨于逸則天降格而嚮之言其與天通也桀既弗克用此以事天乃大淫佚而文過以辭惟時天罔念聞言其與天不通也天本有嚮夏之命今則廢矣不降格而降罰矣故汝商之先祖成湯始得革夏命俊乂斯民而甸治四方也自成湯至于帝乙賢聖之君六七作罔不明其德于已而恤其祀于神天嚮其德乃大建立其祚而保乂其君其君亦罔敢失天意罔不配天而澤天下自此以後嗣王則紂矣大不明德以顯天天且不能事而況能聽念先王之勤家乎不勤者如有夏之適逸也大淫其佚不顧于天顯民祗言其不顧顯天敬民之理天既不保降滋大喪亦猶天為商降罰于夏也天既不卑昏于厥德小大之邦用喪罔非有辭于罰亦猶有夏民欲與之皆亡也嗚呼與亂同事罔不亡夏桀商紂為惡不同同歸于亂至其錯天命則如出一轍豈我武王私意哉爾商多士于此不可不知時變也王若曰爾殷多士今惟我周王丕靈承帝事有命曰割殷告勑于帝惟我事不二適惟爾王家我適豫其曰惟爾洪無度我不爾動自乃邑豫亦念天即于殷大戾肆不正王曰猷告爾多士豫惟時其遷居西爾非我一人奉德不康寧時惟天命無違朕不敢有後無我怨惟爾知惟殷先人有册有典殷革夏命今爾又曰夏迪簡在王庭有服在百僚豫一人惟聽用德肆豫敢求爾于天邑商豫惟率肆矜爾非豫罪時惟天命今惟我周王周之先王也靈神也莫神于天我既大承事于天有命當割絶有商我復告敕于帝以待天命故觀兵于孟津以歸冀商之改過期不再往惟爾王家既無悔過之心此武王所以必往故曰惟爾王家我適我之受天命如是而汝大無法度復挾三監以叛固非擾動爾邑念天命之不可不征但使大戾即罪餘黨之不正者悉寬肆之所謂殱厥渠魁脅從罔治也今遷汝而西居于洛邑非我所為不靖以勞動汝時惟天命也嗚呼商士汝當知所歸矣自今一遷朕不再勞故曰不敢有後當無我怨也汝知商之先祖有册有典且載革命之初迪簡賢俊置之王庭使服事于百僚是商嘗用夏之遺士矣吾非不能用爾爾既挾我三監是其德不可信德不可信又焉可用但聽其有德者用之爾我不敢求爾于商邑若商之用夏士也但率循此意以寬肆矜容之爾非我之罪汝自取之亦天命也嗚呼商士汝當知所擇也王曰多士昔朕來自奄豫大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜王曰告爾殷多士今豫惟不爾殺豫惟時命有申今朕作大邑于兹洛豫惟四方罔攸賓亦惟爾多士攸服奔走臣我多遜爾乃尚有爾土爾乃尚寧幹止爾克敬天惟卑矜爾爾不克敬爾不啻不有爾土豫亦致天之罰于爾躬今爾惟時宅爾邑繼爾居爾厥有幹有年于兹洛爾小子乃興從爾遷王曰又曰時豫乃或言爾攸居成王欲使商之多士知畏天罰格心以向化故言來自奄奄者成王所伐之國四國者三監及奄也大降爾四國民命者以至命誥四國之人使之曉然然後致罰也移爾遐逖者屏之逺方雖欲宅洛不可得也比事臣我宗多遜者言令協比其心臣事我而尊多其遜順之道也豈有悖逆之患哉我不殺爾惟時申命者重告之以作洛之意言四方罔不賓服在爾多士亦當服我奔走為臣而多其遜順之道爾乃尚有爾土循此當安土樂業也爾乃尚寧幹止循此當身幹安佚也爾克敬天命天亦豫爾矜爾爾不克敬何止不有爾土亦將致天之罰于爾躬矣先言有爾土寧幹止其居其身之可保者以其敬也後言不啻不有爾土致罰于躬其居其身之不可保者以其弗敬也今爾之時不可失能宅爾邑自然懷念子孫而繼爾居矣斯干之詩乃安斯寢而繼之以乃占我夢者此也能保其身自然得終其壽而有年矣洪範之書康寧壽考不可偏廢者此也爾既各懷長久之計少者安得不興起而從之遷乎王曰又曰併言者説者以為脫文以意考之殆記事者之言也王言之矣他日又言之此所謂王曰又曰也然而雖屢言之不過言爾所居之地所居之地非洛邑乎周公作無逸古之大臣何其愛君之深憂君之切而欲其君之壽也詩於天保之序曰臣能歸美以報其上可謂愛而欲其壽也然猶待君能下下而為之則周公之心過於此逺矣三代之下非謂其君不能而不言則必待其君有過而始言進則固寵退則竊名皆周公之罪人也書序序所以為作者之意獨無逸立政二篇不然此周公慮患之深先事而言之因名見義是故序不著其由也嗚呼天以無逸而行四時地以無逸而播殖萬物君以無逸而緝成庶政一言以盡之曰勤而已民生在勤勤則不匱也人之有生壽夭禍福惟其所召好德必康寧為仁必壽考理之自然者當湯之世有能致一溉之功者雖其同歸焦爛然必致溉者後枯此人生不可不勤勤則壽也壽生於勤夭生於逸逸則無所用心聲色由是而沈溺玩好由是而鼓蕩此心一弛萬惡皆歸逺忠直近邪佞窮奢極欲嚴刑峻誅皆由是而生焉亂亡從之壽將焉在及其終也乃反怨天不其晚矣則周公先事而言不敢謂其君不能而不言亦不敢待其君有過而始言豈不為眷眷愛君憂國而欲其壽乎無逸周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知天下之至勤勞無若農夫終歲勤勤僅而成功幸而有年足以飽暖不幸而凶歉相藉而為莩然未嘗因噎廢食而遂至於輟耕也是故歲事畢春氣萌動又將有事于西疇四時循環無日休息可謂艱難矣君子所其無逸者蓋若北辰之居所所者居而不移之謂也言君子於無逸終身居之死而後已也先知稼穡之艱難乃逸者先知其難而逸異乎常人之逸也吾之有生衣帛食肉養生喪死之具無一不以粟易之者是皆農夫之勤所致也吾雖不親耒耜不荷畚􅓩敢不知其所自乎知其所自安敢妄有作為而勞吾民乎此吾之逸所以異也小人依我而為命一嚬一笑是其休戚一動一止是其死生吾寧瘠而使天下肥吾寧不足而使百姓足一賦斂不敢過一力役不敢興而況盤遊田獵干戈之戰鬬土木之營作乎此之不為吾方泰然凝神蠖濩之中豈不為逸乎故曰知其難者異乎常人之逸也相小人者即小人以為喻也父母勤勞稼穡其子不知艱難乃逸乃諺既誕夫諺戲侮也誕誑欺也不惟惰其四肢乃反戲侮誑欺又誣昔之人為無聞知無聞知者若今之諺曰無所見識也言昔之人無所見識而為此艱難其實當逸也父母聞此其何以為懷周公之言所以深戒成王念后稷太王王季文武之基緒使之不敢荒寧也七月之詩既陳王業之艱難於此又申之因以輔成王之壽考可謂顯而易見矣譬之良醫視人之安逸懼其驕惰風霜勞苦之不能支而遂至病且死也教之以吐故納新熊經鳥申之術使之周流運動以入長生久視之域則豈不為愛之乎韓非子力敘帝堯大禹之勤勞儉約乃曰此不肖人之所勉非賢者之所務其亦侮其君以為昔之人無聞知也二世用之卒致喪亡嗚呼可以信周公之言矣周公曰嗚呼我聞曰昔在殷王中宗嚴恭寅畏天命自度治民祗懼不敢荒寧肆中宗之享國七十有五年其在高宗時舊勞于外爰暨小人作其即位乃或亮陰三年不言其惟不言言乃雍不敢荒寧嘉靖殷邦至于小大無時或怨肆高宗之享國五十有九年其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克壽或十年或七八年或五六年或四三年中宗謂太戊也先言太戊者以得年之多寡為先後也夫為天下之至尊逸也勞也唯所欲為凡無不可意者今而嚴恭寅畏上怵天命下懼民情至於不敢荒寧誰驅之使然耶自非其中素知小人之勞何以至此高宗之治説命載之詳矣其要在於不敢荒寧至於商邦嘉靖想見其時雍容舒泰斯民無毫髮之擾小大無怨固其宜也祖甲之治伊訓太甲咸有一德載之詳矣其要在於知小人之依想見其時務養斯民窮而無告悉在鞠育如慈母愛子賢則親之無能則憐之不侮鰥寡固其宜也此三人者真賢聖之君厥享國久長豈由他得然而就三君言之中宗為至難得何者高宗祖甲或舊勞于外或舊為小人長於民間親與物接知民疾苦故即位而不敢暇逸至於中宗天稟聰睿於深宫之中灼知小人之勞不待目見身親而自知艱難是其為至難得自時厥後立王生則逸不知小人之勞惟從事於耽樂耽樂者庸君以為逸而聖君以為勞蓋聲色鼓蕩玩好熒惑能使人耳目變易日新而不得停內狎嬖佞外禦忠良能使人心思險愎日肆而不知倦自他人觀之無一俄頃休息而庸君方且安而行之此古人以為鴆毒也兹逸也豈不為勞乎卒之蹶痿之機寒熱之媒伐性之斧腐腸之藥交攻而不赦欲望其長年其可得乎嗚呼周公之愛其君可謂切至矣周公曰嗚呼厥亦惟我周太王王季克自抑畏文王卑服即康功田功徽柔懿恭懷保小民惠鮮鰥寡自朝至于日中􅉴不遑暇食用咸和萬民文王不敢盤于遊田以庶邦惟正之供文王受命惟中身厥享國五十年周公曰嗚呼繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆無若殷王受之迷亂酗于酒德哉大王肇基王迹王季其勤王家克自抑畏者非有鞭策警誨之所致其謙虛兢畏出於天性也文王惡衣服而盡力於康民裕農之事徽柔懿恭可以想像文王之形容也蓋孰不為柔徽者柔之美美矣則無繞指之悔孰不為恭懿者恭之淑淑矣則無床下之巽蓋四德之中惟柔恭可見徽懿不可得而見也即柔之中可以知徽即恭之中可以知懿徽柔則無優柔之患懿恭則無足恭之患矣文王知小民之勞苦鰥寡之困窮下氣降心振此二德如慈母於子不敢以疾聲厲色待之恐其畏而不懷也不敢以怒心忿氣觸之恐其疑而不至也惟其有矜憐撫掩保抱擕持之德故其徽柔懿恭可以想見也自朝至昃無食頃不在萬民則咸和之效可知矣況敢盤于遊田而以庶邦之供為耽樂之私用乎自中年受命九十七乃終享國五十年可謂壽矣説者尚謂以憂勤損壽蓋以文王之無逸宜得永年之壽於此猶未慊於人心也嗣王監此不可淫於觀遊逸樂田獵之事使萬民之供亦惟正也茍或外此則四方之奉不足以支旬月之費兹逸也適所為勞歟無皇者不暇也勿以謂一日之耽樂不足纍德日復一日則非民所訓非天所順必有大咎矣天人之際吁可畏哉無若紂之迷亂沉湎于酒此周公作無逸之本意也周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨民無或胥譸張為幻此厥不聽人乃訓之乃變亂先王之正刑至于小大民否則厥心違怨否則厥口詛祝人主之聰不在兩耳而在衆耳人主之明不在兩目而在衆目人主之德不在一心而在衆心古之愚民不能譸張為幻於人主之前者以人主之前有衆賢為之輔也譸誑也張誕也至於幻則迷惑人主之聰明心志而使轉移者也夫既有人訓告以順其理保惠以防其過教誨以攻其失則孰患誑誕迷惑之人哉此而不聽所謂訑訑之聲音顔色距人於千里之外則讒諂面諛之人至矣與讒諂面諛之人居則譸張為幻固其宜也自是而變亂先王之政刑至於小大罔不失序矣惟民之生賴人主以牧養苟或不然是否也厥心違怨厥口祝詛矣怨氣詛語充塞天地洋溢四海沖和揉為乖沴瑞應化為災殃人主獨能保其壽乎此周公所以推其極而告王也周公曰嗚呼自殷王中宗及高宗及祖甲及我周文王兹四人迪哲厥或告之曰小人怨汝詈汝則皇自敬德厥愆曰朕之愆允若時不啻不敢含怒此厥不聽人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟不寬綽厥心亂罰無罪殺無辜怨有同是叢于厥身周公曰嗚呼嗣王其監于兹迪哲者得道而能順以照臨四方也古之先王莫不如是而周公獨取是四人者蓋以其近古而耳目尚可聞見也或告以小人怨詈鮮有不怒者唯虛舟之觸飄瓦之擲可以免怒小人何所逃罪耶是故迪哲之聖人察其告語皆誣人譖人者唯皇自敬德而已皇者從容能為之謂也我既從容自敬厥德百姓有過唯曰在豫一人故曰朕之愆允若時不啻者念咎之深也不敢含怒者不唯不肆亦不蓄也非迪哲之君焉能至是蓋既已迪哲視天下小人皆在不覺不知之域每軫哀矜拯救之心欲其盡出迷途而未得也居是時雖或怨或詈我亦憫其失道而至是又何有怒心哉仲尼得一貫之道而以忠恕行於世者為此也此厥不聽則人始得而惑我譸張為幻之徒始得而肆始則怨詈者受誅終則不怨不詈者亦受誅何者我既不明彼皆得肆其詆誣而善人君子無罪無辜以及禍也既不能永念為君子之道又不能克寬容衆之心以致于此卒之一身為怨府怨既叢于身其克永年者幾希矣嗣王可不監之雖然周公方以無逸告君而終以此者誠欲使成王知聽言之難而罪人之不易也怨而不解得保其社稷者世固無是理嗚呼周公之意深矣
