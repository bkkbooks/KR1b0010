body:
  text: 尚書講義卷十二宋史浩撰武王勝殷殺受立武庚以箕子歸作洪範𫝊稱紂衣其寶玉赴火而死而此直言殺受史法之嚴如此蓋紂雖非武王殺之因武王而死也至是武王當為法受惡可也戰國之士又復附㑹有武王斬紂頭之說其實殺受之言不足信也商之淪喪遺黎赤子皆有不忘其君之心故商王多士在周為頑民其實不肯革心以事周也伯夷避於北海非不苦紂之虐政至武王伐商乃叩馬而諫其心可見矣箕子之心亦伯夷之心也當時武王雖釋其囚若不立武庚箕子亦逋逃久矣今其歸也非為武王為吾君之子也伯夷為北海之遺民及周有天下乃不食其祿至於餓死箕子在商佯狂為奴及周有天下乃不肯為臣僕其封之朝鮮朝鮮乃遼東化外之夷逃於朝鮮因而封之也其實二子皆痛商之卞故也嗚呼二子立人臣之大節萬世之下其名若此炳耀非得洪範皇極之道安能若是乎蓋為人臣而不二其君所謂盡臣道也其皇極之道彝倫之敘乎武王不唯容之且復訪之虛心無我以問道兹其所以謂聖也箕子於此若捨武王而不告則天人之大法祕而不𫝊非所望於箕子也然其洪範之書又非武王能使之𫝊天實使之因武王而發爾故其言曰皇極之敷言是彝是訓于帝其訓也洪範子思曰中者天下之大本也和者天下之逹道也大本立於太極之先是之謂正位正位虗位也虗位者天地之母而萬物之祖也太極以虛而生天地天地以虛而生萬物蓋天地之性虛則無物故能順大中之道而運行焉𫝊曰天地之間其猶橐籥乎虛故也萬物受天地之中以生亦以虛而能育是故人之一身自項至踵百體皆實而其中必有虛而無我者心是也故𫝊曰惟道集虗虗者心齊也向使天地不得大中之道於混沌未判之前其能行二氣而不停乎向使人不得大中之道於胚渾未兆之前其能敘九疇而不斁乎是知大中之道於混沌未判之前胚渾未兆之始從虛而立因虛而生本無物我循理而行自然皆順既無偏繫則罔不中節和自此而生焉所以謂之逹道也天地自此而位萬物自此而育則中之為用不既大矣乎是道也堯以是𫝊之舜舜以是𫝊之禹禹以是𫝊之湯湯以是𫝊之文武武王箕子乃始發明此道著而為書曰洪範洪範大法也而其要則謂之皇極皇大也極中也大中之道也天以蚩蚩之氓日用不知故使箕子不死於紂之朝留之以遺武王使發明此道也萬世之下知有大中者武王發之箕子陳之之力也其為恩大矣然則天地順大中而運二氣聖人順大中而敘九疇一言以盡之曰虛心順理而已矣惟十有三祀王訪于箕子商以年為祀武王方訪箕子於武庚之國史臣紀其時而曰祀者未忘其舊也武王即位之初能即其國訪以大道屈體于不召之臣有以見尊德樂道之實也宜其足以大有為也後世之君三顧草廬猶能有國易曰以貴下賤大得民也武王以之王乃言曰嗚呼箕子惟天隂騭下民相協厥居我不知其彝倫攸敘惟皇上帝降衷于下民則所謂皇極者固天地萬物之所同賦也天以是道降於下民是曰隂騭隂相之也蓋雖為下民未嘗不受所謂中而生則父母胚渾之前中已具矣惟因物有遷迷其所賦故為愚為不肖茍悟大中之道是吾固有存之以誠持之以久則無所往而不為中堯以惟精惟一之中𫝊之舜舜以命禹湯得此道于數百嵗後故仲虺曰建中于民孟子亦曰湯執中又數百嵗而𫝊之文武文武豈不知所謂中乎然而不言訪于箕子者以箕子亦得是道武王心膽相照目擊而存故欲發箕子之對使此道顯于當時而行乎後世也武王引箕子以為助者以箕子為當世父師一言可以信萬世故也上帝既降衷于下民而使之相協厥居以自安安則道生焉順道而行則父父子子兄兄弟弟夫夫婦婦以至朋友長幼無不得其敘也武王豈真不知此者耶謙虛退託以來箕子之言爾箕子乃言曰我聞在昔鯀陻洪水汨陳其五行帝乃震怒不畀洪範九疇彝倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彝倫攸敘洪範指天人之大法實本于大中堯舜禹相𫝊以允執厥中湯執中立賢無方文王視民如傷望道而未之見武王不泄邇不忘逺莫非用中也箕子答武王之問宜力陳列聖授受皆得皇極之道桀紂反常皆失皇極之道以為對曾此不言顧乃引鯀禹治水之成敗以明九疇之所以畀錫於天帝者其意深矣蓋即其父子之間治水一事驗其所以失中得中所謂差若毫釐繆以千里其所引證至明白也蓋順天下之理則為皇極於洪範九疇無不順者逆天下之理則非皇極於洪範九疇無不逆者鯀陻洪水水既失性必知五行之汨陳汨陳紊亂而無序也禹能反是則知彝倫之必敘至于地平天成六府三事允治萬世永賴之功亦馴是而至也昔人固有割肉于社而知宰天下之平處分于履屐之間而知為將之必勝則治水之成敗於一事之間豈不可以概見其他乎又况鯀以九載禹以十三載之久其得失較然尤易指陳也雖然曰帝曰天何以辨之蓋帝者司主宰禍福之權天者具遍覆包涵之道帝之與天其實皆順自然之理而無為者也惟其虛心而用中禍福由人自召天何容心哉書曰自作孽不可逭鯀之謂也詩曰永言配命自求多福禹之謂也順理而行無所適莫此天之所以為天也然則洪範九疇不畀鯀而錫禹者非天也皆鯀禹之所自致所謂禍福無不自己求之也子思著中庸引鳶飛戾天魚躍于淵蓋言人能用中故感格髙深鼓舞飛潛天地之和應之如此至語其極則曰上天之載無聲無臭至矣無聲無臭者禍福惟其自召天實無為也子思之中庸與箕子之洪範實相表裏初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極天地得大中之道於混沌未判之前故能用其中於覆載闔闢之間其造化密移周行不息有中以主之也而其實則見於五行五行五材也周流於世間一日不可無故謂之行也水火木金土五行之定體凡歷千古而不變更萬化而不移者有是自然之體故也若其用則待聖人而後行焉至次二則中之降而在人故須敬以用其中敬謹也次三則中之見於養人故須農以用其中農養也次四則中之見於厯象故須協以用其中協順也次五則中之立於正位故須建以用其中建植也次六則中之施於有用故須乂以用其中乂治也次七則中之見於决疑故須明以用其中明辨也次八則中之著於克應故須念以用其中念省也次九則中之顯於禍福故須或嚮或威以用其中嚮饗也威畏也凡此九疇有形於範圍之內者不能逃也順之則吉逆之則凶天地之用中與夫聖人之用中下而為臣則行君之中衆而為下民繁而為庶物則聽君之中然則天地君臣下民庶物舉不外乎此道則該括萬有總斡羣動者其九疇乎然九疇之要皇極也皇極敘於次五何也蓋皇極之道五數也天數五地數五皆以虛而用故也𫝊曰其數一二三四是也用一二三四者五也五隱於中宫虛而無物非凡數所可拘也運化不停生生無盡五之位也虛而不屈動而愈出五之用也然則皇極安得不處九疇之中數乎雖然聖人贊易則言天一地二以至天九地十洪範止言九疇何也蓋一二三四五數之生也六七八九十數之成也十者五之成也洪範既以五為虛位若言其成則一成而不可變故虛其十以見生生無盡之理所謂闕一而待用亦猶易終之以未濟也然則箕子之九疇真得乾坤之藴者也一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘一隂一陽之為道道者中也天地受中於太極是故具隂陽之理輕清在上曰陽故為氣重濁在下曰隂故為形天地之隂陽不偏是為得中故能交感氤氲而萬物由是以生焉萬物負隂而抱陽是得隂陽之中也故沖氣生焉沖氣和氣也萬物滋生而蕃息者也中為大本和為達道是故天地以是位萬物以是育也五行者物之見於形體不可一日而無者也五行用於天地之間若其功不見於養人是塊然一物爾何所貴於五行哉故此五物不失天地之中斯能變化由重濁而升輕清上而為日月五星之光耀下而流濕就燥相生相尅之形體輕清重濁兩無偏係是之謂中故和自此而生也夫潤下者水之形炎上者火之形曲直者木之形從革者金之形稼穡者土之形茍無中立乎其中則水為波蕩而懷山火為焚燬而燎原木為枯折而朽腐金為頑礦而缺裂土為崩潰而磽瘠又焉能作其氣以成味滋其味以養人乎惟夫得中以生則所謂五行者皆養人之具而其作也皆能致用於天地之間此所謂和也則和者真天下之達道也水得其中則順而潤下潤下之成則為江海有作鹹之用焉火得其中則順而炎上炎上之成則為焦灼有作苦之用焉木得其中則順而曲直曲直成用其結實皆酸金得其中則順而從革從革成用其氣𦦨皆辛土得其中則順而稼穡稼穯成用則粳秫皆甘至是五行降而在人之用彰矣向使天地偏隂偏陽是不得其中也安能使五行皆得其中乎五行偏隂偏陽是不得其中也又安能作而為味以養人乎洪範敘九疇首及五行與天地俱生也至要其極摯則著其養人之功如此而獨不言用者其用大矣易曰乾始能以美利利天下不言所利大矣哉五行不言用亦是義也次二以後推而行之存乎人故皆曰用用者用其中於民也二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作晢聰作謀睿作聖一隂一陽之謂道道者中也偏隂偏陽則非道矣其不偏者天地之大中也大中之道運於天地之間四時以之行萬物以之生氤氲磅礴於上下而和自此見也其在人則為皇極皇極者天地萬物同賦之大中也人得是中於胚渾未兆之前所謂喜怒哀樂之未發也寂然不動何以驗之及夫發而皆中節始得以驗其中若於一事不中節則知其非由中出也鯀之治水可見矣和安得而生哉夫既中節則事得其敘貌必恭言必從視必明聽必聰思必睿自恭而作肅有端莊之貌焉自從而作乂有法度之言焉自明而作晢於是乎澄徹矣自聰而作謀於是乎審訂矣自睿而作聖於是乎大而化之由體以致用皆順大中之理茍或失中則不恭而暴慢矣何由作肅不從而淫詖矣何由作乂不明而昏蒙矣何由作晢不聰而聾瞶矣何由作謀不睿而狂愚矣何由作聖洪範五事貴於敬用者在乎致而發發而皆中節乃表夫中之用也然而必曰敬者敬出於心以思為主也惟中虛而順理故能敬以直內而主張乎貌言視聽也則夫思者是總括五事之要道也蓋萬善惟心心者虛而無我若人欲汨之心不在焉則五事無一中節矣此皇極之見於人身以敬用為主之證也三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司寇七曰賓八曰師案此假講義永樂大典原缺四五紀一曰歲二曰月三曰日四曰星辰五曰厯數人者天地之德隂陽之交五行之秀氣孟子曰萬物皆備於我矣反身而誠樂莫大焉歲月日星辰厯數在我一身而具蓋無我一身則歲月日星辰厯數何所用之有我則四時行矣晦朔平矣昏旦定矣星辰明矣厯數章矣堯曰天之厯數在汝躬以是知歲月日星辰厯數有我則皆有也然則五紀者雖為天道之綱維所以順行而循軌者在人以中而協用之也故𫝊曰天不人不因人不天不成良以此也人能以中而應天則天亦以和而應人此必至之理也所以致中和而天地位焉萬物育焉協用之效也夫歲者春夏秋冬之四時也月者晦朔之三十日也日者昏旦之十二時也星辰者五緯十有二躔次也厯數者所以齊歲月日星辰行度之盈縮也歲雖成於四時必有分至為之中月雖成於晦朔必有弦望為之中日雖成於昏旦必有子午為之中星辰雖成於躔次必有日中宵中為之中厯數雖所以齊歲月日星辰必有陽中隂中為之中人能贊其化育使之中節而無繆戾之變此所以為協用也協者和也向使人於五事八政不用其中則歲月日星辰厯數亦皆失其中矣和何自而生哉欲望璇璣之正玉燭之明或如合璧或如連珠不可得也五者既巳紛亂乖錯則卜世卜年寧有長久者耶此堯之咨舜舜之命禹皆以厯數在躬而屬其允執厥中也儻天人之際和同無間則大中之道備可以言皇極矣此箕子於皇極之正位必在五行五事八政五紀皆順其序而後陳之也五皇極皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極凡厥庶民無有淫朋人無有比德惟皇作極凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰豫攸好德汝則錫之福時人斯其惟皇之極無虐㷀獨而畏髙明人之有能有為使羞其行而邦其昌凡厥正人既富方穀汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極曰皇極之敷言是彝是訓於帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王武王所問止一彝倫攸敘箕子乃對以九疇而總其目謂之皇極皇大也極中也大中之道天地萬物所同賦者也天之用中既寓於五行自五事而下皆人之用中敬五事農八政協五紀凡皇極降而在人者皆合順此道而行焉外此則非皇極矣豈可謂之大法乎至言次五則皇極之正位也故箕子直指其要以專責之君以謂皇極之道植立標表使民知所趨向者人君之職也天地得皇極於太極之先天以是而髙明故能用之於覆幬而無外地以是而傳厚故能用之於持載而無疆人君得皇極於天地之卑付亦當遍覆包含使民造次顛沛無不由皇極之道故能髙明配天博厚配地也夫大中者民所共由者也使人君得此道而不與民同是獨善其身者也是五福自享而不敷錫庶民者也民何賴焉殊不知天地以是道付之人君正欲司牧吾民率之以歸大中而已民之處乎大中之世譬如草木鼓舞春風但見甲者坼者華者實者舉不外於春風中則春之為功大矣當知皇極之在人君亦如是之大也於汝極者民視儀而聽唱也錫汝保極者推恩足以保四海也惟皇作極者民心罔中惟爾之中也有猷有為有守則念之者知賢材而舉之也不協于極不罹于咎則受之者與其進也和顔色而聽其言以為好德而錫之福者明試以言也有能有為而使羞其行者養賢以及萬民也此皆自然之理人君順此而行斯為皇極若夫淫朋比德虐㷀獨畏髙明于其無好德者非中也是民失皇極之道也正人不用而使好于其家于其無好德而錫之福者非中也是君失皇極之道也夫既君民胥失欲望皇極之建豈不難哉然則皇極之在人君惟以舉天下之民無一失中者斯為效驗也惟其舉天下無一民之失中則知皇極之道於斯為大此彝倫之所以敘也夫彝倫者君君臣臣父父子子之道所謂王道也王道盛則民無不蹈乎大中人君之責塞矣無偏無陂中也遵王之義者順自然之理也無有作好無有作惡中也遵王之道遵王之路者順自然之理也無偏無黨中也王道蕩蕩者廣大而無限量也無黨無偏中也王道平平者坦夷而無巇險也無反無側亦中也正直者至公而無私邪也然則皇極之道人君所以錫之下民者可謂至廣大矣箕子所以徑指人心而告武王也曰㑹其有極者反觀於喜怒哀樂未發之前也歸其有極者成全於上帝降𠂻之後也至是還淳反朴復其自然之中民之處斯世如在華胥之國熙熙然登乎春臺矣又孰有覆盆向隅之人乎則知所謂惟天隂騭下民相協厥居彝倫攸敘之道果不在彼而在此也箕子所以遺武王厚矣曰皇極之敷言者如前所陳也箕子以謂非我臆說于帝其訓代天而言也武王其可不是彝是訓乎是訓是行則斯民亦皆可以近天子之光人君一性之光明既推而與民則民之與君俱全是大中之道又孰有彼已之間耶魚相忘於江湖人相忘於道術所謂一人有慶兆民賴之是也此王道所以歸於蕩蕩平平正直以為極摰也曰天子作民父母以為天下王皇極敷言之卒章也武王至於此心開耳順實與箕子精神融㑹如水投水了無有異又何言哉其所以永清四海垂拱而天下治者盡此道也六三德一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克沈潛剛克髙明柔克惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒箕子之言五皇極與仲虺所贊成湯懋昭大德建中于民之意同也其次五之疇首尾唯言民之受中以生日用不知使復於中者人君之職盡而皇極之體具矣次六所以言其用也三德者人君用中之大要也夫中者執其兩端而用之於民者也人君雖能率民以中若非人臣行君之令而致之民安能使羣黎百姓遍為爾德耶是故得臣以輔導之皇極斯可建矣周官謂設官分職以為民極是也然則君之用中豈不在臣下奉行之力乎舜所以有臣哉鄰哉股肱耳目之喻也三德者人君知人之道也夫正直剛克柔克克者威克厥愛之克也人得之皆可以謂之德至語中之用則在人君抑之揚之以歸中爾臯陶論知人備敘九德而箕子乃獨言三德何耶蓋箕子取九德之要以告武王是三者觀人之大法而取臣之祕訣夫一於正直必至於以已望人非中也故必貴於溫臯陶謂之溫實箕子之平康也一於剛克必至於彊弗友非中也故必貴於塞臯陶謂之塞實箕子之沉潛也一於柔克必至於燮友非中也故必貴於立臯陶謂之立實箕子之髙明也皆所以抑其過而勉其不及非用中以率臣下乎觀史魚之直不如蘧伯玉之君子是知正直濟之以平康可也陽處父一之以剛犯而聚怨是知剛克必濟之以沉潛可也子太叔不忍猛卒至於多盜是知柔克當濟之以髙明可也是三臣者非人君率之安得歸中乎臣既歸中民安得而不化乎此人君用中之機括也三德所以為皇極之用者其在斯乎臣既同底於中則君尊臣卑乾坤之位定上下之分嚴所以表示斯民者至矣作福作威玉食固所當然也若君不能率其臣臣既失中勢必上僣而作福作威玉食矣君臣之分馴致乖離履霜而堅氷必至方且害家凶國欲望彝倫之敘得乎故箕子以謂人用側頗僻則民用僣忒也夫側頗僻是失中也民何知哉視儀聽唱惟上所率人君儻用是人則民安得不僣忒乎臯陶敘九德之效至於百僚師師百工惟時卒之無曠庶官天工人其代之所謂代天理物者非臣不可故曰民協于中時乃功也然必曰無教逸欲者實戒用人之側頗僻也然則人君用中之機括果在於得其臣也明矣使㑹其有極歸其有極王道至於蕩蕩平平正直者夫豈一人能獨致乎股肱之助也箕子之言與舜禹之謨若合符契七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作內吉作外凶龜筮共違于人用靜吉用作凶天地降中于庶物故曰惟天地萬物父母萬物受中以生惟人為最靈故曰惟人萬物之靈惟蓍龜為動植之靈故曰是興神物以前民用先王建官擇建立卜筮人擇者取其人之精於是道者以備咨訪為决疑之用名曰卜筮而皆為之占故繫云以卜筮者尚其占夫皇極之建執之在君行之在臣錫之在民第當問其中與否中則行之否則違之足矣何暇蓍龜之兆耶嘗質之易曰聖人以此洗心退藏於密吉凶與民同患記禮者亦曰昔者聖人建隂陽天地之情立以為易易抱龜南靣天子衮冕北面雖有明智之心必進斷其志焉示不敢専以尊天也夫有疑求决謀之卿士庶民率皆有心者未若無心者尤可證也蓋有心者人也無心者天也人事盡處必求天理天與之則人與之矣此洪範必以稽疑為次七也夫蓍龜無心者也天地神靈産此神物以寓吉凶使人擬之而后言議之而后動也動而順理斯謂之皇極夫卜者灼龜也筮者揲蓍也灼龜之法以文驗之曰雨則隂陽和澤曰霽則隂陽開明曰蒙則隂陽暗昧曰驛則隂陽斷續曰克則隂陽侵剝吉凶由是而見焉揲蓍之法占之用二者曰貞曰悔也曰貞者內卦也內卦初筮靜而貞也曰悔者外卦也外卦再揲動而有悔也衍則敷衍當引而伸之吉也得之者身其康彊子孫其逢吉是也忒則差忒當趨而避之凶也得之者用靜吉用作凶是也三人占則從二人之言以多為貴也夫有疑則卜之不疑又何卜乎人君物來能照事來能應小事剖决夫復何疑惟夫大事隱之一心又謀之卿士庶民是非可否已定於人心矣故當以龜筮而卜之天心也人君兢兢業業之心至此其庶幾盡矣此皇極之至理非箕子不能發揮也次七之疇所以必用稽疑者以尊天也舜之元愷皆可付託謀之於心禹尤傑然可任志已先定在廷在野詢謀僉同孰曰不可而必待龜筮協從然后命之者質之天也知鬼神其依乎是故也其曰協從豈非既協於中人豫而天豫之乎則龜筮者真國之重事也觀其取舍內揆吾心外質臣民幽而龜筮儻無不從是皆協于中而天意之所屬宜乎身康彊而子孫逢吉也其或不然寧使吾心及於臣民不從不可使龜筮逆逆則天意不屬故也箕子之言皇極極於天人精祲之交大易之書無以異矣八庶徴曰雨曰𤾉曰燠曰寒曰風曰時五者來備各以其敘庶草蕃廡一極備凶一極無凶曰休徴曰肅時雨若曰乂時𤾉若曰晢時燠若曰謀時寒若曰聖時風若曰咎徴曰狂恆雨若曰僣恆𤾉若曰豫恆燠若曰急恆寒若曰蒙恆風若曰王省惟歲卿士惟月師尹惟日歲月日時無易百榖用成乂用明俊民用章家用平康日月歲時既易百穀用不成乂用昏不明俊民用微家用不寧庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨喜怒哀樂之未發謂之中發而皆中節謂之和中與和非二事也中則無不和和則無非中二者為一致所謂發而皆中節也中節則皇極之道也致中和能使天地位而萬物育而况人之一身貌言視聽思之五事乎夫茍得中於此五事無不中節則雨𤾉燠寒風無不應時而至不時則為恆矣此箕子所以以時繼五者之後也夫五事不逺在吾一念一念得中五者之和應焉恭從明聰睿皆自然作肅作乂作晢作謀作聖亦自然之理也夫是之謂中節則天地之和應故雨暘燠寒風以時而至失是則五者皆繆戾為凶歲為亂國知其失中也問有一事或順亦出僥幸若得中則無不中節也譬之一身茍得其養則和氣充塞乎頂踵之內周流於脉絡之間四體既正膚革充盈而見於外者無非順動茍一藏有病則一身之氣血消縮四藏亦為之不寧和安在哉是以五事一不中節則四事皆廢和不生而天地應之者亦闕矣此箕子貴於五者來備各一其序也庶草蕃廡天地位而萬物各極其髙大也若不以其敘則非中節人不和而天地之和不應矣極其至也至備則太過所謂一極備也至無則不及所謂一極無也過與不及皆非從中出也是一事失中則五者不備而為凶矣和何自而生哉和不生則雨𤾉燠寒風常有以為灾常無亦為灾故皆曰凶也五事中節天地以休徴應之不中節則以咎徴應之貌足以作肅時雨順之萬物潤澤矣其咎狂則常雨順之萬物苦潦矣言足以作乂時𤾉順之萬物熙明矣其咎僣則常𤾉順之萬物苦旱矣視足以作晢則時燠順之萬物溫養矣其咎豫則常燠順之萬物被焦枯之害矣聽足以作謀則時寒順之萬物結實矣其咎急則常寒順之萬物被僵凍雕落之害矣思足以作聖則時風順之萬物條畼矣其咎蒙則恆風順之萬物被偃禾拔木之害矣夫霜降而鐘鳴雲蒸而礎潤古之為君為臣者所以正心誠意於一堂之上而仁風德氣應於四方萬里之逺若桴鼓之速者在吾一念之萌得中爾然則休咎之徴豈不較然明白箕子之言真萬世之藥石也曰王省惟歲卿士惟月師尹惟日者凡此庶徵君臣上下皆當念用也省者念也王之所省惟歲歲者四時之運無不該括日月所照霜露所墜有目有趾飛潜動植遍覆包含無不動化王之所省大矣五事可不念哉代天理物輔佐吾君行其命令率其民人晦朔弦望無所差忒春行春令夏行夏令卿士所省其次也其於五事可不念哉祿以爵賦政以職受委吏乘田各有所掌師尹所省抑又小矣其於五事亦豈可不念哉王與卿士師尹皆能敬用五事因其所省之大小而致意焉此所謂歲月日時無易也百穀之用成雨𤾉燠寒風順而為時矣則治之著明俊民在上家之平康必至之理也彼王與卿士師尹不能敬用五事失其所省大小之序焉所謂日月歲時既易也百穀之用不成雨𤾉燠寒風不順而為常矣則治之昏昧俊民在下家之不寧亦必至之理也至於庶民則不可責以所省蚩蚩而生林林而處猶星在天繁然垂象其於皇極日用不知但依王與卿士師尹以為命率之以中則中率之以暴則暴無常心也蓋星之麗天主風者有風主雨者有雨冬而有寒夏而有暑天道之運有待於王與卿士師尹各得其中以應天之中則休徴應之否則咎徴隨之矣彼徒見日月運行而有寒暑不知寒燠得敘乃上之人謀時晢時之休徴寒燠失敘乃急恆豫恆之咎徴也彼徒見月之從星而以風雨不知風雨得敘乃上之人聖時肅時之休徴風雨失序乃蒙恆狂恆之咎徴也安其居樂其生則鑿井耕田咸曰帝力何有於我不悟休徴出於王與卿士師尹也罹其凶被其害則祁寒暑雨惟曰怨咨不悟咎徴出於王與卿士師尹也其亦可哀矣故經曰民心罔中惟爾之中聖君賢臣一念之間豈容失序而不思惟皇上帝降𠂻之意乎武王至是知隂騭下民者不在於天矣然則皇極之道夫豈他求而得之哉嘗謂皇極之道本之一身一身之內以心為主茍不思貌言視聽皆不能用無主故也聖人之人心惟危道心惟微以惟精惟一之道上而應天是以人心感天心也執其兩端而用其中於民易曰聖人感人心而天下和平箕子於此當以心𫝊武王於此亦當以心受所以不得巳而有皇極之敷言者為後世設也故孔子於已則曰四時行焉百物生焉於人則曰視聽言動皆復於禮子思曰致中和天地位焉萬物育焉孟子曰萬物皆備於我矣反身而誠樂莫大焉子思又以謂至誠之道可以贊天地之化育而與天地參也嗚呼天人豈殊致乎然則箕子於五事必曰敬用於庶徴必曰念用者蓋指皇極之本原曽不外乎人心也九五福一曰夀二曰富三曰康寧四曰攸好德五曰考終命六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱箕子答武王隂騭下民相協厥居彝倫攸敘之問明言皇極大中之道以為天之用中在於五行而五行之運天不自為在於人能好德以應之所謂好德者虛心無我敬用五事五事之修則天下之理不得遁而皆存存以事天則天心應於上錫以豫民則民心應于下皇極之道豈不優優大哉前章言天有庶徴人心感召之應此章言人有福極君心錫豫之應也何者皇天無親惟德是輔德惟一動罔不吉德二三動罔不凶天何為哉在於上之人君臣同德敬用五事以召休徴民何知哉在於上之人好德而錫之福此虛心無我順理而行之明效大驗也蓋以天生蒸民有物有則民之秉彝好是懿德故也然則天有好德之心不能自為在於聖君用中而感召民有好德之心不能自治在於聖君用中而敷錫總其大要在于一心之克念克念故能虛心無我順理而行休咎之應福極之來豈由天乎在吾一心爾箕子答武王之意可謂深切著明也是故君既作聖則三光全而風雨時草木茂而五榖熟斯民含哺而嬉鼓腹而游皆得盡其天年而不中道夭此錫之夀也不奪其時深耕易耨居者有積倉行者有裹糧此錫之富也六合之內和氣充塞災害不生疫厲無有此錫之康寧也申之以孝悌之義躋之于禮讓之塗關雎之化行麟趾之風盛此錫之攸好德也啓手啓足正而斃焉棺椁衣衾得盡其禮此錫之考終命也民之五福豈不在君乎夫嚮猶饗也威猶畏也饗者民之所願欲畏者民之所趨避聖君在上順理而行得所願欲以其中也則彝倫豈不敘乎儻一失中則干戈相尋肝腦塗地凶短折也疫毒流行枕藉而死疾也外陵內患憂也饑饉薦臻貧也峻罰淫刑民無所措手足惡也親戚畔之兼之者至弱也夫君之六極民實尸之民何罪哉嚮用威用人君可不致意乎嗚呼皇極之道箕子之言至是無餘藴矣夫福五而極六何也蓋五陽也六隂也皇極之道降在人秉彝之性人人本具迷者衆而得者寡故極多於福也在國則治少而亂多在人則從善難而從惡易是以五事一不中節則在天者咎徴必應咎徴一應則餘四事不得為休矣蓋風火水旱焦灼僵凍有一于此則四者不能成功箕子所以貴於五者來備各以其敘然後為休徴也五福一事不中則在人者六極必應六極應則餘四者皆不足為福矣蓋人之有生不夀則短折矣不富則貧矣不康寧則憂矣疾矣不好德則剛而為惡柔而為弱矣不考終則凶矣五福以全為福六極有一于此皆足以為禍禍則無福矣蓋福者備也無所不順之謂備五者備則為福此其證也然則上而為王中而卿士師尹下而為庶民可不兢兢業業正心誠意保此皇極之道乎保之之道敬用五事而已蓋修已以敬則正心誠意修其五事兢兢業業順理而行則無不中節天應之而為休徴人得之而為五福矣中節則君君臣臣父父子子夫婦朋友長幼無不得其敘泰和充塞百祥臻萃王道蕩蕩平平正直而㑹其有極歸其有極矣此箕子所以告武王隂騭下民相協厥居彝倫攸敘之符驗也雖然大中之道降而在人日用不知待上之勸率者皆下民也若夫豪傑之士雖無文王猶興則正心誠意自求多福所謂無不自己求之者非為凡民道為士君子言也武王之時五福全備于既醉之詩序詩者曰醉酒飽德是武王錫之福必又曰人有士君子之行者以明當時之人皆能好德有以召之故武王錫之福也兹所以為太平之極至歟非二聖相逢力闡其祕何以致皇極之效巍巍若是嗚呼盛哉武王既勝殷邦諸侯班宗彝作分器禮曰君子將營宫室宗廟為先又曰凡家造祭器為先此孝子孝孫之心也武王即阼之初諸侯立國之始首以宗廟彝器賜之本人情也蓋以禮樂當自天子士諸侯不敢専故也後世罷侯置守唯王公得立家廟賜祭器先王之遺意也而俗儒不學妄謂家廟不當立祭器不當賜是以識者臨編痛惜此書之亡也
