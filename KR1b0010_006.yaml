body:
  text: 尚書講義卷六宋史浩撰太康失邦昆弟五人須于洛汭作五子之歌孟子曰民為貴社稷次之君為輕是故得乎丘民而為天子太康失邦失其民也失其民者不可以為君矣當是時五子怨以為必歸須于洛汭愛兄之道也其如民之弗與何昆同也兄弟之同曰昆揚雄太𤣥經以昆首擬同人正此義也觀其作歌章雖異指如出一人則兄弟之同可知矣然五人弟也而謂之子或曰子者男子之通稱非也方其御母以從稱子所以尊母也五子之歌太康尸位以逸豫滅厥徳黎民咸貳乃盤遊無度畋于有洛之表十旬弗反有窮后羿因民弗忍距于河厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌尸主也夏諺曰吾何以休又曰吾何以助夏之民覬其君之逸豫如此至太康以逸豫主位遂至於失邦何也蓋何以守位曰仁太康無徳以堪之所謂不賢者雖有此不樂也是故其滅徳也既不可比於先王觀其忘反也又不可以為諸侯度無惑乎黎民之攜貳也夫遊畋以時使民聞車馬之音見羽旄之美無疾首蹙頞之告可也至于十旬之久皇皇無所赴愬民心從可知矣后羿何能為哉因民之弗忍敢距于河然不曰民叛而曰弗忍有以見大禹之徳涵濡漸漬入人之深雖後嗣不賢無䘏我之心而猶弗忍叛也洛之南曰表洛之北曰汭五子之為弟内奉其母以徯其兄初無忿戾之辭詆其兄而傷其母之懐顧乃上述先祖之戒自怨自責若已有過以求媚于民庶幾民之悔禍以歸其兄使夏之宗廟社稷不淪胥于后羿之手也卒之仲康之肇位繼以少康之中興夏祀延茂垂數百年想其一時永言𤼵于誠實故能上動髙穹而格先祖下風四海而感斯民斯民聞之逺思萬世永賴之功近起是宜為君之嘆故其推戴之心有加而無巳也嗚呼孰謂五子之歌之為怨詞也哉其一曰皇祖有訓此章首述祖訓不曰先祖而曰皇祖解者曰皇大也君也或曰皇以道言其實皆尊大之義也五子者啓之子而禹之孫其言祖訓則禹之所為也説者因禹不𫝊于賢而𫝊於子乃謂大道既隠各子其子今觀其家所寶之訓初無他説一於為民則知當時禹固不私於啓也民與之而天與之爾當􅈱􅈱之泣巳有弗子之心孰謂既長而以天下私之耶民可近不可下民惟邦本本固邦寧君之有邦履萬乗之尊據崇髙之勢疑無事於民也然非衆則罔與守所謂邦者亦虚器爾果可不以民為本耶是故木之植本盛則末茂民之歸本固則邦寧必然之理也禹唯知此故能以為可近而親之以為不可下而尊之親之則彼亦親我若父母尊之則彼亦尊我如天帝其本之固雖無繩約而不可解邦欲不寧得乎夫垂訓後人而首及于此可謂知所本矣予視天下愚夫愚婦一能勝予治天下之具莫大於賞刑喜有爵禄怒有斧鉞然而不能以勝匹夫匹婦之愚何哉蓋天聰明自我民聰明天明畏自我民明威得其心和可格於造化咈其欲變且至於乖離當是時雖有賞刑何所用之謂之一能勝予非禹欺後世也雖然自下者人髙之自後者人先之後世子孫果能遵此以視其民民愛之而不忍去是以不勝勝之實治天下之要術也一人三失怨豈在明不見是圖怨不可積怨固不在形之話言見之顔色深積于中不可測度一旦土崩之勢瓦解之形芽蘖於眹兆雖有神禹且不能救此禹所以勤勤言之不能自已也後世子孫茍能及其不見而圖之使無滋蔓之難無噬臍之悔則天下可得而治矣予臨兆民凜乎若朽索之馭六馬為人上者奈何不敬凡言予者禹之自謂也方其託於兆民之上戰戰兢兢若以朽索而馭六馬前有蹶逸之慮而後有顛覆之虞其可一日安乎茍操是心以莅天下則無所不用其敬矣禹既詳言民之可畏而其歸結在乎無所不用其敬則所以訓其子孫者可謂切至矣昔仲弓問仁夫子教以使民如承大祭敬也然則治天下而知敬民仁人之為也後世有能如此皆足以為治於天下豈惟夏之子孫可寶其訓乎仁人之言其利溥哉禹之謂也其二曰訓有之内作色荒外作禽荒甘酒嗜音峻宇彫牆有一于此未或不亡禹之垂訓如良醫之著書既示之以衛生之術又戒之以致疾之由其所以遺後世者可謂詳且盡矣故前章所引終始保民之説且曰為人上者奈何不敬此示以衛生之術者然也今其二章復列荒淫之目且曰有一於此未或不亡此戒以致疾之由者然也雖荒淫之事上古人君所無禹既不得之於前聞又不得之於親見安能逆知後世之必有是耶亦猶良醫之治病當康平無事之日論其調養之乖宜知其疾疢之必至當時有似不經後日無不合轍又豈待人人切脈觀色而後得之耶惜乎此訓止為姒氏家𫝊之寶不得見其全書於後世也𫝊曰以身教者從以言教者訟為人之先身自為善則其子孫耳之所受目之所擊皆可以入道茍其不然雖日撻而求之不可得矣禹為此訓初非載之空言觀其八年於外三過其門而不入色荒無有也禽獸逃匿驅蛇龍而放之菹禽荒無有也菲飲食而致孝乎鬼神卑宫室而盡力乎溝洫甘酒嗜音峻宇彫牆亦無有也兹不謂之身教乎以此而教子孫子孫猶有盤於遊畋十旬而弗反者況夫後世失諸侯於烽燧成風俗於田獵沈湎冒色莫囬牧野之千夫蜂房水渦僅足楚人之一炬又何以為訓耶宜乎其亡可立而待太康之失失在禽荒所謂有一于此也難乎免於世矣五人者上以大禹為龜鑑下以太康為前車儻使保民斷無是事民其有不相與戴之為君以續夏之祀乎其三曰惟彼陶唐有此冀方昔者帝堯封國於唐曰陶唐氏先儒或謂陶與唐為二國未之詳也然禹之子孫方陳夏訓而有及乎陶唐何哉按地志堯都平陽禹都亦平陽平陽冀地也雖時有彼此之異而地無遷徙之殊今曰有此冀方者其意若曰禹之天下即堯之天下禹之都邑即堯之都邑雖太康一時失道然所以承襲者其來久矣后羿殊不念此遽有拒奪之心今或以此而風天下豈無仗順而起為吾君討賊者乎然而無有此所以怨也由是以論五子之怨非怨其兄也傷時無仗順者而悼其社稷邦邑之無所恃也今失厥道亂其紀綱乃底滅亡堯曰咨爾舜天之厯數在爾躬允執厥中舜亦以命禹然則自陶唐而下聖聖相繼此道未嘗失也太康失之而至於天下皇皇大綱小紀紊亂不經其不滅亡何待觀詩有六義一曰風風風也所以風天下也使其當時怨詈並興聲后羿之罪以激天下之心天下之心未必能動而其母子或中后羿之竒禍矣是故優柔其辭使天下聞之而不忍叛味之而不敢忘五子之怨其蔵深矣聖人於此能無取乎其四曰明明我祖萬邦之君有典有則貽厥子孫天子撫萬邦不明何以在上惟明明后故能照臨四方也立道以為經曰典明理以為法曰則周之六典八則取此義也然總而言之所謂典刑是矣今五子稱述乃祖以謂禹雖逺矣尚有典刑以遺子孫子孫不克肖嗣輔弼之臣獨可以申其祖徳使之悔艾以保其位然而無有此所以怨也後世有君如成湯厥後太甲亦嘗顛覆其典刑矣其臣伊尹能明言烈祖之成徳以訓必待其處仁遷義從而歸之今以太康而論太甲則荒墜猶愈於顛覆當時后羿茍有伊尹之志則烈祖成徳所謂明明我祖萬邦之君固不俟五子言之而為太康者安知不能處仁遷義若太甲之復歸于亳乎由是以論五子之怨非怨其兄也傷時無輔弼之臣而懼其兄終不免於后羿之禍也闗石和鈞王府則有荒墜厥緒覆宗絶祀古者有五權以百二十斤為石三十斤為鈞闗者合而通之和者調而均之其義皆取同也思厥先祖聲為律身為度左準繩右䂓矩所以同律度量衡者皆貽法于後世也故以闗石和鈞申言典則之實所以示典刑之未泯也惟石與鈞為國重事先王巡狩考制度于四岳後王垂統頒度量而服天下亦此也夫王府所有森然萬寶何物不列於内而五子乃獨取是二者言之誠堯舜禹之相授受亦必以謹權量為先故舉是以為夏之手澤桮棬奈何後嗣荒墜而弗知省乎方太康之厄於后羿天下豈無思夏之心儻因其思夏之心示之以典則之實安知不為後世復見官儀而喜者乎五子之於家國思所以復其社稷宗祀者蓋無所不用其至彼其精誠之所感格上動於天而下結於民宜乎子孫祀夏配天赫然中興以成數百年之丕緒也覆絶之患又奚患哉其五曰嗚呼曷歸予懐之悲萬姓仇予予將疇依一章言其祖之治術也二章言其祖之戒辭也三章言后羿之不可有其地也四章言后羿之不能正其君也至此一章則無所歸咎引而在已可也嗚呼者嗟嘆之辭也詩之序曰言之不足故嗟嘆之嗟嘆之不足故永歌之卒章之意言之不足也名篇之義嗟嘆之不足也然則三百篇之法度固巳權輿於此矣聖人取舜禹臯陶之所賡與今五子之所述載之於書以表夫聲詩之作其美刺風戒蓋有所自非茍然也嗚呼曷歸者嘆其留連而忘反也予懐之悲者若瞻望而弗可及也夫兄不友弟不恭初不相及而萬姓乃仇五子而至於無所依有以見太康之失民深也無所依如此而猶不忍歸過于其兄而播羿之惡於萬民乃自怨艾若無所逃于天地之間者於此又知大禹彞倫攸敘見於家法如此其深且固也鬰陶乎予心顔厚有忸怩弗慎厥徳雖悔可追仁人之于兄弟不蔵怒焉不宿怨焉親愛之而已矣五子上不怨太康下不怨后羿竊竊然隠咎於已蓋非矯情飾貌從事於虚文也想其當時一言之出由中而不偽是故鬰陶乎其内鬰陶者悲結也而形於面目者又非勉强之所能為是故顔厚而忸怩乎其外忸怩者愧赧也弗慎厥徳雖悔可追者非歸怨於太康也責已之不徳而追悔之莫及也帝堯之言曰萬方有罪罪在朕躬又曰百姓有過在予一人帝堯以天下之過在已五子以兄之過在已故曰與治同道罔不興又曰禹湯罪已其興也勃焉夫五子以兄之過在已能以堯舜禹湯處心則夏之復興也於兹可卜矣羲和湎淫廢時亂目𦙍往征之作𦙍征堯命羲和以時分職實四人也今此總言羲和豈四人者皆沈湎淫泆耶抑時異事異堯則為四人而夏併為一人耶歴世久逺不可考證以意揆之凡人君欽若昊天建官列職雖或不一然總謂之羲和可也如是則沈湎淫佚者信其為一人而已矣夫時所以定分至日所以成嵗月又焉可廢而亂之哉謂時可廢乎則帝堯朞三百有六旬有六日以閏月定四時成嵗於此不能使百工允釐庶績咸熈矣謂日可亂乎則帝舜巡狩協時月正日於此不能同律度量衡以均齊天下矣然則羲和既廢亂之使人君何所據而為政此其罪所以不可逃也雖然𦙍侯承王命以出征而序書者不言王命豈𦙍侯有専征之罪歟是不然凡王者之征有言告衆必曰誓今此不曰誓而曰征明有君也奉辭伐罪𦙍侯何有於専征乎𦙍征惟仲康肇位四海𦙍侯命掌六師羲和廢厥職酒荒于厥邑𦙍后承王命徂征后羿之亂太康失邦是真失之也仲康之初更造夫婦肇有父子慰四海思夏之心當是時巳復得天下矣説者乃因春秋𫝊魏絳伍員之言推原其意謂羿方専政羲和實忠於夏羿怨其背巳故使𦙍侯征之非也方太康見拒於羿城于陽夏仲康嗣位使𦙍行師也蓋羲和既廢厥職則分至紊其節而嵗月失其序人君所以奉若天道由兹而殆天下之治将委靡而不振矣羲和之罪不既大矣乎故復明言𦙍后承王命徂征所以表仲康之能為君政非専於羿也又以見𦙍侯之能承王命征非出於羿也然𦙍侯諸侯也入輔天子以統六師若所謂為王卿士者而曰后何哉蓋古者諸侯南面皆可以稱后故羿國有窮亦曰后羿何獨於𦙍后而疑之告于衆曰嗟予有衆聖有謨訓明徵定保古之王者臨戎告衆之辭皆曰誓𦙍侯於此不敢稱誓者以奉君之辭也奉君之辭故曰謨訓謨者謀之有定訓者事之有序也自先王克謹天戒至不及時者殺無赦皆仲康所以命𦙍侯之辭也或者乃謂今所言聖仲康不足以當之遂以為此非指言仲康然以其辭考之其稱先王必非堯舜指禹而言也蓋堯舜皆異代非其祖必禹之子孫然後可以稱禹為先王也自仲康之前可以稱禹為先王者啓與太康也𦙍侯方奉王命以征下國而逺取啓太康之言以告於衆豈知務者哉由是以論𦙍侯告衆之初言聖有謨訓者若曰天子有詔也明徵定保者可以依據而行也明其證而不昧定其保而不移既非予之専征又非汝之専殺聖之謨訓其重若此斯所謂奉將天罰而欽承天子威命也𦙍侯之衆其有懐貳而不用命者乎然則𦙍侯奉揚之際以聖歸于天子固人臣之常理非過論也而所謂仲康者於肇位之初能為是舉而又能使其下䖍恭奉命如此雖欲不居其聖得乎先王克謹天戒臣人克有常憲百官修輔厥后惟明明毎歳孟春遒人以木鐸徇于路官師相規工執藝事以諫其或不恭邦有常刑先王之世豈無天變必有日官深推而預告之於是君不舉辟移時大臣引咎歸已以彰其謙抑百官降物修省以輔其不逮故禍亂不作而君道愈明猶以為未也毎嵗履端使遒人之官徇木鐸于路木主仁而聲𤼵揚宣羣下而使之言又所以預防其闕失而隂弭其災沴也故雖官師之卑百工之賤皆得盡其規諫一或不然刑之而使恭厥職今也羲和失預告之規使上昧天戒而下失常憲廢職甚矣仲康能因天變追悔不行先王之法究其所以然皆由于羲和之湎淫將數其罪以正先王之誅得不以是陳之於前乎惟時羲和顛覆厥徳沈亂于酒畔官離次俶擾天紀遐棄厥司乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走羲和尸厥官罔聞知昏迷于天象以干先王之誅政典曰先時者殺無赦不及時者殺無赦仲康既敘先王之法於前此復數羲和之惡陳古義以刺今聖人立言之法也夫人臣守道不如守官君子所居一日必葺知此故能一徳以尊君罔敢湎于酒惟時羲和以徳則顛覆以酒則沈亂畔官離次遐棄厥司擅去天子之庭而荒于厥邑使嵗月日時之紀紊亂而不明故曰俶擾天紀俶者始也蓋自堯之厯象舜之璿璣羲和有官世得其人至是而始擾之也日月相㑹謂之辰十有二辰所以合朔也夏正季秋日月㑹于大火大火則房也日月弗集于房則日有食之可知矣羲和昏迷遂失其次既罔聞知不能弭變於未然及其修救瞽矇奏鼓嗇夫車馬以馳庶人徒跣以走而羲和頽然在邑此豈可恕也哉政典者夏之條章也祖宗所建仲康不得而私故曰先王之誅先時者億而不中不及時者過而後知皆當時之失實罪所在不赦廟謨若此羲和其可逃誅耶然則仲康之謨訓可謂坦然明白𦙍侯於是可舉而行矣今予以爾有衆奉將天罰爾衆士同力王室尚弼予欽承天子威命火炎崑岡玉石俱焚天吏逸徳烈于猛火殲厥渠魁脅從罔治舊染汙俗咸與惟新嗚呼威克厥愛允濟愛克厥威允罔功其爾衆士懋戒哉六師之衆有士有卒𦙍侯帥衆以同力王室而皆謂之士士卒同也又曰尚弼予欽奉天子威命者勉之也觀羲和之罪非止廢時亂日也既有脅從之人又有舊染之俗其惡可知矣然而仲康獨指不謹天戒者言之以其獲罪於人不若獲罪於天之大也蓋夏之子孫知先王所重者在厯數毎勤於此故夏書四篇一以威侮怠棄而獲罪一以廢時亂日而徂征則夏之有天下其謹於天戒者非一日也吾先聖對弟子為邦之問必以行夏之時為先者豈獨以寅正為貴亦以累世致意于此必無差忒故可行也今𦙍侯能體王意告衆之言何其反復丁寧之切至也其曰火炎崑岡玉石俱焚天吏逸徳烈于猛火者言兵猶火也火之弗戢玉石俱焚今為天吏固可以殺人矣若逸徳而使賢愚俱被其害則其威焰豈不猛于火乎此戒衆士不可以多殺也然又慮衆士因其言不果于殺而敗吾事也故復曰威克厥愛允濟愛克厥威允罔功夫威之與愛可以相有而不可以相無天下無事則用之於禮義愛重於威可也天下有事則用之于戰勝威重於愛可也茍惟臨戎而逸徳則原野厭肉川谷流血不幾於長平之戰乎茍惟臨戎而威不克愛則不鼓不成列不禽二毛不幾於宋襄之敗乎然則始而褒之勉之中而反復丁寧之卒而覬其懋戒之期於允濟而巳不敢傷吾君之仁亦不敢廢吾君之義也嗚呼此其所以為三代之將乎自契至于成湯八遷湯始居亳從先王居作帝告釐沃契之父帝嚳嘗都亳矣契為堯司徒當百姓不親五品不遜之時乃能敬敷五教使亘千萬世君君臣臣父父子子其徳盛矣天之報施不在其身子孫當如何哉故十四世而有成湯已七遷其國矣至是始自商丘修先王之盛徳求先王之故都而居焉詩曰商邑翼翼四方之極嘉之也帝告釐沃之書亡矣想其稱述風俗之美猶有帝嚳之遺風焉後世有盤庚者復修其徳雖五遷而民怨猶奮不顧以絶河得成湯尊祖之意也然嚳帝也而謂之先王何哉禮運曰昔者先王未有宫室然則以帝為王固後世立言者以為天子之通稱湯既為王商之先祖皆可以稱先王也湯征諸侯葛伯不祀湯始征之作湯征王制曰山川神祇有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君黜以爵葛雖不祀湯非其君何為而遽征之征者上伐下也敵國不相征也湯之征葛意者請命於君而為是舉也或曰使其有命序書者必言之今此不言非王命也然𦙍征嘗曰承王命徂征而其序則曰𦙍往征之孰謂湯征而非此之比乎王制又曰賜弓矢然後征賜鈇鉞然後殺湯征諸侯決有所本抑此書既亡無與証者惜哉伊尹去亳適夏既醜有夏復歸于亳入自北門乃遇汝鳩汝方作汝鳩汝方𫝊曰盡信書不如無書嗚呼他書固不可無汝鳩汝方之書尤不可無也汝鳩汝方之書無萬世之下成湯伊尹皆不得為純臣是可惜也自古人臣抱負器業孰不欲堯舜其君方尹窮處其心未嘗一日不在桀是故湯以幣聘乃曰我何以湯之聘幣為哉其意以謂若桀之幣則受之矣桀既無心尹亦絶意而湯也其心愈堅其禮愈至乃使幡然而改其曰幡然豈非移所以望桀者望湯乎又豈非移所以許桀者許湯乎及是時尹有湯而已然而湯之心則不然蓋知賢才而舉之舉而貢於王諸侯職也茍吾王因是而治則諸侯之責塞矣當尹去亳適夏之時想湯所以勉勵之言資送之禮必具載於汝鳩汝方之書即其事想其書雖尹十往返而湯之心猶未厭也既醜有夏復歸于亳是桀已惡尹而尹已恥立乎其朝矣於是而復遣焉尹不膏夏氏之斧鉞則尋莘野之耒耜爾其五就而止豈湯之得已哉使湯得尹而不致之桀留為取夏之資是特後世三國之君用心耳湯豈為之哉使尹居湯之國數畔而去之是曾後世管晏狐趙之不若也尹豈為之哉孟子方敘尹徳故止言五就之勤而不及湯為天子得賢之意遂使後世之士綴文為賛亦曰夏商其心則其去就在尹而不在湯矣湯所以拳拳事桀之義安在哉嗚呼此汝鳩汝方之書亡所以為可惜也
