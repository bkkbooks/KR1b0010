body:
  text: 尚書講義卷十宋史浩撰髙宗夢得説使百工營求諸野得諸傅巖作説命三篇用人而取諸夢非法也髙宗為之在當時不以為疑而後世亦信之何也盖凡人之心莫重於誠實莫不重於矯偽髙宗之誠實上有以通乎天故天之所助者順也下有以通乎人故人之所助者信也此夢之所以可信不誣也雖然不使百工求諸市朝之間而必求諸野何哉竊意髙宗未嘗一日不學亦未嘗一日無師獨曰舊學於甘盤者想其少日聞甘盤之言必有開寤其心者異於他師雖甘盤遯於荒野其心未嘗一日不在甘盤亦未嘗一日不思甘盤之在野精誠所逮天實相之乃賚説以慰其心而成其治方其營求諸野尚意其復得甘盤云爾嗚呼讀此書者可以想見髙宗誠實之心也楚語白公子張曰商武丁能聳其徳至於神明得傅説以來升以為公所謂聳其徳者先有誠實之徳以表著於天人之間故能如是也説命上王宅憂亮隂三祀既免喪其惟弗言羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命不言臣下罔攸稟令王庸作書以誥曰以台正于四方台恐徳弗𩔖茲故弗言恭黙思道夢帝賚予良弼其代予言乃審厥象俾以形旁求于天下説築傅巖之野惟肖爰立作相伏氏以亮隂為凶廬孔氏曰信任冡宰黙而不言恭黙之意也𫝊曰百官總已以聽於冡宰三年厯三年之乆既免䘮而猶不言哀未忘也髙宗之孝彰矣孔氏曰三年無改於父之道可謂孝矣其不改者是終身慕父母者也而後世之君乃有以日易月之制昔宰予曰舊榖既没新穀既升朞已乆矣孔子立排之曰汝安則為之夫以朞易三年尚且不可又况以三十六日而易三年乎漢文不學遽有此訓景帝無知行其疾病之言是從其亂也或者曰漢文自代入繼生不能盡孝故自貶而為此訓此尤不可盖以凡人之心誠敬為主誠敬所至終身不易是故天以我為子吾當盡誠敬以事天親以我為子吾當盡誠敬以事親若以一時之悔而使子孫薄於所厚是吾誠敬之心或有間斷豈可以為訓乎文為此訓固已失之景復安而行之不可以語孝矣𫝊曰孝者仁之本夫欲行仁而不以孝為本可乎景帝既失其本尚能襲其治亦僥倖爾後世之人有能拔出流俗堅持天下之通䘮可謂障百川而東之回狂瀾於既倒髙宗不得専美於昔矣知之曰明哲自知曰明知人曰哲非得道者不能也道得矣不言何所用耶王者動民以行固無事於言也若夫君臨萬邦百官之所法式惟言可以達意意不達於言羣下何所稟令乎髙宗用是以作書曰以我正於四方四方之所取正也台恐徳弗𩔖弗𩔖其先王也茲故弗言不敢言也夫人君在位常懐此念則安得失言之咎有所不言言必有以慰天下之望矣觀髙宗舊學固已聞道於甘盤則恭黙思道盖有所自矣易曰黙而成之不言而信存乎徳行徳行之神所以顯道也羣臣豈能知之髙宗湛然無營於方寸之間視天下萬事固已如破竹迎刃而解尚求其所以正四方之術凝然沉慮故嗜慾將至有開必先而賚弼之祥形之夢寐豈人所能為哉天也天之與我泯然無間則道豈逺乎恭黙以思則其道已著矣方其夢也以為必得而求之及其得也以為必賢而相之髙宗之察於天人之際者審矣彼夫後世不合於天不謀於人而憑私以論相者豈不相去萬萬乎王置諸其左右命之曰朝夕納誨以輔台徳若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啟乃心沃朕心若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷惟暨乃僚罔不同心以匡乃辟俾率先王迪我髙后以康兆民嗚呼欽予時命其惟有終説復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命人君之急莫急於親賢置諸左右則親之矣後世漸不及古人君蚤朝不過立談之頃以决萬機退且休矣日與近習為伍聞見安得而廣魯哀公所以有生於深宫之中長於婦人之手之歎也惟賢故有徳與賢人處故無過則朝夕納誨所以輔者必徳也作礪作舟楫作霖雨皆喻其必不可無者也盖金就礪則利不利不足以為金舟楫可以渉大川無舟楫則跬歩千里霖雨可以蘇苗稼無霖雨則苗槁矣此喻其必不可無者若庸庸之人雖什百千萬在旁得之不足為重失之不足為輕傅説之賢可不言而見矣夫人臣之患在於心欲有言而口不敢言以言出而有後患也使人君容其辭啟乃心無有所隠其誰不願盡展况髙宗又若焦渴之望沃心耶由是骨鯁之言始可入矣夫骨鯁逆耳比於藥之瞑眩而利於病先王成憲世為法則若人之履地跣而弗視地則必傷其足既用𫝊説則什百千萬之人皆當觀感而化乃僚安得不同心以正君乎先王成憲髙后成湯之法俾説順之以康兆民欽者恭而不忘故自周有終之訓可得其要矣説之復命以木喻諫非以箴王王既求諫復有是言論其大槩也以謂凡木皆從繩凡后皆從諫后既聖矣臣安敢不祗厥命乎傅説於此以識髙宗之心其喜可知矣竊嘗論髙宗得説宜有髙世絶俗之言其諄諄責之可謂勤矣及説復一言不過從諫是知從諫果為帝王之盛徳也唯其從也則人樂告之今日改過明日又改過則日新之功如金含礦礦盡金精如鑑止塵塵去鑑明堯舜禹湯之道將不行而至矣豈不為盛徳乎説命中惟説命總百官乃進於王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民惟天聰明惟聖時憲惟臣欽若惟民從乂惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬王惟戒茲允茲克明乃罔不休惟治亂在庶官官不及私昵惟其能爵罔及惡徳惟其賢慮善以動動惟厥時有其善喪厥善矜其能喪厥功説以版築之胥靡一旦位在百官之上若固有之則其胸中所以藴蓄者素矣其進於王即以天道天道髙妙何從而知在民而已故凡立后王君公承以大夫師長豈有他哉為民也惟天聰明惟聖時憲憲法也法天之聰雖不聴而無不聞法天之明雖不視而無不見臣之所以欽若民之所以從乂由我亶聰明也治民之與逸豫未嘗兩立不逸豫則斯能治民矣口實禍福之門戒之則不起羞甲胄不祥之器戒之則不起戎名器不可假則衣服之在笥不可不戒於妄子師直為壯干戈之動則省躬不可不戒於妄罸王能信此則為克明之君乃無不休矣官爵所以待賢能庶官不戒則官及私昵爵及惡徳矣所謂私昵便嬖狎翫諧謔䛕媚者也所謂惡徳誅殺酷虐貪淫很愎者也朝廷用此天下謂何故先王之世逺之而已官爵曷為而予之哉夫使一私昵一惡徳之人用未必即亂也所可畏者賢徳耻與之同列非引去則相繼以死爾國何以國乎人君一動當慮其善善則適時而無妄動矣茍自有之則人不以為善矣茍自矜之則人不以為功矣何者人君取諸人以為善者也茍攬而在已則人將不肯告之以善矣古人知此苟有功徳必曰非朕所及子大夫之力也羣臣聞此亦必歸美於君曰非君用臣臣何力之有焉此江海所以為百谷王而人主取之以為要術也惟事事乃其有備有備無患無啟寵納侮無耻過作非惟厥攸居政事惟醇黷於祭祀時謂弗欽禮煩則亂事神則難王曰㫖哉説乃言惟服乃不良于言予罔聞于行説拜稽首曰非知之艱行之惟艱王忱不艱允協于先王成徳惟説不言有厥咎先王思患預防則無患而預防用力甚少患至而為之備則用力多而無及於事矣無啟寵者不開倖進之門也人君之尊嚴人必畏之如天尊之如帝孰敢侮之哉惟其倖進之門一開則彼之非𩔖者紛然競起曰吾君可以言媚可以利誘可以讒而去忠良可以樂而忘災變瞽之以玩好以役其耳目投之以諧謔以役其心思以一人之精神雜然誘之於前安得不昏惑哉及其終也人何畏之有不知其所寵者皆自取侮也無耻過者不懐拒諌之心也古人不貴無過而貴改過無過者聖哲之事有過而改何傷於聖哲何則人之心志有限而事變無窮茍欲無過雖聖哲亦不能也惟貴於改爾過豈可耻哉耻則人不敢言人不敢言則訑訑之聲音顔色距人於千里之外將所作者皆非也惟厥攸居所居以仁則為仁政所居以不仁則為虐政惟者審處之謂也政事之醇在人君所處如何爾祭不欲數數則煩煩則不敬商人尊神率民以事神先鬼而後禮故祭祀之煩黷至是亦弊矣所當革也王曰㫖哉説乃言惟服知其言之有味而誠服也乃不良於言予罔聞於行不獨善此言亦知其當行也説承王命進之曰王知之矣行之亦非易事王誠不以為艱則允協先王之成徳矣是以成湯望髙宗也髙宗已能聴已之言是從諌也無負於説矣説而不言是説負髙宗也故曰有厥咎説命下王曰來汝説台小子舊學于甘盤既乃遯于荒野入宅于河自河徂亳暨厥終罔顯爾惟訓于朕志若作酒醴爾惟麴糵若作和羮爾惟鹽梅爾交修予罔予棄予惟克邁乃訓説曰王人求多聞時惟建事學于古訓乃有𫉬事不師古以克永世匪説攸聞惟學遜志務時敏厥修乃來允懐于茲道積于厥躬惟斆學半念終始典于學厥徳修罔覺監于先王成憲其永無愆惟説式克欽承旁招俊乂列于庶位案此段講義原闕王曰嗚呼説四海之内咸仰朕徳時乃風股肱惟人良臣惟聖昔先正保衡作我先王乃曰予弗克俾厥后惟堯舜其心愧恥若撻于市一夫不𫉬則曰時予之辜佑我烈祖格于皇天爾尚明保予罔俾阿衡専美有商惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民説拜稽首曰敢對揚天子之休命髙宗知天下所仰者在我一人一人有慶則兆民頼之一人不君則四海之内糜爛荼毒不可勝言民何罪哉是則治在一人亂亦在一人則吾豈可不警戒哉是故所當修者在徳所當輔者亦在徳也其所謂風豈不繫一人之本乎𫝊曰草上之風必偃盖謂是也人不得股肱不足以為人聖不得良臣不足以為聖則其所以望傅説者切矣如曰不得汝則我非其君也其舉先正保衡作我先王言先王非伊尹則不能作也伊尹之致君澤民格天之徳可謂美矣爾尚明保予罔俾阿衡専美有商則責説以伊尹之事業也然人皆知髙宗以伊尹望傅説而不知髙宗以成湯自期為可喜也人君茍無賢臣則無以致治人臣雖賢非君則不用而家食矣其爾克紹乃辟於先王永綏民以明君臣相須克綏先王之禄永底烝民之生也髙宗至是已洞曉湯與伊尹咸有一徳之理則説其可以辭乎夫古之君天下者耳目口鼻心思智慮舉相似也而有聖有狂有治有亂者在乎為不為耳高宗既欲為成湯則傅説雖欲不為伊尹不可得也對揚休命又豈説不誠之言乎髙宗祭成湯有飛雉升鼎耳而雊祖已訓諸王作髙宗肜日髙宗之訓髙宗之訓一篇已亡不可復見想祖已之所以戒王者必備於髙宗之訓也凡祭之明日再祭周名曰繹商名曰肜雉野禽也不應入室况乃升鼎而又鳴於鼎之耳乎孔氏以為耳不聰之異漢五行志劉歆以為鼎三足三公象也盖鼎為重器而以耳則能行野禽居鼎耳小人將居公位敗宗廟之祀也天意若曰當用三公之謀以為政此皆附㑹未必然者今以經考之為足可驗觀其言典祀無豐於昵則知髙宗之祭厚於近而薄於逺矣意者方其登降灌薦之間而雉入於室雉畏人者也使其有人在側則雉安能前雉之能前則其人之寡少可知人之寡少則器用儀物之菲薄又可知矣此祖已因其祥而戒之也髙宗肜日髙宗肜日越有雊雉祖已曰惟先格王正厥事乃訓于王曰惟天監下民典厥義降年有永有不永非天夭民民中絕命民有不若徳不聴罪天既孚命正厥徳乃曰其如台嗚呼王司敬民罔非天𦙍典祀無豐于昵祖已髙宗之賢臣也見雉之鳴心之憂矣乃曰先當格王心以正厥事此言實祖已自謀之意非訓王之辭也夫人臣欲諌其君必先開陳其道使之曉然然後歸結於所諌之事此務引其君以當道也此書自惟天監下民至罔非天𦙍皆所以正厥事也祖已慮髙宗以為雉之升鼎出於適然而不知懼故先格王以天道以為有祥出於天也天之監下民常其義而不移其實無私於禍福而有差於夀夭夭非天夭之也民自絕其命爾民有不順徳不改過天既出其夭祥而謫見於上則當修徳以禳之乃曰其如我何此所以𫉬罪於天也王之承祭祀主大寳豈已所能得耶能敬民民歸則天予之也然則髙宗其可不畏天命哉知所畏矣於是可告以其本意曰典祀無豐於昵則昵者其近者歟豐於近者而約於逺者故使成湯之祭菲薄不成禮則雉鳴之祥豈非天意欲警懼之乎雖然非髙宗固欲簡宗廟之儀也亦因其舊禮云爾天之愛髙宗異於他主故出災異以警之使此禮自髙宗而復也然則典祀無豐於昵祖已何必多言哉殷始咎周周人乘黎祖伊恐奔告于受作西伯戡黎黎者紂之旁邑乘者驟而攻之戡者攻而定之也孔子曰三分天下有其二以服事商周之徳其可謂至徳也已矣而此書乃曰西伯戡黎何也盖當是時紂始囚文王於羑里故曰商始咎周也文王之民唯恐紂之殺文王也故乘黎以恐之冀紂有所憚而不敢殺故曰周人乘黎也祖伊祖巳之後紂之臣也果恐而奔告則周人之計得矣其曰西伯者祖伊歸罪於文王之言也此書祖伊作不得不以西伯名故書序改之曰周人乘黎明非西伯也後之為𫝊者亦曰文王既囚羑里其臣閎夭之徒争求竒器美女善馬以贖文王求者所以激國人之怒也故卒有乘黎之舉然則出文王於羑里者實周人乘黎之功也西伯戡黎西伯既戡黎祖伊恐奔告于王曰天子天既訖我殷命格人元龜罔敢知吉非先王不相我後人惟王淫戲用自絕故天棄我不有康食不虞天性不迪率典今我民罔弗欲喪曰天曷不降威大命不摯今王其如台王曰嗚呼我生不有命在天祖伊反曰嗚呼乃罪多參在上乃能責命于天殷之即喪指乃功不無戮于爾邦天子者天之所子至尊之稱未易可當也必能洪覆萬物與天同功然後可稱天子周人既戡黎祖伊奔告之辭曰天子者所以覺紂也以謂王為天子而使天下至此其極尚可稱天子乎天既終我商命格人有道之人元龜良卜也不敢知吉皆曰凶也夫神祇祖考之心孰不欲人君之賢方其在盈成之際其心猶恐人君驕惰以害治惴惴然未嘗一日安樂及夫能持其盈守其成然後此心乃安樂之况其喪亂之時乎是知先王未嘗不相我後人實王淫戲以自絕也先王既已絕意天亦且棄之不有康食年凶也不虞天性昏其天性而無所虞度也不迪率典亂其舊章而不能率由也神祇祖考既如此民心可見矣民欲其䘮反怨天不降威而大命不摯是不欲其少延也夫民所以畏愛其君以其能保養我今王其如我何祖伊之言切矣而紂方曰我生不有命在天民其如我何祖伊反者歸其國也其曰乃罪多參在上乃能責命於天者謂汝之罪參於天者衆天巳棄汝豈可復責天以保已之命耶商之即䘮指乃功指戡黎之功以告其及禍不逺周敢乘黎豈無戮爾邦之意乎比干昔諫紂至於剖心今祖伊之諌猶使反國盖方其急時若有悟者雖以我生有命拒之然其心終恐此祖伊所以得反國文王所以終脱羑里之禍也使紂自此而改豈復有牧野之師乎然猶愈於後世之君不用其臣之言至於滅亡乃反慙其人因而殺之者多矣此不及紂逺甚𫝊曰紂之不善不如是之甚也於茲可證殷既錯天命㣲子作誥父師少師人君所畏者天命所恃以立者亦天命今既錯亂之何以為君耶㣲子帝乙長嗣箕子少師也雖不詳其實以書推之必其宗正之大臣也父師箕子少師比干孔子所謂商有三仁是也夫仁者患不𫉬用用而在髙位猶弗能救紂之敗此近於危而不持顛而不扶者矣若果坐視其祚移之他人而終無所為罪不容誅矣唯其死之去之各有攸當此所以不失其為仁也然就是三者論之比干仗義以立君臣之大節其正也箕子奉身以昭不可則止之風亦正也㣲子忍耻以存祖宗之祀其權也權有難明之迹聖人定書不得不取此篇以明㣲子之心也以此防民後世猶有黨王氏以賣國若劉歆輩况無此耶㣲子㣲子若曰父師少師殷其弗或亂正四方我祖底遂陳于上我用沈酗于酒用亂敗厥徳于下殷罔不小大好草竊姦宄卿士師師非度凡有辜罪乃罔恒𫉬小民方興相為敵讎今殷其淪䘮若渉大水其無津涯殷遂喪越至于今曰父師少師我其𤼵出狂吾家耄遜于荒今爾無指告予顛隮若之何其㣲子第憂紂之無道欲進則受禍退則不忍幾於𤼵狂愛君憂國之心切至矣然初無抱祭器而遯去之意也觀其告箕子比干之辭可見矣曰商其不或治正四方矣我祖成湯致成其法度陳之在上乃以沈湎敗亂其徳於下使小大之臣罔不好草竊姦宄草者不暇整竊者私攘取至於姦宄則漸大矣在外為姦在内為宄習熟聞見化為一律卿士人之師表而皆師其非法凡有辜罪既不任我祖所陳之法安能得其情小民以此皆無忌憚自相屠戮自相讐敵而法不足以禁之可謂蕩然無綱紀文章矣商之淪䘮至於極矣若渉大水其無畔岸而不知所濟我之心欲𤼵狂然吾已耄矣將遯於荒野今爾略不指告我之顛隮顛隮者登危而朴墜也爾二人視國如此曽不指陳其救之之道若之何其也微子之年髙故曰耄以是責二子而求計也父師若曰王子天毒降災荒殷邦方興沈酗于酒乃罔畏畏咈其耉長舊有位人今殷民乃攘竊神祇之犧牷牲用以容將食無災降監殷民用乂讎斂召敵讐不怠罪合于一多瘠罔詔商今其有災我興受其敗商其淪喪我罔為臣僕詔王子出迪我舊云刻子王子弗出我乃顛隮自靖人自獻于先王我不顧行遯此箕子之言也曰王子者復責微子謂汝為商之子孫當如何耶此欲諷微子使存商祀也今商天禍屢見不知省懼方沈湎於酒其曰商邦以其上下化之非獨紂也夫人君出可以守宗廟社稷以為祭主當使神祇祖考安樂之可也乃不畏所畏使民攘竊其犧牲器用容其將食於人以為無災則神人混淆器用穢濁豈復歆其祀哉至是微子始有抱祭器而遯去之意也箕子之指當矣觀此三人雖為師表其實前代所尊用而見擯於紂之時者也觀其所謂咈其耉長舊有位人固非可以扶顛持危責也降監商民言商之君臣下視斯民無保養之心用為怨讐而暴斂之凡召敵讎之政罔不力行君臣上下合於一轍病雖多而罔有告之者王平日雖不我用今其有災我當興起而告之然亦徒受其禍爾商若果淪䘮我定不為臣僕於人王子以祭祀為念當行矣盖人臣有死無貳若以祭祀為念則王子之出為順我舊嘗告汝之言深矣汝猶不信耶今汝弗出我之社稷宗廟乃無主而顛隮矣自靖者各反其𠂻以其所當行者貢之先王苟此心無愧不恤行與遯也盖人臣莫重於去國去國則謂之叛㣲子抱祭器而行箕子佯狂為奴而遯皆非可以為萬世法者在㣲子箕子則可在他人則不可也何者二人以心質於先王無一毫欺偽故可以不顧而為之若夫比干則守人臣之正道不俟計謀而斷然不惑故不置一言於其間也嗚呼非孔子至聖安能察二人之心而同與比干為三仁哉
