body:
  text: 尚書講義卷四宋史浩撰皐陶謨曰若稽古皐陶曰允迪厥徳謨眀弼諧禹曰俞如何皐陶曰都慎厥身修思永惇敘九族庶眀勵翼邇可逺在兹禹拜昌言曰俞皐陶曰都在知人在安民禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠黎民懐之能哲而惠何憂乎驩兜何遷乎有苗何畏乎巧言令色孔壬皐陶曰都亦行有九徳亦言其人有徳乃言曰載采采禹曰何皐陶曰寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而㢘剛而塞彊而義彰厥有常吉哉日宣三徳夙夜浚眀有家日嚴祗敬六徳亮采有邦翕受敷施九徳咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝無教逸欲有邦兢兢業業一日二日萬幾無曠庶官天工人其代之天敘有典勑我五典五惇哉天秩有禮自我五禮有庸哉同寅協恭和衷哉天命有徳五服五章哉天討有罪五刑五用哉政事懋哉懋哉天聰眀自我民聰眀天眀畏自我民眀威達于上下敬哉有土皐陶曰朕言惠可底行禹曰俞乃言底可績皐陶曰予未有知思曰贊贊襄哉粤若稽古皐陶史謂皐陶有君人之大徳可以考信故稱稽古也以其無位故不著稱號而直敘其徳曰允迪厥徳謨眀弼諧也說者乃曰此皐陶之言竊謂不然若以是為皐陶之言則放勲欽眀文思重華協于帝濬哲文眀文命敷于四海祗承于帝豈亦皆堯舜禹之言乎以是知其為敘皐陶之徳也允迪者允蹈也允蹈其徳非空言也是故能以嘉謨眀其弼諧之道可以取信也揚雄論絶徳曰舜以孝禹以功皐陶以謨是言皐陶獨能以謨顯於當時而垂之萬世也皐陶矢厥謨於帝堯之朝帝舜又申之而此獨載禹之答問何哉盖方皐陶陳謨禹實在其列也然皐陶未言而禹先曰俞如何者禹素信服皐陶故於未言之前精神相感已得之目擊不待諄諄也第問其如何耳如何者所以𤼵皋陶之謨也茍不在君前答問不足謂之謨矣皋陶未聞禹之言遽曰都者美禹之能問也皋陶之學大學之道也故其所言首於慎厥身修而修身本於思永思者正心誠意永者不息則乆也盖以修身本於正心誠意故能行逺也禹贊皋陶邁種徳者修身以正心誠意為本如木之有根植根之固而能乆於其道也自思永而推之則修身而可以齊家矣故曰厚敘九族家齊則可以治國平天下矣故曰庶眀勵翼言衆庶眀吾修道之教勉而勵翼也翼者中也如鳥之有翼所以輔中也故舜贊皋陶曰民協于中而皋陶亦以謂邇可逺在兹謂陟遐必自邇也盖自正心誠意而至於治國平天下斯民皆協于中皋陶邁種徳之功其要又在於思永也禹聞其言而拜以皋陶闡揚大學眀徳之要故也皋陶曰都者美其領解也故直指其眀眀徳於天下之所在曰在知人在安民禹曰吁者歎其難也后克艱厥后臣克艱厥臣政乃乂黎民敏徳禹之言也至是乃曰惟帝其難之則知人安民之說禹已領其意矣故曰知人則哲能官人安民則惠黎民懐之能哲而惠國寧有不治天下有不平乎帝堯所以不慮乎四凶使與皋䕫稷契並列於朝而不害其為治國平天下者知夫眀徳之所在故不慮乎小人間之也至舜則不敢容矣此帝堯所以為難能也四凶敘其三禹為親諱也皋陶復美其言曰都亦行有九徳亦言其人有徳者九徳人之行未易知也其所以知之取人言也人言其有徳則當載采采者載之行事考察其功而采用也孔子所謂爾所不知人其舎諸知人之方也禹曰何者覬聞九徳之目也夫民心罔中惟爾之中皋陶弼教能使民協于中以奉揚聖君執中之道於此可見矣當是時民心皆丕變而協于中矣故其徳無偏寛者必栗柔者必立愿者必恭治者必敬順者必毅直者必温簡者必㢘剛者必實强者必義使九者一有所偏則非中矣安可謂之常徳乎厥徳匪常則動罔不凶矣彰厥有常是取其協于中也吾能用之則吉矣此知人之要訣也日宣三徳夙夜浚治而眀行之則可以有家矣身修而家齊也進而至於日嚴祗敬六徳信用而有邦矣家齊而國治也翕受敷施九徳咸用俊乂在官則能收知人之效矣百僚師師尊賢也百工惟時使能也孟子曰尊賢使能俊傑在位所以𤼵眀皋陶俊乂在官之旨也撫于五辰五行之度不亂天之所助者順也庶績其凝凝成也結也人之所助者信也國治而天下平矣此眀眀徳於天下之眀效大騐也皋陶之學可謂知所本矣宜乎稱其為嘉謨也撫于五辰庶績其凝天人之際和同無間可謂太平之極矣皋陶於此懼其志驕意滿而瀕於殆也於是而致戒焉無教逸欲不興逸欲之教上既率以無逸勤則不匱矣上既率以無欲下皆家給矣兢兢業業震懼自保修已以敬也一日二日萬幾幾者動之微一日二日其來有萬可使頃刻不治乎君既惟日不足庶官豈敢曠職乎其曰天工言所用之官不以私皆合於天理而能代天理物者也所以歸之天者皆順自然而無私心也天敘自然之敘所謂君臣父子夫婦朋友長幼也以其為經常之道故曰五典勑此以教天下是謂五惇天秩自然之秩所謂吉凶軍賔嘉也以其當天下之理故曰五禮由我以行是謂有庸惇也庸也道之以徳齊之以禮也天命自然之賞王侯卿大夫士之服所以章有徳也天討自然之刑墨劓剕宫大辟之等所以警有罪也章也用也道之以政齊之以刑也徳禮以待君子故有同寅協恭和衷之應政刑以防小人故有政事懋哉懋哉之應君人之道至是盡矣皋陶猶以為未也又直言天寄聰眀於民之耳目寄威怒於民之背叛使人君上則恐懼以畏天下則憂勤以畏民達于上下敬哉有土言有土者不可不于此致敬也皋陶自以為吾言惠可底行禹復曰用汝之言底可績不徒可行必有功也皋陶曰予未有知若曰吾無所知識謙詞也思日贊贊襄哉者襄成也但思日日贊成吾君眀眀徳於天下而已竊嘗謂禹謨益稷君臣之間皆有褒頌歸美之詞獨皋陶謨一篇其始以正心誠意種眀徳之根本其中以知人安民彰眀徳之功用其末以恐懼修省保眀徳之欽崇迄無一言見於褒美頌揚者盖如是然後可以為嘉謨也禹亦有謨而舜申其成功禹之功不專在謨故也然則立言以為天下後世人臣之楷模者莫皋陶若也揚雄曰謨合皋陶之謂嘉信哉益稷帝曰來禹汝亦昌言禹拜曰都帝予何言予思日孜孜皐陶曰吁如何禹曰洪水滔天浩浩懐山襄陵下民昏墊予乘四載随山刋木暨益奏庶鮮食予决九川距四海濬畎澮距川暨稷播奏庶艱食鮮食懋遷有無化居烝民乃粒萬邦作乂伏生以益稷合於皋陶謨似亦有理盖味其辭意則未竟也皋陶方退託於未有知思日贊贊襄哉而帝呼禹曰汝亦昌言是喜皋陶之謨而使禹亦言之也亦者連上文言也禹聞帝命則拜謂帝曰皋陶所言至矣盡矣予何言哉皋陶欲其必言也故驚嘆而問焉曰如何如何者所以𤼵禹之言也禹曰洪水滔天微茫無際也浩浩懐山襄陵丘陵且不見况得平土乎下民昏瞀墊溺禹思天下有溺者由已溺之三過其門而不入之時也是故水行乘舟陸行乘車泥乘輴山乘樏随山高下刋木以積薪為隄防也當是時益烈山澤而焚之得禽獸以進於斯民補其乏食益之功大矣及水之將平决九川以距四海九州各有川導之至於海四海者東南西北之水各随其地勢而導之此禹行其所無事也濬畎澮距川解者曰凡一耦之伐廣尺深尺為畎百里之内廣二尋深二仭為澮濬畎澮距川川者大川也眀其水亦至于海也此禹盡力乎溝洫也海内漸得平土於是稷降播種以進於民其曰艱食草木之根也鮮食魚鼈也民既得取艱食鮮食而商旅有塗可行又使之懋遷有無以其所有易其所無也化者不腐敗居者有儲蓄烝民乃粒則饑饉之患去稷之功大矣是禹以萬邦作乂之功歸之益稷也禹既歸功於益稷益稷初無言也而以名篇者彰禹推賢遜能之徳也皋陶曰俞師汝昌言禹曰都帝慎乃在位帝曰俞禹曰安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休帝曰吁臣哉鄰哉鄰哉臣哉皋陶曰俞信如其言也然帝實欲師汝昌言今汝言益稷之功固美矣而帝之所以覬聞於汝者汝未嘗言也禹於是乃言曰都帝謹乃在位夫舜以大徳得位而禹猶欲其謹乃在位則位之難保可知矣舜視棄天下如敝屣兢兢業業夫豈以位為樂哉其曰俞者敬領其昌言也禹又以無安厥位惟危欲安汝止以盡其保位之道大學所謂人君止於仁君茍能仁斯安厥位然而仁豈外求而得哉在吾心爾凡人之心生無不直惟幾惟康可以弼直不然是罔之生也是故聖人惟幾也戒謹於微而弗著惟康也戒謹於安而弗危輔之翼之吾之直心於是乎在淵乎其静皎乎其眀故能止其所也此帝王治心之要大學所謂正心誠意之旨也禹之昌言可謂破的矣心既直矣以吾之心合天下之心天下之期待於我者莫不丕應矣是人予之也人予之則天予之矣天予之則申眀用休所謂宜民宜人受禄于天也此禹之昌言徑指人心眀白如此舜安得而不師之乎禹既以正心之要専責於舜舜方嘆曰吁為天下豈不在君臣相得何獨在我乎於是臣鄰之助股肱耳目之喻方𤼵於口矣禹非不知此理也顧其君方有意師其昌言不得不端本澄源而責效於其君之心也說者乃曰其弼直者其弼臣直也禹方相舜其陳昌言豈敢自媒以謂欲保厥位湏我乃濟乎竊意不矜不伐者不肯為也此語在稷契輩言之猶可若禹自贊則慎乃在位之語是脅其君以自售也即此而論非言弼臣眀矣不然舜安有嗟吁之言而復于禹乎其曰臣哉鄰哉鄰哉臣哉臣者大臣鄰者小臣盖言必得小大之臣咸懐忠良然後天人皆予以致時雍之治予一人豈能自致哉此舜因禹昌言而𤼵也禹曰俞帝曰臣作朕股肱耳目予欲左右有民汝翼予欲宣力四方汝為予欲觀古人之象日月星辰山龍華蟲作㑹宗彞藻大粉米黼黻絺繡以五采彰施于五色作服汝眀予欲聞六律五聲八音在治忽以出納五言汝聽予違汝弼汝無面從退有後言欽四鄰庶頑讒說若不在時侯以眀之撻以記之書用識哉欲並生哉工以納言時而颺之格則承之庸之否則威之禹曰俞哉帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣惟帝時舉敷納以言眀庶以功車服以庸誰敢不讓敢不敬應帝不時敷同禹曰俞者誠如舜語須君臣一徳乃能致治也舜於是有股肱耳目之喻夫人之有體非股肱何以運動非耳目何以聰察無此則塊然一物耳誠何用哉左右有民者肱之用宣力四方者股之用以左右故言翼以宣力故言為至於觀象作服皆法古人繫辭曰黄帝堯舜垂衣裳而天下治則知舜之觀象有自來矣日也月也星辰也山也龍也華蟲也六者繪而為衣宗彞也藻也火也粉米也黼也黻也六者以絺繡而為裳則黄帝堯舜之衣裳盖亦有所本也故曰古人之象此以五采彰施于五色作服所以為目之用也故曰汝眀太蔟姑洗㽔賔夷則無射黄鍾六者謂之六律宫商角徴羽五者謂之五聲金石絲竹匏土革木八者謂之八音聲音之道與政通作之可以知治忽治者治世之音忽者亂世之音也治忽在民五言方言也五方之民言語不通嗜欲不同達其志通其欲非音律不可也周官大行人屬象胥者諭言語協辭命也屬瞽史者諭書名聴聲音也夫如是然後五方之言可以出納也出者宣吾命納者采其言言語既通吾之治忽所以必可知也此出納五言所以為耳之用也故曰汝聽夫一人之身而具股肱耳目豈不謂之全人乎舜舉此以詔禹示其必不可無也責之可謂切矣予或有違汝當弼我汝無面從退有後言欽四鄰此専責禹也盖四鄰者左右前後之臣非禹正色率下則左右前後之臣安能㒺匪正人乎高宗命傅說納誨以輔徳而必曰惟暨乃僚㒺不同心以正乃辟說能旁招俊乂列於庶位高宗盖得此意也然則舜之所以責臣哉鄰哉之意可見矣四鄰之正在禹率之爾其庶頑讒說不能克正者舜無憤嫉之心一待之以君子長者之道是故不忍置之刑而使得與於射也侯者立的以眀其善惡撻者扑也射之有扑所以示衆當其射也司徒搢扑司射釋弓去扑以釋算盖非謂施鞭箠也侯者眀其正鵠撻者記其筭數書者識其中否其實欲其並生愧恥遷善而逺罪也工以納言瞽史採其言颺之以觀其所以言茍順而無向之讒說則知其能改過所謂格也格則薦之用之否則簡不率教收其威也此舜欲教養作成臣下之大略也非待之以君子長者之道能若是乎禹於此窺見舜之心寛容廣大無一臣之或遺故曰俞哉帝光天之下者言舜徳光眀丕冒天下如帝堯所謂光宅也盖四海萬里若以力周安能徧覆惟以一性之光眀可以含容燭照至於海隅蒼生萬邦黎獻莫不共為帝臣惟帝時舉則普天之下莫非王臣矣盖禹聞舜所以待遇臣隣之道委曲周盡是故𤼵是言也至是欲帝敷納以言眀試以功車服以寵之誰敢不遜敢不敬應帝當不時敷同也敷者誕敷同者調一欲舜無時而不敷同此道也如此則君之所以馭臣至矣盡矣在位之人孰不懐忠以報上乎日奏罔功無若丹朱傲惟慢遊是好傲虐是作罔晝夜頟頟罔水行舟朋淫于家用殄厥世予創若時娶于塗山辛壬癸甲啟􅈱􅈱而泣予弗子惟荒度土功弼成五服至于五千州十有二師外薄四海咸建五長各迪有功苗頑弗即工帝其念哉帝曰迪朕徳時乃功惟敘皐陶方祗厥敘方施象刑惟眀日奏罔功無若丹朱傲盖言舜之時獨難化者若曰日聞其無状無如丹朱也禹取是以為戒所謂不善人善人之資也傲而虐是慘酷也頟頟失法度無晝夜為之猶無水以行舟其能濟乎朋淫于家朋非止一人若紂之酒池肉林也天下之謳歌訟獄所以不之丹朱而之舜用自絶于世也禹能懲創其失娶于塗山涉辛壬癸甲四日而去家至于有子而弗子所謂克儉于家也惟荒度土功荒大也大其規畫以盡治水之道所謂克勤于邦也既反丹朱之傲所謂不自滿假也故能輔成五服至于五千里皆得平土而居九州肇為十二州州各有師師者置牧也五服之外邉方下國置長而已莫不各迪有功惟苗弗率禹以謂不可以法治而可以徳服此欲舜誕敷文徳以來之昌言之要也舜曰天下所以允蹈我徳既藉汝有平水土之功使六府三事允治萬世永賴又有皐陶眀刑以服猾夏之蠻夷姦宄之宼賊徳刑並用禹之功惟敘皐陶之功祗敘何患苗之不丕敘耶使舜不知二臣功徳之大安肯以此復其昌言乎夔曰戛擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后徳讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳳凰來儀夔曰於予擊石拊石百獸率舞庶尹允諧帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熈哉皐陶拜手稽首颺言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首眀哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞往欽哉后夔言作樂之成皐陶載賡歌之美非皋陶自言也禹據二人之言以表大治之告備也盖益稷一篇皆禹昌言前敘益稷之功後述皐陶之績此禹推賢遜能之本心欲帝念功而云也夫戛擊鳴球球玉磬也合止搏拊琴瑟皆作升歌在上幽而祖考眀而羣后㒺不降順丹朱難化亦且賔服而在位此堂上之樂所以動化之效也下管鼗鼓合止柷敔笙鏞間作鳥獸蹌蹌和鳴也鳳凰來儀和應也擊石拊石磬也飛者走者逰於造化亭毒中踴躍翔舞以呈瑞此堂下之樂所以動化之效也然極於擊石拊石者石為八音之首于卦為乾其聲清微必待磬聲諧合而樂遂以成此所以堂上必鳴球堂下必擊石也詩曰鼗鼓淵淵嘒嘒管聲既和且平依我磬聲此之謂也方樂初作羣后徳遜虞賔在位而已及樂既成庶尹至于允諧雖丹朱之不肖亦為善良矣季札觀樂獨於韶箾則曰徳至矣哉如天之無不幬如地之無不載雖甚盛徳其蔑以加于此矣孔子在齊聞之亦至于忘味想其當時廣大悉備仁風和氣充塞乎範圍之内無一人一物不得其所也舜治至此宜少自逸樂而作歌自警勅天之命惟時惟幾時者一日無曠幾者每事防微一人之身元首不動而股肱之運以熈萬事此其序也皐陶領其意以謂君率於上臣下作而行之故曰率作也憲舊章也屢省審諦也於此致欽則事無有不興者矣夫君逸臣勞萬古不易之論元首之眀則能知人股肱之良則雲龍風虎自然相符庶事安得而不康若元首不眀則自聖而輕臣下自用而昵諂䛕細事必親徒爾叢脞而大事不舉失其機㑹股肱在位充員茍禄無所建眀萬事安得而不隳皐陶之戒可謂不阿人主矣帝拜曰俞者非拜皐陶之歌也禹之昌言至是方畢拜而受之也竊嘗論天生聖賢非為一時盖亦欲垂法於萬世為君臣之軌範觀益稷一篇可以知人君下下之仁聽納之懿人臣歸美報上之忠推賢遜能之實莫不兩盡焉盖不如是不足為禹皐陶之謨也嗚呼盛哉
